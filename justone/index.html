<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just One Online - Custom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .invalid-hint { text-decoration: line-through; opacity: 0.3; background-color: #e2e8f0 !important; color: #94a3b8 !important; }
        .result-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-emerald-50 min-h-screen p-4 text-slate-800 flex flex-col">

    <div id="app" class="max-w-md mx-auto text-center flex-grow w-full">
        <header class="mb-6 pt-4">
            <h1 class="text-3xl font-black text-emerald-600 italic tracking-tighter">Just One</h1>
            <p id="room-display" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-[0.3em]"></p>
        </header>
        <div id="game-content"></div>
    </div>

    <div class="max-w-md mx-auto w-full py-8 text-center border-t border-emerald-100 mt-8">
        <button onclick="allReset()" class="text-[10px] text-red-400 font-bold hover:bg-red-50 px-4 py-2 rounded-lg transition-colors uppercase tracking-widest border border-red-100">
            ⚠ ALL RESET / FORCE EXIT ⚠
        </button>
    </div>

    <script>
        // お題データベース
        const WORDS_KIDS = ["リンゴ", "ピカチュウ", "ドラえもん", "カレーライス", "うさぎ", "ランドセル", "ユーチューブ", "にんじゃ", "おにぎり", "すべりだい", "ひまわり", "ペンギン", "サッカー", "ケーキ"];
        const WORDS_ADULT = ["忖度", "確定申告", "マインドフルネス", "デジャヴ", "インフラ", "既得権益", "パラダイムシフト", "ワークライフバランス", "メタファー", "コンプライアンス", "イノベーション"];
        
        const firebaseConfig = {
            apiKey: "AIzaSyBmzPmehSaV--mn0Hd0S-fd97nf5RX4Dvg",
            authDomain: "membertoiro.firebaseapp.com",
            databaseURL: "https://membertoiro-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "membertoiro",
            storageBucket: "membertoiro.firebasestorage.app",
            messagingSenderId: "858132874746",
            appId: "1:858132874746:web:9d6e1156a350dd396b9043"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'default-room';
        const roomRef = db.ref("justone_v3/" + roomId);
        document.getElementById('room-display').innerText = "ROOM: " + roomId;

        let myName = localStorage.getItem("jo-name") || "";
        let myRole = localStorage.getItem("jo-role") || ""; 
        let gameState = null;

        roomRef.on("value", (snapshot) => {
            gameState = snapshot.val();
            // 全員強制退出チェック
            if (myName && !gameState) {
                localStorage.clear();
                location.reload();
                return;
            }
            render();
        });

        async function joinGame(role) {
            const input = document.getElementById('name-input');
            const name = input ? input.value.trim() : "";
            if (!name) { alert("名前を入力してください"); return; }
            myName = name; myRole = role;
            localStorage.setItem("jo-name", name);
            localStorage.setItem("jo-role", role);
            
            const snap = await roomRef.get();
            let data = snap.val();
            if (!data) {
                await roomRef.set({ phase: 'setup', members: [name], host: (role === 'host' ? name : ""), guesserIdx: 0 });
            } else {
                let members = data.members || [];
                if (!members.includes(name)) members.push(name);
                await roomRef.update({ members: members, host: (role === 'host' ? name : (data.host || "")) });
            }
        }

        function startGame() {
            const mode = document.getElementById('word-mode').value;
            const rounds = parseInt(document.getElementById('rounds-input').value) || 10;
            let baseWords = mode === 'kids' ? WORDS_KIDS : (mode === 'adult' ? WORDS_ADULT : [...WORDS_KIDS, ...WORDS_ADULT]);
            const shuffled = baseWords.sort(() => 0.5 - Math.random());
            
            roomRef.update({
                phase: 'playing', totalRounds: rounds, currentRound: 1, score: 0,
                words: shuffled.slice(0, rounds), wordMode: mode, step: 'hinting', hints: {}, invalidHints: {}, lastResult: null
            });
        }

        function redrawWord() {
            if (myRole !== 'host') return;
            let baseWords = gameState.wordMode === 'kids' ? WORDS_KIDS : (gameState.wordMode === 'adult' ? WORDS_ADULT : [...WORDS_KIDS, ...WORDS_ADULT]);
            const newWord = baseWords[Math.floor(Math.random() * baseWords.length)];
            let newWords = [...gameState.words];
            newWords[gameState.currentRound - 1] = newWord;
            roomRef.update({ words: newWords, hints: {}, invalidHints: {} });
        }

        function submitHint() {
            const h1 = document.getElementById('hint-1').value.trim();
            const h2El = document.getElementById('hint-2');
            const h2 = h2El ? h2El.value.trim() : null;
            if (!h1) return;
            const myHints = [h1]; if (h2) myHints.push(h2);
            roomRef.child(`hints/${myName}`).set(myHints).then(() => {
                roomRef.once('value').then(snap => {
                    const curr = snap.val();
                    const hintCount = Object.keys(curr.hints || {}).length;
                    if (hintCount >= (curr.members.length - 1)) roomRef.update({ step: 'comparing' });
                });
            });
        }

        function toggleInvalid(hintText) {
            let currentInvalids = gameState.invalidHints || {};
            currentInvalids[hintText] = !currentInvalids[hintText];
            roomRef.child('invalidHints').set(currentInvalids);
        }

        function judge(isCorrect) {
            if (myRole !== 'host') return;
            const word = gameState.words[gameState.currentRound - 1];
            // 全員に演出を見せるためDBに書き込む
            roomRef.update({ lastResult: { isCorrect, word } });
            
            setTimeout(() => {
                let nextScore = gameState.score + (isCorrect ? 1 : 0);
                if (gameState.currentRound < gameState.totalRounds) {
                    roomRef.update({
                        currentRound: gameState.currentRound + 1, score: nextScore,
                        step: 'hinting', hints: {}, invalidHints: {}, lastResult: null
                    });
                } else {
                    roomRef.update({ phase: 'result', score: nextScore, lastResult: null });
                }
            }, 3000);
        }

        function allReset() {
            if (confirm("【警告】部屋を解散し、全員を強制退出させます。よろしいですか？")) {
                roomRef.remove();
            }
        }

        function render() {
            const container = document.getElementById('game-content');
            
            // 演出オーバーレイの処理
            if (gameState?.lastResult) {
                const res = gameState.lastResult;
                if (!document.getElementById('effect-overlay')) {
                    const div = document.createElement('div');
                    div.id = 'effect-overlay';
                    div.className = `result-overlay ${res.isCorrect ? 'bg-emerald-500/95' : 'bg-rose-500/95'} flex-col text-white`;
                    div.innerHTML = `<div class="text-9xl mb-4">${res.isCorrect ? '◯' : '✕'}</div><div class="text-xl font-bold mb-2">${res.isCorrect ? '正解！' : '不正解...'}</div><div class="text-4xl font-black bg-white text-slate-800 px-6 py-2 rounded-2xl shadow-xl">${res.word}</div>`;
                    document.body.appendChild(div);
                }
            } else {
                const oldOverlay = document.getElementById('effect-overlay');
                if (oldOverlay) oldOverlay.remove();
            }

            // 未ログイン時：入力欄がある場合は中身を上書きしない
            if (!myName) {
                if (container.querySelector('#name-input')) return;
                const hostExists = !!(gameState && gameState.host);
                container.innerHTML = `<div class="bg-white p-8 rounded-3xl shadow-xl fade-in text-left">
                    <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase text-center tracking-widest">Entry</p>
                    <input id="name-input" type="text" placeholder="名前" class="w-full mb-6 border-2 p-4 rounded-2xl font-bold text-center outline-none focus:border-emerald-500">
                    <button onclick="joinGame('host')" class="w-full ${hostExists?'bg-slate-50 text-slate-300':'bg-emerald-600 text-white'} h-14 rounded-2xl font-bold mb-3" ${hostExists?'disabled':''}>${hostExists ? 'ホスト入室済み' : 'ホストとして参加'}</button>
                    <button onclick="joinGame('guest')" class="w-full border-2 border-emerald-100 text-emerald-600 h-14 rounded-2xl font-bold">ゲストとして参加</button>
                </div>`;
                return;
            }

            // 以降、ログイン済みの描画
            if (!gameState || gameState.phase === 'setup') {
                const members = gameState?.members || [myName];
                container.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-lg fade-in">
                    <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase text-center">Players (${members.length}/7)</p>
                    <div class="flex flex-wrap justify-center gap-2 mb-6">
                        ${members.map((m, i) => `<button onclick="myRole==='host' && roomRef.update({guesserIdx:${i}})" class="px-4 py-2 rounded-full font-bold text-xs transition-all ${gameState?.guesserIdx === i ? 'bg-orange-500 text-white scale-110 shadow-md' : 'bg-emerald-50 text-emerald-600'}">${gameState?.guesserIdx === i ? '★ ' : ''}${m}</button>`).join('')}
                    </div>
                    ${myRole === 'host' ? `
                        <div class="border-t pt-6 space-y-4 text-left">
                            <label class="text-[10px] font-bold text-slate-400 ml-2">難易度</label>
                            <select id="word-mode" class="w-full border-2 p-3 rounded-xl font-bold bg-slate-50">
                                <option value="all">すべて</option>
                                <option value="kids">キッズ (小学生向け)</option>
                                <option value="adult">大人 (難しい単語)</option>
                            </select>
                            <label class="text-[10px] font-bold text-slate-400 ml-2">ラウンド数</label>
                            <input id="rounds-input" type="number" value="10" class="w-full border-2 p-3 rounded-xl font-bold">
                            <button onclick="startGame()" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-lg">ゲーム開始</button>
                        </div>
                    ` : `<p class="p-8 text-emerald-500 font-bold animate-pulse text-sm text-center italic">ホストの開始を待っています...</p>`}
                </div>`;
            } else if (gameState.phase === 'playing') {
                const isGuesser = gameState.members[gameState.guesserIdx] === myName;
                const currentWord = gameState.words[gameState.currentRound - 1];
                let header = `<div class="mb-4 flex justify-between items-center px-2 text-[10px] font-black text-slate-400">
                    <span>ROUND ${gameState.currentRound} / ${gameState.totalRounds}</span>
                    <span class="text-orange-500">★ ${gameState.members[gameState.guesserIdx]}</span>
                </div>`;

                if (gameState.step === 'hinting') {
                    if (isGuesser) {
                        container.innerHTML = header + `<div class="bg-white p-12 rounded-[3rem] shadow-xl text-center font-bold text-slate-400 animate-pulse">ヒント待機中...</div>`;
                    } else {
                        // 入力中なら上書きしない
                        if (container.querySelector('#hint-1')) return;
                        const needsTwo = gameState.members.length <= 4;
                        const hasSubmitted = gameState.hints && gameState.hints[myName];
                        container.innerHTML = header + `<div class="bg-white p-6 rounded-[2rem] shadow-xl">
                            <p class="text-[10px] font-bold text-emerald-500 mb-1 uppercase text-center">お題</p>
                            <h2 class="text-3xl font-black text-slate-800 mb-4 text-center">${currentWord}</h2>
                            ${myRole === 'host' ? `<button onclick="redrawWord()" class="w-full text-[10px] text-orange-500 font-bold mb-6 hover:underline">お題を引き直す</button>` : ''}
                            ${hasSubmitted ? `<p class="text-center py-10 text-slate-300 font-bold italic">送信完了。待機中...</p>` : `
                                <input id="hint-1" type="text" placeholder="ヒント1" class="w-full border-2 p-4 rounded-xl font-bold mb-3 outline-none">
                                ${needsTwo ? `<input id="hint-2" type="text" placeholder="ヒント2" class="w-full border-2 p-4 rounded-xl font-bold mb-3 outline-none">` : ''}
                                <button onclick="submitHint()" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-md">送信</button>
                            `}
                        </div>`;
                    }
                } else if (gameState.step === 'comparing') {
                    const allHints = [];
                    Object.values(gameState.hints || {}).forEach(arr => allHints.push(...arr));
                    const counts = {}; allHints.forEach(h => counts[h] = (counts[h] || 0) + 1);

                    container.innerHTML = header + `<div class="bg-white p-6 rounded-[2rem] shadow-xl">
                        <h2 class="text-sm font-bold text-slate-400 mb-4">${isGuesser ? '精査されています...' : '【全員で確認】被りをタップして除外'}</h2>
                        ${isGuesser ? `<p class="p-10 text-center font-bold text-slate-300 animate-pulse">回答者はまだ見えません</p>` : `
                            <p class="text-[10px] text-slate-400 mb-4 font-bold text-center">お題: ${currentWord}</p>
                            <div class="flex flex-wrap justify-center gap-2 mb-8">
                                ${allHints.map(h => {
                                    const isInvalid = (gameState.invalidHints && gameState.invalidHints[h]) || counts[h] > 1;
                                    return `<button onclick="toggleInvalid('${h}')" class="px-4 py-2 rounded-xl font-bold ${isInvalid ? 'invalid-hint' : 'bg-emerald-50 text-emerald-600 border-2 border-emerald-100 shadow-sm'}">${h} ${counts[h]>1?'(被り)':''}</button>`;
                                }).join('')}
                            </div>
                            ${myRole === 'host' ? `<button onclick="roomRef.update({step:'guessing'})" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-lg">回答者にヒントを公開</button>` : ''}
                        `}
                    </div>`;
                } else if (gameState.step === 'guessing') {
                    const allHints = [];
                    Object.values(gameState.hints || {}).forEach(arr => allHints.push(...arr));
                    const counts = {}; allHints.forEach(h => counts[h] = (counts[h] || 0) + 1);
                    const visibleHints = allHints.filter(h => !gameState.invalidHints?.[h] && counts[h] === 1);

                    container.innerHTML = header + `<div class="bg-white p-6 rounded-[2rem] shadow-xl">
                        <div class="flex flex-wrap justify-center gap-3 mb-10">
                            ${visibleHints.length ? visibleHints.map(h => `<span class="bg-emerald-600 text-white px-5 py-3 rounded-2xl font-black text-lg shadow-lg">${h}</span>`).join('') : '<p class="text-slate-300 font-bold text-center">有効なヒントが消滅しました...</p>'}
                        </div>
                        ${myRole === 'host' ? `
                            <div class="border-t pt-6 text-center">
                                <p class="font-black text-xl mb-6 text-slate-800">答え：${currentWord}</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="judge(true)" class="bg-emerald-500 text-white h-14 rounded-xl font-bold shadow-md">正解 ◯</button>
                                    <button onclick="judge(false)" class="bg-rose-500 text-white h-14 rounded-xl font-bold shadow-md">不正解 ✕</button>
                                </div>
                            </div>
                        ` : `<div class="text-center font-bold text-orange-500">${isGuesser ? '口頭で答えてください！' : '回答を見守っています'}</div>`}
                    </div>`;
                }
            } else if (gameState.phase === 'result') {
                const rate = Math.round((gameState.score / gameState.totalRounds) * 100);
                container.innerHTML = `<div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center fade-in">
                    <h2 class="text-6xl font-black mb-4 text-slate-800">${rate}<span class="text-2xl">%</span></h2>
                    <p class="text-sm font-bold text-slate-400 mb-10">${gameState.score} / ${gameState.totalRounds} Correct</p>
                    ${myRole === 'host' ? `<button onclick="roomRef.update({phase:'setup'})" class="w-full bg-slate-800 text-white h-16 rounded-2xl font-bold shadow-xl">もう一度遊ぶ</button>` : ''}
                </div>`;
            }
        }
        render();
    </script>
</body>
</html>
