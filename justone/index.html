<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just One Online - Hyper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .invalid-hint { text-decoration: line-through; opacity: 0.3; background-color: #e2e8f0 !important; color: #94a3b8 !important; }
        .result-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .stamp-anim { animation: stamp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stamp { from { transform: scale(3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-emerald-50 min-h-screen p-4 text-slate-800 flex flex-col text-center">

    <div id="app" class="max-w-md mx-auto flex-grow w-full">
        <header class="mb-6 pt-4">
            <h1 class="text-3xl font-black text-emerald-600 italic tracking-tighter">Just One</h1>
            <p id="room-display" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-[0.3em]"></p>
        </header>
        <div id="game-content"></div>
    </div>

    <div class="max-w-md mx-auto w-full py-8 border-t border-emerald-100 mt-8">
        <button onclick="allReset()" class="text-[10px] text-rose-300 font-bold hover:bg-rose-50 px-4 py-2 rounded-lg uppercase tracking-widest border border-rose-100">--- Emergency Reset ---</button>
    </div>

    <script>
        // --- 設定 ---
        const WORDS_JSON_URL = 'words.json';
        const firebaseConfig = {
            apiKey: "AIzaSyBmzPmehSaV--mn0Hd0S-fd97nf5RX4Dvg",
            authDomain: "membertoiro.firebaseapp.com",
            databaseURL: "https://membertoiro-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "membertoiro",
            storageBucket: "membertoiro.firebasestorage.app",
            messagingSenderId: "858132874746",
            appId: "1:858132874746:web:9d6e1156a350dd396b9043"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'default-room';
        const roomRef = db.ref("justone_v3/" + roomId);
        document.getElementById('room-display').innerText = "ROOM: " + roomId;

        let WORDS_DATA = { kids: [], standard: [], hard: [] };
        let myName = localStorage.getItem("jo-name") || "";
        let myRole = localStorage.getItem("jo-role") || ""; 
        let gameState = null;

        const TITLES = {
            100: "💖 運命共同体！神の絆 💖", 90: "🔥 超絶なかよし無双 🔥", 80: "✨ 阿吽の呼吸チーム ✨",
            70: "🤝 かなりキテる仲良し 🤝", 60: "🎵 息ピッタリの予感 🎵", 50: "🌱 これからもっと仲良し 🌱",
            40: "💦 ちょっぴり迷走コンビ 💦", 30: "🌀 かみあわない面白さ 🌀", 20: "💣 逆に奇跡のバラバラ 💣",
            10: "🏜 砂漠の孤独チーム 🏜", 0: "👻 もはや伝説の不一致 👻"
        };

        async function loadWords() {
            try {
                const res = await fetch(WORDS_JSON_URL);
                WORDS_DATA = await res.json();
            } catch (e) { alert("JSONの読み込みに失敗しました"); }
        }
        loadWords();

        roomRef.on("value", (snapshot) => {
            gameState = snapshot.val();
            if (myName && !gameState) { localStorage.clear(); location.reload(); return; }
            render();
        });

        async function joinGame(role) {
            const name = document.getElementById('name-input')?.value.trim();
            if (!name) return alert("名前を入れてね");
            myName = name; myRole = role;
            localStorage.setItem("jo-name", name);
            localStorage.setItem("jo-role", role);
            const snap = await roomRef.get();
            let data = snap.val() || { members: [], host: "" };
            let members = data.members || [];
            if (!members.includes(name)) members.push(name);
            await roomRef.update({ members, host: (role === 'host' ? name : (data.host || "")) });
        }

        function startGame() {
            const mode = document.getElementById('word-mode').value;
            const rounds = parseInt(document.getElementById('rounds-input').value) || 10;
            let pool = [];
            if (mode === 'kids') pool = WORDS_DATA.kids;
            else if (mode === 'standard') pool = [...WORDS_DATA.kids, ...WORDS_DATA.standard];
            else pool = [...WORDS_DATA.kids, ...WORDS_DATA.standard, ...WORDS_DATA.hard];
            
            const shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, rounds);
            roomRef.update({
                phase: 'playing', totalRounds: rounds, currentRound: 1, score: 0,
                words: shuffled, wordMode: mode, step: 'guesser_select', hints: {}, invalidHints: {}, lastResult: null, guesserIdx: 0
            });
        }

        function submitHint() {
            const h1 = document.getElementById('hint-1').value.trim();
            const h2 = document.getElementById('hint-2')?.value.trim();
            if (!h1) return;
            let myHints = [h1]; if (h2) myHints.push(h2);
            roomRef.child(`hints/${myName}`).set(myHints).then(() => {
                roomRef.once('value').then(snap => {
                    const s = snap.val();
                    if (Object.keys(s.hints || {}).length >= (s.members.length - 1)) roomRef.update({ step: 'comparing' });
                });
            });
        }

        function toggleInvalid(h) {
            let inv = gameState.invalidHints || {};
            inv[h] = !inv[h];
            roomRef.child('invalidHints').set(inv);
        }

        function judge(isCorrect) { roomRef.update({ lastResult: { isCorrect, word: gameState.words[gameState.currentRound - 1] } }); }

        function nextRound() {
            let sc = gameState.score + (gameState.lastResult.isCorrect ? 1 : 0);
            if (gameState.currentRound < gameState.totalRounds) {
                roomRef.update({ currentRound: gameState.currentRound + 1, score: sc, step: 'guesser_select', lastResult: null, hints: {}, invalidHints: {} });
            } else {
                roomRef.update({ phase: 'result', score: sc, lastResult: null });
            }
        }

        function allReset() { if (confirm("リセットしますか？")) roomRef.remove(); }

        function render() {
            const container = document.getElementById('game-content');
            if (!container) return;

            // 演出オーバーレイの制御
            if (gameState?.lastResult) {
                if (!document.getElementById('effect-overlay')) {
                    const isGuesserHost = (gameState.host === gameState.members[gameState.guesserIdx]);
                    const canGoNext = isGuesserHost ? (myRole === 'guest') : (myRole === 'host');
                    const div = document.createElement('div');
                    div.id = 'effect-overlay';
                    div.className = `result-overlay ${gameState.lastResult.isCorrect ? 'bg-emerald-500/95' : 'bg-rose-500/95'} flex-col text-white`;
                    div.innerHTML = `
                        <div class="text-9xl mb-4 stamp-anim">${gameState.lastResult.isCorrect ? '◯' : '✕'}</div>
                        <div class="text-4xl font-black bg-white text-slate-800 px-6 py-2 rounded-2xl mb-10">${gameState.lastResult.word}</div>
                        ${canGoNext ? `<button onclick="nextRound()" class="bg-white text-slate-800 px-10 py-4 rounded-full font-black shadow-xl">次へ</button>` : `<p class="animate-pulse">ホストの操作を待っています</p>`}
                    `;
                    document.body.appendChild(div);
                }
            } else { document.getElementById('effect-overlay')?.remove(); }

            if (!myName) {
                container.innerHTML = `<div class="bg-white p-8 rounded-3xl shadow-xl fade-in">
                    <input id="name-input" type="text" placeholder="名前を入力" class="w-full mb-6 border-2 p-4 rounded-2xl font-bold text-center outline-none focus:border-emerald-500">
                    <button onclick="joinGame('host')" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold mb-3 shadow-lg">ホストとして入室</button>
                    <button onclick="joinGame('guest')" class="w-full border-2 border-emerald-100 text-emerald-600 h-14 rounded-2xl font-bold">ゲストとして入室</button>
                </div>`;
                return;
            }

            if (!gameState || gameState.phase === 'setup') {
                const members = gameState?.members || [myName];
                container.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-lg fade-in">
                    <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase">Members</p>
                    <div class="flex flex-wrap justify-center gap-2 mb-8">${members.map((m, i) => `<button onclick="myRole==='host' && roomRef.update({guesserIdx:${i}})" class="px-4 py-2 rounded-full font-bold text-xs ${gameState?.guesserIdx === i ? 'bg-orange-500 text-white' : 'bg-emerald-50 text-emerald-600'}">${m}</button>`).join('')}</div>
                    ${myRole === 'host' ? `
                        <div class="space-y-4 text-left">
                            <label class="text-[10px] font-bold text-slate-400 ml-2">DIFFICULTY</label>
                            <select id="word-mode" class="w-full border-2 p-3 rounded-xl font-bold bg-slate-50"><option value="kids">キッズ</option><option value="standard">一般 (+キッズ)</option><option value="hard">むずかしい (すべて)</option></select>
                            <label class="text-[10px] font-bold text-slate-400 ml-2">ROUNDS</label>
                            <input id="rounds-input" type="number" value="10" class="w-full border-2 p-3 rounded-xl font-bold">
                            <button onclick="startGame()" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-lg">ゲーム開始！</button>
                        </div>` : `<p class="p-8 text-emerald-500 font-bold animate-pulse">ホストの開始を待っています...</p>`}
                </div>`;
            } else if (gameState.phase === 'playing') {
                const isGuesser = gameState.members[gameState.guesserIdx] === myName;
                const head = `<div class="mb-4 flex justify-between px-2 text-[10px] font-black text-slate-400"><span>ROUND ${gameState.currentRound}/${gameState.totalRounds}</span><span>回答者: ${gameState.members[gameState.guesserIdx]}</span></div>`;

                if (gameState.step === 'guesser_select') {
                    container.innerHTML = head + `<div class="bg-white p-6 rounded-3xl shadow-lg"><p class="text-sm font-bold text-slate-400 mb-4">次、だれが答える？</p><div class="flex flex-wrap justify-center gap-2 mb-6">${gameState.members.map((m, i) => `<button onclick="myRole==='host' && roomRef.update({guesserIdx:${i}})" class="px-4 py-2 rounded-full font-bold text-xs ${gameState.guesserIdx === i ? 'bg-orange-500 text-white' : 'bg-emerald-50 text-emerald-600'}">${m}</button>`).join('')}</div>${myRole === 'host' ? `<button onclick="roomRef.update({step:'hinting'})" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-md">決定</button>` : ''}</div>`;
                } else if (gameState.step === 'hinting') {
                    if (isGuesser) container.innerHTML = head + `<div class="bg-white p-12 rounded-[3rem] shadow-xl font-bold text-slate-400 animate-pulse">みんながヒントを書いてるよ...</div>`;
                    else {
                        const hasSubmitted = gameState.hints && gameState.hints[myName];
                        container.innerHTML = head + `<div class="bg-white p-6 rounded-[2rem] shadow-xl"><p class="text-[10px] font-bold text-emerald-500 mb-1">お題</p><h2 class="text-3xl font-black text-slate-800 mb-6">${gameState.words[gameState.currentRound-1]}</h2>${hasSubmitted ? `<p class="py-10 text-slate-300 font-bold">送信しました！</p>` : `<input id="hint-1" type="text" placeholder="ヒント1" class="w-full border-2 p-4 rounded-xl font-bold mb-3 focus:border-emerald-500 outline-none">${gameState.members.length<=4?`<input id="hint-2" type="text" placeholder="ヒント2" class="w-full border-2 p-4 rounded-xl font-bold mb-3 focus:border-emerald-500 outline-none">`:''}<button onclick="submitHint()" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold">送信</button>`}</div>`;
                    }
                } else if (gameState.step === 'comparing') {
                    const allH = []; Object.values(gameState.hints || {}).forEach(a => allH.push(...a));
                    const counts = {}; allH.forEach(h => counts[h] = (counts[h] || 0) + 1);
                    const isGuesserHost = (gameState.host === gameState.members[gameState.guesserIdx]);
                    const canControl = isGuesserHost ? (myRole === 'guest') : (myRole === 'host');
                    container.innerHTML = head + `<div class="bg-white p-6 rounded-[2rem] shadow-xl"><h2 class="text-sm font-bold text-slate-400 mb-4">${isGuesser ? '精査中...' : '被りを消して！'}</h2>${isGuesser ? `<p class="p-10 text-slate-300 font-bold">まだ見えません</p>` : `<div class="flex flex-wrap justify-center gap-2 mb-8">${allH.map(h => `<button onclick="toggleInvalid('${h}')" class="px-4 py-2 rounded-xl font-bold ${ (gameState.invalidHints?.[h] || counts[h]>1) ? 'invalid-hint' : 'bg-emerald-50 text-emerald-600 border-2 border-emerald-100'}">${h}</button>`).join('')}</div>${canControl ? `<button onclick="roomRef.update({step:'guessing'})" class="w-full bg-emerald-600 text-white h-14 rounded-2xl font-bold shadow-xl animate-bounce">ヒントを公開！</button>` : ''}`}</div>`;
                } else if (gameState.step === 'guessing') {
                    const allH = []; Object.values(gameState.hints || {}).forEach(a => allH.push(...a));
                    const counts = {}; allH.forEach(h => counts[h] = (counts[h] || 0) + 1);
                    const visible = allH.filter(h => !gameState.invalidHints?.[h] && counts[h] === 1);
                    const isGuesserHost = (gameState.host === gameState.members[gameState.guesserIdx]);
                    const canJudge = isGuesserHost ? (myRole === 'guest') : (myRole === 'host');
                    container.innerHTML = head + `<div class="bg-white p-6 rounded-[2rem] shadow-xl"><div class="flex flex-wrap justify-center gap-3 mb-10">${visible.length ? visible.map(h => `<span class="bg-emerald-600 text-white px-5 py-3 rounded-2xl font-black text-lg shadow-lg">${h}</span>`).join('') : '<p class="text-slate-300 font-bold italic">ヒントが全滅しました...</p>'}</div>${canJudge ? `<div class="border-t pt-6"><p class="font-black mb-4">答え: ${gameState.words[gameState.currentRound-1]}</p><div class="grid grid-cols-2 gap-3"><button onclick="judge(true)" class="bg-emerald-500 text-white h-14 rounded-xl font-bold shadow-md">◯ 正解</button><button onclick="judge(false)" class="bg-rose-500 text-white h-14 rounded-xl font-bold shadow-md">✕ 不正解</button></div></div>` : `<div class="text-orange-500 font-bold animate-bounce">${isGuesser ? '答えを言ってね！' : '見守り中...'}</div>`}</div>`;
                }
            } else if (gameState.phase === 'result') {
                const rate = Math.round((gameState.score / gameState.totalRounds) * 100);
                container.innerHTML = `<div class="bg-white p-10 rounded-[3rem] shadow-2xl fade-in"><p class="text-xs font-bold text-slate-400 mb-2 uppercase">Team Bond</p><h2 id="final-rate" class="text-7xl font-black mb-4 text-slate-800">0%</h2><div id="称号-box" class="opacity-0 scale-50 transition-all duration-700 bg-orange-100 text-orange-600 p-6 rounded-2xl font-black text-xl mb-10"></div>${myRole === 'host' ? `<button onclick="roomRef.update({phase:'setup'})" class="w-full bg-slate-800 text-white h-16 rounded-2xl font-bold shadow-xl">タイトルへ</button>` : ''}</div>`;
                setTimeout(() => {
                    let c = 0; const h2 = document.getElementById('final-rate');
                    const t = setInterval(() => {
                        if (c >= rate) { c = rate; clearInterval(t); const box = document.getElementById('称号-box'); box.innerText = TITLES[Math.floor(rate/10)*10]; box.classList.remove('opacity-0', 'scale-50'); box.classList.add('stamp-anim'); }
                        h2.innerText = c + "%"; c++;
                    }, 20);
                }, 500);
            }
        }
        render();
    </script>
</body>
</html>
