<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Just One Online Deluxe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

    :root {
      --brand: #10b981;
      --brand-dark: #059669;
      --ink: #0f172a;
      --paper: #ffffff;
      --soft: #ecfdf5;
      --warn: #f59e0b;
      --bad: #fb7185;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 15% 10%, rgba(16,185,129,.22), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(245,158,11,.18), transparent 26%),
        linear-gradient(180deg, #f0fdf4 0%, #f8fafc 50%, #ecfdf5 100%);
      color: var(--ink);
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 18px 50px rgba(15,23,42,.08);
    }

    .card {
      background: var(--paper);
      border: 1px solid rgba(15,23,42,.06);
      box-shadow: 0 16px 36px rgba(15,23,42,.08);
    }

    .btn {
      min-height: 54px;
      border-radius: 20px;
      font-weight: 900;
      transition: transform .08s ease, filter .2s ease, box-shadow .2s ease;
      user-select: none;
    }
    .btn:active { transform: translateY(2px) scale(.99); }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      box-shadow: 0 12px 24px rgba(16,185,129,.22);
    }
    .btn-dark {
      color: white;
      background: linear-gradient(135deg, #0f172a, #334155);
      box-shadow: 0 12px 24px rgba(15,23,42,.18);
    }
    .btn-soft {
      color: #047857;
      background: #ecfdf5;
      border: 2px solid #a7f3d0;
    }
    .btn-warn {
      color: white;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      box-shadow: 0 12px 24px rgba(245,158,11,.2);
    }
    .btn-bad {
      color: white;
      background: linear-gradient(135deg, #fb7185, #e11d48);
      box-shadow: 0 12px 24px rgba(225,29,72,.18);
    }
    .btn-ghost {
      color: #64748b;
      background: rgba(255,255,255,.65);
      border: 1px solid #e2e8f0;
    }

    .fade-in { animation: fadeIn .34s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pop { animation: pop .38s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes pop {
      from { opacity: 0; transform: scale(.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .pulse-soft { animation: pulseSoft 1.7s ease-in-out infinite; }
    @keyframes pulseSoft {
      0%,100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-2px); opacity: .72; }
    }
    .stamp-ok { animation: stamp .55s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes stamp {
      from { transform: rotate(-8deg) scale(2.2); opacity: 0; filter: blur(3px); }
      to { transform: rotate(-8deg) scale(1); opacity: 1; filter: blur(0); }
    }

    .invalid {
      text-decoration: line-through;
      opacity: .42;
      filter: grayscale(1);
      background: #e2e8f0 !important;
      color: #64748b !important;
      border-color: #cbd5e1 !important;
    }

    .mini-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #64748b;
    }

    .input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #d1fae5;
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      font-weight: 900;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
    }
    .input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 5px rgba(16,185,129,.12);
    }

    .shake { animation: shake .32s ease-in-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    .confetti-piece {
      position: fixed;
      width: 9px;
      height: 14px;
      top: -20px;
      border-radius: 3px;
      z-index: 120;
      animation: fall 1.7s linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .bottom-safe { padding-bottom: max(18px, env(safe-area-inset-bottom)); }

    @media (max-width: 420px) {
      .btn { min-height: 52px; border-radius: 18px; }
      .input { min-height: 54px; border-radius: 18px; }
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col px-4 pt-4 bottom-safe">
    <header class="glass rounded-[2rem] px-4 py-4 mb-4 sticky top-3 z-30">
      <div class="flex items-center justify-between gap-3">
        <div class="text-left">
          <h1 class="text-3xl font-black tracking-tighter text-emerald-600 italic leading-none">Just One</h1>
          <div id="room-display" class="text-[10px] font-black text-slate-400 mt-1 uppercase tracking-[.22em]"></div>
        </div>
        <div class="flex gap-2">
          <button id="sound-btn" onclick="toggleSound()" class="w-11 h-11 rounded-2xl bg-white border border-emerald-100 shadow-sm font-black text-emerald-600" title="sound">♪</button>
          <button onclick="copyRoomUrl()" class="w-11 h-11 rounded-2xl bg-white border border-emerald-100 shadow-sm font-black text-emerald-600" title="copy">🔗</button>
        </div>
      </div>
      <div id="hud" class="mt-3"></div>
    </header>

    <main id="game-content" class="flex-grow"></main>

    <footer class="py-7 text-center">
      <div id="host-tools" class="mb-4"></div>
      <button onclick="allReset()" class="text-[10px] text-rose-300 font-black hover:bg-rose-50 px-4 py-2 rounded-lg uppercase tracking-widest border border-rose-100 bg-white/50">
        ルームを解散
      </button>
    </footer>
  </div>

  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-6 z-[200] hidden px-5 py-3 rounded-2xl bg-slate-900 text-white text-xs font-black shadow-2xl"></div>

  <script>
    // ==============================
    // Firebase
    // ==============================
    const firebaseConfig = {
      apiKey: "AIzaSyBmzPmehSaV--mn0Hd0S-fd97nf5RX4Dvg",
      authDomain: "membertoiro.firebaseapp.com",
      databaseURL: "https://membertoiro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "membertoiro",
      storageBucket: "membertoiro.firebasestorage.app",
      messagingSenderId: "858132874746",
      appId: "1:858132874746:web:9d6e1156a350dd396b9043"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get("room") || "default-room";
    const roomRef = db.ref("justone_v4/" + roomId + "_deluxe");
    document.getElementById("room-display").innerText = "ROOM: " + roomId;

    // ==============================
    // Local State
    // ==============================
    let myName = localStorage.getItem("jod-name") || "";
    let myRole = localStorage.getItem("jod-role") || "";
    let gameState = null;
    let lastPhaseKey = "";
    let soundEnabled = localStorage.getItem("jod-sound") === "on";
    let audioCtx = null;

    const FALLBACK_WORDS = {
      kids: ["りんご", "ねこ", "カレー", "公園", "時計", "おばけ", "えんぴつ", "アイス", "自転車", "花火", "たまご", "学校", "動物園", "おにぎり", "電車"],
      standard: ["映画館", "温泉", "スマートフォン", "誕生日", "宇宙", "コンビニ", "旅行", "ラーメン", "カラオケ", "野球", "焼肉", "美容院", "新幹線", "図書館", "クリスマス", "財布", "台風", "キャンプ", "病院", "居酒屋"],
      hard: ["人工知能", "確定申告", "心理戦", "二酸化炭素", "相対性理論", "地方創生", "資本主義", "文化祭", "免許更新", "副作用", "サブスクリプション", "株主総会", "防災訓練", "著作権", "地球温暖化"],
      party: ["飲み会", "初恋", "遅刻", "黒歴史", "モテ期", "二次会", "上司", "同窓会", "カップル", "秘密", "寝坊", "修学旅行", "プレゼント", "告白", "失恋"]
    };
    let WORDS_DATA = JSON.parse(JSON.stringify(FALLBACK_WORDS));

    const TITLES = [
      { min: 100, text: "💖 運命共同体！神の絆 💖" },
      { min: 90, text: "🔥 超絶なかよし無双 🔥" },
      { min: 80, text: "✨ 阿吽の呼吸チーム ✨" },
      { min: 70, text: "🤝 かなりキテる仲良し 🤝" },
      { min: 60, text: "🎵 息ピッタリの予感 🎵" },
      { min: 50, text: "🌱 これからもっと仲良し 🌱" },
      { min: 40, text: "💦 ちょっぴり迷走チーム 💦" },
      { min: 30, text: "🌀 かみあわない面白さ 🌀" },
      { min: 20, text: "💣 逆に奇跡のバラバラ 💣" },
      { min: 10, text: "🏜 砂漠の孤独チーム 🏜" },
      { min: 0, text: "👻 もはや伝説の不一致 👻" }
    ];

    // 表記ゆれ辞書。必要に応じて足してください。
    const SYNONYM_GROUPS = [
      ["スマホ", "スマートフォン", "携帯", "ケータイ"],
      ["からあげ", "唐揚げ", "から揚げ"],
      ["マック", "マクドナルド", "まっく"],
      ["ディズニー", "ディズニーランド", "TDL", "東京ディズニーランド"],
      ["USJ", "ユニバ", "ユニバーサルスタジオジャパン"],
      ["コンビニ", "コンビニエンスストア"],
      ["アイス", "アイスクリーム"],
      ["チャリ", "自転車"],
      ["パソコン", "PC", "ピーシー"],
      ["テレビ", "TV"],
      ["ラーメン", "らーめん", "拉麺"],
      ["ねこ", "猫", "ネコ"],
      ["いぬ", "犬", "イヌ"],
      ["りんご", "リンゴ", "林檎"],
      ["みかん", "ミカン", "蜜柑"]
    ];

    const SYNONYM_CANONICAL = {};
    for (const group of SYNONYM_GROUPS) {
      const canonical = baseNormalize(group[0]);
      for (const word of group) SYNONYM_CANONICAL[baseNormalize(word)] = canonical;
    }

    async function loadWords() {
      try {
        const res = await fetch("words.json", { cache: "no-store" });
        if (!res.ok) throw new Error("words.json not found");
        const data = await res.json();
        if (data && typeof data === "object") WORDS_DATA = { ...WORDS_DATA, ...data };
      } catch (e) {
        // words.jsonがない場合は内蔵ワードで動作
      }
    }

    // ==============================
    // Utilities
    // ==============================
    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[s]));
    }

    function uidName(name) {
      return String(name).replace(/[.#$/\[\]]/g, "_");
    }

    function baseNormalize(text) {
      let s = String(text ?? "").trim().normalize("NFKC").toLowerCase();
      // カタカナをひらがなへ
      s = s.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
      // 小文字かなを普通のかな寄せ
      const smallMap = { "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お","ゃ":"や","ゅ":"ゆ","ょ":"よ","っ":"つ","ゎ":"わ" };
      s = s.replace(/[ぁぃぅぇぉゃゅょっゎ]/g, ch => smallMap[ch] || ch);
      // 伸ばし棒、空白、記号を除去
      s = s.replace(/[ーｰ〜~\s　!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}。、，．・！？「」『』【】（）()［］\[\]<>＜＞]/g, "");
      return s;
    }

    function normalizeAnswer(text) {
      const b = baseNormalize(text);
      return SYNONYM_CANONICAL[b] || b;
    }

    function randId(len = 5) {
      const chars = "abcdefghijkmnpqrstuvwxyz23456789";
      let out = "";
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    function getMembers() {
      return Array.isArray(gameState?.members) ? gameState.members : [];
    }

    function getGuesser() {
      const members = getMembers();
      if (!members.length) return "";
      const idx = Number(gameState?.guesserIdx || 0) % members.length;
      return members[idx];
    }

    function getJudge() {
      const members = getMembers();
      const host = gameState?.host || "";
      const guesser = getGuesser();
      if (!members.length) return "";
      if (host && host !== guesser) return host;
      const gi = members.indexOf(guesser);
      return members[(gi + 1 + members.length) % members.length] || host || members[0];
    }

    function isHost() { return gameState?.host === myName; }
    function isGuesser() { return getGuesser() === myName; }
    function isJudge() { return getJudge() === myName; }

    function submittedClueCount() {
      const clues = gameState?.clues || {};
      return Object.keys(clues).filter(k => clues[k] && clues[k].text).length;
    }

    function cluePlayersNeeded() {
      return getMembers().filter(m => m !== getGuesser());
    }

    function everyoneSubmittedClues() {
      const needed = cluePlayersNeeded();
      const clues = gameState?.clues || {};
      return needed.length > 0 && needed.every(m => clues[uidName(m)]?.text);
    }

    function phaseKey() {
      return `${gameState?.phase || "none"}:${gameState?.currentRound || 0}:${gameState?.step || ""}:${gameState?.pendingCorrect ?? ""}`;
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.remove("hidden");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => t.classList.add("hidden"), 1800);
    }

    function buildRoomUrl() {
      const url = new URL(location.href);
      url.searchParams.set("room", roomId);
      return url.toString();
    }

    async function copyRoomUrl() {
      try {
        await navigator.clipboard.writeText(buildRoomUrl());
        playSound("tap");
        showToast("招待URLをコピーしました");
      } catch {
        prompt("このURLをコピーしてください", buildRoomUrl());
      }
    }

    // ==============================
    // Sound
    // ==============================
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, duration = .08, type = "sine", gain = .035, delay = 0) {
      if (!soundEnabled) return;
      ensureAudio();
      const now = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + .01);
      g.gain.exponentialRampToValueAtTime(.0001, now + duration);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + .03);
    }

    function playSound(kind) {
      if (!soundEnabled) return;
      if (kind === "tap") tone(520, .06, "triangle", .025);
      if (kind === "submit") { tone(660, .08, "sine", .03); tone(880, .08, "sine", .025, .08); }
      if (kind === "ready") { tone(520, .07); tone(740, .07, "sine", .025, .08); tone(990, .12, "triangle", .025, .16); }
      if (kind === "bad") { tone(180, .16, "sawtooth", .025); tone(120, .18, "sawtooth", .02, .12); }
      if (kind === "correct") { tone(523, .09); tone(659, .09, "sine", .03, .09); tone(784, .11, "sine", .03, .18); tone(1046, .18, "triangle", .035, .28); }
      if (kind === "wrong") { tone(220, .15, "sawtooth", .025); tone(165, .22, "sawtooth", .02, .14); }
      if (kind === "final") { [523,659,784,1046,1318].forEach((f,i)=>tone(f,.12,"triangle",.03,i*.09)); }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem("jod-sound", soundEnabled ? "on" : "off");
      updateSoundButton();
      if (soundEnabled) { ensureAudio(); playSound("ready"); showToast("サウンド ON"); }
      else showToast("サウンド OFF");
    }

    function updateSoundButton() {
      const b = document.getElementById("sound-btn");
      if (!b) return;
      b.textContent = soundEnabled ? "♪" : "×";
      b.className = soundEnabled
        ? "w-11 h-11 rounded-2xl bg-emerald-600 text-white border border-emerald-600 shadow-sm font-black"
        : "w-11 h-11 rounded-2xl bg-white border border-emerald-100 shadow-sm font-black text-slate-400";
    }

    function confetti() {
      const colors = ["#10b981", "#06b6d4", "#f59e0b", "#f43f5e", "#8b5cf6", "#facc15"];
      for (let i = 0; i < 34; i++) {
        const el = document.createElement("div");
        el.className = "confetti-piece";
        el.style.left = Math.random() * 100 + "vw";
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = Math.random() * .35 + "s";
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2300);
      }
    }

    // ==============================
    // Firebase listeners
    // ==============================
    loadWords().then(() => render());

    roomRef.on("value", snapshot => {
      gameState = snapshot.val();

      if (gameState && myRole === "host" && gameState.host && gameState.host !== myName) {
        myRole = "guest";
        localStorage.setItem("jod-role", "guest");
      }

      const pk = phaseKey();
      if (lastPhaseKey && pk !== lastPhaseKey) {
        if (gameState?.phase === "review") playSound("ready");
        if (gameState?.phase === "guess") playSound("ready");
        if (gameState?.phase === "roundResult") {
          playSound(gameState.pendingCorrect ? "correct" : "wrong");
          if (gameState.pendingCorrect) confetti();
        }
        if (gameState?.phase === "finalResult") playSound("final");
      }
      lastPhaseKey = pk;
      render();
    });

    // ==============================
    // Game Actions
    // ==============================
    function joinGame(role) {
      const input = document.getElementById("name-input");
      const name = input ? input.value.trim() : "";
      if (!name) {
        input?.classList.add("shake");
        setTimeout(() => input?.classList.remove("shake"), 350);
        playSound("bad");
        return;
      }

      roomRef.transaction(curr => {
        if (!curr) {
          return { phase: "setup", members: [name], host: role === "host" ? name : "", createdAt: Date.now() };
        }
        if (!curr.members) curr.members = [];
        if (role === "host" && curr.host && curr.host !== name) return;
        if (!curr.members.includes(name)) curr.members.push(name);
        if (role === "host" && !curr.host) curr.host = name;
        return curr;
      }, (error, committed, snapshot) => {
        if (error) return alert("入室エラーです。もう一度お試しください。");
        if (!committed) return alert("このルームにはすでにホストがいます。ゲストで入室してください。");
        myName = name;
        myRole = (role === "host" && snapshot.val()?.host === name) ? "host" : "guest";
        localStorage.setItem("jod-name", myName);
        localStorage.setItem("jod-role", myRole);
        playSound("submit");
        gameState = snapshot.val();
        render();
      });
    }

    function leaveLocal() {
      localStorage.removeItem("jod-name");
      localStorage.removeItem("jod-role");
      myName = "";
      myRole = "";
      render();
    }

    function allReset() {
      if (!confirm("ルームを解散しますか？全員の進行データが消えます。")) return;
      roomRef.remove();
      playSound("bad");
      setTimeout(() => location.reload(), 300);
    }

    function startGame() {
      if (!isHost()) return;
      const mode = document.getElementById("word-mode")?.value || "standard";
      const rounds = Math.max(1, Math.min(30, parseInt(document.getElementById("rounds-input")?.value || "10", 10)));
      const customText = document.getElementById("custom-words")?.value || "";
      const customWords = customText.split(/\n|,|、/).map(s => s.trim()).filter(Boolean);

      let pool = [];
      if (mode === "kids") pool = [...WORDS_DATA.kids];
      else if (mode === "standard") pool = [...WORDS_DATA.kids, ...WORDS_DATA.standard];
      else if (mode === "hard") pool = [...WORDS_DATA.kids, ...WORDS_DATA.standard, ...WORDS_DATA.hard];
      else if (mode === "party") pool = [...WORDS_DATA.standard, ...WORDS_DATA.party];
      else pool = Object.values(WORDS_DATA).flat();

      pool = [...new Set([...customWords, ...pool])].filter(Boolean);
      if (!pool.length) return alert("ワードがありません");

      const shuffled = pool.sort(() => Math.random() - .5).slice(0, rounds);
      const members = getMembers();
      if (members.length < 2) return alert("2人以上で開始してください。3人以上推奨です。");

      roomRef.update({
        phase: "clue",
        totalRounds: shuffled.length,
        currentRound: 1,
        score: 0,
        words: shuffled,
        wordMode: mode,
        guesserIdx: 0,
        clues: {},
        manualInvalid: {},
        pendingCorrect: null,
        guess: "",
        history: {},
        roundStartedAt: Date.now()
      });
      playSound("submit");
    }

    function submitClue() {
      const input = document.getElementById("clue-input");
      const text = input ? input.value.trim() : "";
      if (!text) {
        input?.classList.add("shake");
        setTimeout(() => input?.classList.remove("shake"), 350);
        playSound("bad");
        return;
      }
      if (isGuesser()) return;
      roomRef.child(`clues/${uidName(myName)}`).set({
        name: myName,
        text,
        norm: normalizeAnswer(text),
        at: Date.now()
      }).then(() => {
        input.blur();
        playSound("submit");
        roomRef.transaction(curr => {
          if (!curr || curr.phase !== "clue") return curr;
          const members = curr.members || [];
          const guesser = members[(curr.guesserIdx || 0) % members.length];
          const needed = members.filter(m => m !== guesser);
          const clues = curr.clues || {};
          const done = needed.every(m => clues[uidName(m)] && clues[uidName(m)].text);
          if (done) {
            curr.phase = "review";
            curr.manualInvalid = curr.manualInvalid || {};
          }
          return curr;
        });
      });
    }

    function forceReview() {
      if (!(isHost() || isJudge())) return;
      if (!confirm("未入力者がいても判定画面へ進みますか？")) return;
      roomRef.update({ phase: "review" });
    }

    function toggleInvalid(key) {
      if (!isJudge()) return;
      const current = !!gameState?.manualInvalid?.[key];
      roomRef.child(`manualInvalid/${key}`).set(!current);
      playSound("tap");
    }

    function finishReview() {
      if (!isJudge()) return;
      roomRef.update({ phase: "guess" });
      playSound("submit");
    }

    function submitGuess() {
      if (!isGuesser()) return;
      const input = document.getElementById("guess-input");
      const text = input ? input.value.trim() : "";
      if (!text) {
        input?.classList.add("shake");
        setTimeout(() => input?.classList.remove("shake"), 350);
        playSound("bad");
        return;
      }
      const word = gameState.words[(gameState.currentRound || 1) - 1] || "";
      const autoCorrect = normalizeAnswer(text) === normalizeAnswer(word);
      roomRef.update({
        phase: "roundResult",
        guess: text,
        pendingCorrect: autoCorrect
      });
      playSound("submit");
    }

    function setPendingCorrect(value) {
      if (!(isHost() || isJudge())) return;
      roomRef.update({ pendingCorrect: !!value });
    }

    function finalizeRound() {
      if (!(isHost() || isJudge())) return;
      roomRef.transaction(curr => {
        if (!curr || curr.phase !== "roundResult") return curr;

        const round = curr.currentRound || 1;
        const word = (curr.words || [])[round - 1] || "";
        const members = curr.members || [];
        const guesser = members[(curr.guesserIdx || 0) % members.length] || "";
        const correct = !!curr.pendingCorrect;
        const clues = curr.clues || {};
        const invalidMap = computeInvalidMapFromData(clues, curr.manualInvalid || {});

        if (!curr.history) curr.history = {};
        curr.history[String(round)] = {
          round,
          word,
          guesser,
          judge: getJudgeFromData(curr),
          guess: curr.guess || "",
          correct,
          clues,
          invalidMap,
          at: Date.now()
        };

        if (correct) curr.score = (curr.score || 0) + 1;

        if (round >= (curr.totalRounds || 1)) {
          curr.phase = "finalResult";
        } else {
          curr.phase = "clue";
          curr.currentRound = round + 1;
          curr.guesserIdx = ((curr.guesserIdx || 0) + 1) % Math.max(1, members.length);
          curr.clues = {};
          curr.manualInvalid = {};
          curr.pendingCorrect = null;
          curr.guess = "";
          curr.roundStartedAt = Date.now();
        }
        return curr;
      });
    }

    function skipRound() {
      if (!(isHost() || isJudge())) return;
      if (!confirm("このラウンドをスキップしますか？")) return;
      roomRef.transaction(curr => {
        if (!curr) return curr;
        const members = curr.members || [];
        const round = curr.currentRound || 1;
        if (round >= (curr.totalRounds || 1)) {
          curr.phase = "finalResult";
        } else {
          curr.phase = "clue";
          curr.currentRound = round + 1;
          curr.guesserIdx = ((curr.guesserIdx || 0) + 1) % Math.max(1, members.length);
          curr.clues = {};
          curr.manualInvalid = {};
          curr.pendingCorrect = null;
          curr.guess = "";
        }
        return curr;
      });
    }

    function backToSetup() {
      if (!isHost()) return;
      if (!confirm("待機画面に戻しますか？")) return;
      roomRef.update({
        phase: "setup",
        currentRound: null,
        totalRounds: null,
        words: null,
        score: 0,
        clues: {},
        manualInvalid: {},
        pendingCorrect: null,
        guess: "",
        history: {}
      });
    }

    function getJudgeFromData(state) {
      const members = state.members || [];
      const host = state.host || "";
      const guesser = members[(state.guesserIdx || 0) % Math.max(1, members.length)] || "";
      if (host && host !== guesser) return host;
      const gi = members.indexOf(guesser);
      return members[(gi + 1 + members.length) % Math.max(1, members.length)] || host || members[0] || "";
    }

    function computeInvalidMapFromData(clues, manualInvalid) {
      const groups = {};
      Object.entries(clues || {}).forEach(([key, c]) => {
        if (!c?.text) return;
        const norm = c.norm || normalizeAnswer(c.text);
        if (!groups[norm]) groups[norm] = [];
        groups[norm].push(key);
      });
      const autoInvalid = {};
      Object.values(groups).forEach(keys => {
        if (keys.length >= 2) keys.forEach(k => autoInvalid[k] = true);
      });
      const out = { ...autoInvalid };
      Object.entries(manualInvalid || {}).forEach(([k, val]) => {
        out[k] = !!val;
      });
      return out;
    }

    function computeInvalidMap() {
      return computeInvalidMapFromData(gameState?.clues || {}, gameState?.manualInvalid || {});
    }

    function groupClues() {
      const clues = gameState?.clues || {};
      const groups = {};
      Object.entries(clues).forEach(([key, c]) => {
        if (!c?.text) return;
        const norm = c.norm || normalizeAnswer(c.text);
        if (!groups[norm]) groups[norm] = [];
        groups[norm].push({ key, ...c });
      });
      return groups;
    }

    function renderGuess(container) {

        container.innerHTML = `<section class="card rounded-[2.6rem] p-8 text-center fade-in">
          <div class="text-5xl mb-4 pulse-soft">🤔</div>

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.6rem] p-7 text-center">
          <div class="mini-label justify-center mb-4">VALID HINTS</div>
          <h2 class="text-xl font-black mb-5">このヒントからお題を当ててください</h2>
          <div class="grid grid-cols-2 gap-3">
            ${validClues.map(c => `<div class="rounded-[1.5rem] bg-white border-2 border-emerald-100 text-emerald-700 p-4 font-black text-xl shadow-sm pop">${escapeHtml(c)}</div>`).join("") || `<div class="col-span-2 rounded-[1.5rem] bg-slate-50 text-slate-300 p-8 font-black">有効ヒントなし</div>`}
          </div>
        </div>

        <div class="card rounded-[2.2rem] p-5">
          <input id="guess-input" class="input text-center text-xl mb-4" placeholder="答えを入力" autocomplete="off" />
          <button onclick="submitGuess()" class="btn btn-primary w-full">回答する</button>
          <p class="text-[10px] leading-relaxed text-slate-400 font-bold mt-4">
            自動判定後、判定者が正解/不正解を調整できます。
          </p>
        </div>
      </section>`;
      setTimeout(() => document.getElementById("guess-input")?.focus(), 80);
    }

    function renderRoundResult(container) {
      const word = gameState.words[(gameState.currentRound || 1) - 1] || "";
      const correct = !!gameState.pendingCorrect;
      const canJudge = isHost() || isJudge();
      const invalidMap = computeInvalidMap();
      const clueList = Object.entries(gameState.clues || {}).filter(([_, c]) => c?.text);

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.8rem] p-8 text-center relative overflow-hidden">
          <div class="text-6xl mb-5 stamp-ok">${correct ? "⭕" : "❌"}</div>
          <div class="mini-label justify-center mb-3">ROUND RESULT</div>
          <h2 class="text-3xl font-black ${correct ? "text-emerald-600" : "text-rose-500"}">${correct ? "正解！" : "不正解"}</h2>
          <div class="mt-6 grid grid-cols-2 gap-3 text-left">
            <div class="rounded-[1.4rem] bg-slate-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">お題</div>
              <div class="text-xl font-black">${escapeHtml(word)}</div>
            </div>
            <div class="rounded-[1.4rem] bg-slate-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">回答</div>
              <div class="text-xl font-black">${escapeHtml(gameState.guess || "")}</div>
            </div>
          </div>
        </div>

        <div class="card rounded-[2rem] p-5">
          <div class="mini-label mb-3">HINTS</div>
          <div class="grid grid-cols-2 gap-2">
            ${clueList.map(([key, c]) => `<div class="rounded-2xl p-3 text-center font-black text-sm ${invalidMap[key] ? "bg-slate-100 text-slate-400 line-through" : "bg-emerald-50 text-emerald-700"}">
              ${escapeHtml(c.text)}
              <div class="text-[8px] opacity-60 mt-1">${escapeHtml(c.name || "")}</div>
            </div>`).join("")}
          </div>
        </div>

        ${canJudge ? `<div class="card rounded-[2rem] p-5">
          <div class="mini-label mb-3">判定調整</div>
          <div class="grid grid-cols-2 gap-2 mb-3">
            <button onclick="setPendingCorrect(true)" class="btn ${correct ? "btn-primary" : "btn-soft"} text-sm">正解にする</button>
            <button onclick="setPendingCorrect(false)" class="btn ${!correct ? "btn-bad" : "btn-ghost"} text-sm">不正解にする</button>
          </div>
          <button onclick="finalizeRound()" class="btn btn-dark w-full">次へ進む</button>
        </div>` : `<div class="card rounded-[2rem] p-6 text-center">
          <p class="text-sm font-black text-slate-500">判定者が次へ進めます</p>
        </div>`}
      </section>`;
    }

    function renderFinalResult(container) {
      const score = gameState.score || 0;
      const total = gameState.totalRounds || 1;
      const rate = Math.round((score / total) * 100);
      const title = TITLES.find(t => rate >= t.min)?.text || TITLES[TITLES.length - 1].text;
      const history = Object.values(gameState.history || {}).sort((a,b) => (a.round||0)-(b.round||0));

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.8rem] p-8 text-center">
          <div class="text-5xl mb-4">🏆</div>
          <div class="mini-label justify-center mb-3">FINAL RESULT</div>
          <h2 class="text-3xl font-black mb-3">${escapeHtml(title)}</h2>
          <div class="my-6">
            <div class="text-6xl font-black text-emerald-600 tracking-tighter">${score}<span class="text-2xl text-slate-300">/${total}</span></div>
            <div class="text-xs font-black text-slate-400 tracking-widest mt-1">正解率 ${rate}%</div>
          </div>
          <div class="h-5 rounded-full bg-slate-100 overflow-hidden border border-slate-100">
            <div class="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full" style="width:${rate}%"></div>
          </div>
        </div>

        <div class="card rounded-[2rem] p-5 text-left">
          <div class="mini-label mb-3">振り返り</div>
          <div class="space-y-2 max-h-[360px] overflow-auto pr-1">
            ${history.map(h => `<div class="rounded-2xl bg-slate-50 border border-slate-100 p-3">
              <div class="flex justify-between gap-2 items-center">
                <div class="text-xs font-black text-slate-400">#${h.round} 回答者：${escapeHtml(h.guesser || "")}</div>
                <div class="text-lg">${h.correct ? "⭕" : "❌"}</div>
              </div>
              <div class="font-black text-slate-800">お題：${escapeHtml(h.word || "")}</div>
              <div class="text-xs font-bold text-slate-500">回答：${escapeHtml(h.guess || "")}</div>
            </div>`).join("") || `<div class="text-center text-slate-300 font-black p-6">履歴がありません</div>`}
          </div>
        </div>

        ${isHost() ? `<div class="grid grid-cols-2 gap-2">
          <button onclick="backToSetup()" class="btn btn-soft">設定へ戻る</button>
          <button onclick="startGame()" class="btn btn-primary">同じ設定で再戦</button>
        </div>` : `<div class="card rounded-[2rem] p-6 text-center">
          <p class="text-sm font-black text-slate-500">ホストが次のゲームを開始できます</p>
        </div>`}
      </section>`;
    }

    // Enter key helpers
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter" || e.isComposing) return;
      const active = document.activeElement;
      if (!active) return;
      if (active.id === "name-input") joinGame(document.querySelector("button[onclick=\"joinGame('host')\"]:disabled") ? "guest" : "host");
      if (active.id === "clue-input") submitClue();
      if (active.id === "guess-input") submitGuess();
    });

    render();
  </script>
</body>
</html>
