  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

    :root {
      --brand: #10b981;
      --brand-dark: #059669;
      --ink: #0f172a;
      --paper: #ffffff;
      --soft: #ecfdf5;
      --warn: #f59e0b;
      --bad: #fb7185;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 15% 10%, rgba(16,185,129,.22), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(245,158,11,.18), transparent 26%),
        linear-gradient(180deg, #f0fdf4 0%, #f8fafc 50%, #ecfdf5 100%);
      color: var(--ink);
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 18px 50px rgba(15,23,42,.08);
    }

    .card {
      background: var(--paper);
      border: 1px solid rgba(15,23,42,.06);
      box-shadow: 0 16px 36px rgba(15,23,42,.08);
    }

    .btn {
      min-height: 54px;
      border-radius: 20px;
      font-weight: 900;
      transition: transform .08s ease, filter .2s ease, box-shadow .2s ease;
      user-select: none;
    }
    .btn:active { transform: translateY(2px) scale(.99); }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      box-shadow: 0 12px 24px rgba(16,185,129,.22);
    }
    .btn-dark {
      color: white;
      background: linear-gradient(135deg, #0f172a, #334155);
      box-shadow: 0 12px 24px rgba(15,23,42,.18);
    }
    .btn-soft {
      color: #047857;
      background: #ecfdf5;
      border: 2px solid #a7f3d0;
    }
    .btn-warn {
      color: white;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      box-shadow: 0 12px 24px rgba(245,158,11,.2);
    }
    .btn-bad {
      color: white;
      background: linear-gradient(135deg, #fb7185, #e11d48);
      box-shadow: 0 12px 24px rgba(225,29,72,.18);
    }
    .btn-ghost {
      color: #64748b;
      background: rgba(255,255,255,.65);
      border: 1px solid #e2e8f0;
    }

    .fade-in { animation: fadeIn .34s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pop { animation: pop .38s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes pop {
      from { opacity: 0; transform: scale(.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .pulse-soft { animation: pulseSoft 1.7s ease-in-out infinite; }
    @keyframes pulseSoft {
      0%,100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-2px); opacity: .72; }
    }
    .stamp-ok { animation: stamp .55s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes stamp {
      from { transform: rotate(-8deg) scale(2.2); opacity: 0; filter: blur(3px); }
      to { transform: rotate(-8deg) scale(1); opacity: 1; filter: blur(0); }
    }

    .invalid {
      text-decoration: line-through;
      opacity: .42;
      filter: grayscale(1);
      background: #e2e8f0 !important;
      color: #64748b !important;
      border-color: #cbd5e1 !important;
    }

    .mini-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #64748b;
    }

    .input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #d1fae5;
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      font-weight: 900;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
    }
    .input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 5px rgba(16,185,129,.12);
    }

    .shake { animation: shake .32s ease-in-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    .confetti-piece {
      position: fixed;
      width: 9px;
      height: 14px;
      top: -20px;
      border-radius: 3px;
      z-index: 120;
      animation: fall 1.7s linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }


    .donut {
      width: 188px;
      height: 188px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-inline: auto;
      box-shadow: 0 18px 42px rgba(15,23,42,.12);
      position: relative;
    }
    .donut::after {
      content: "";
      position: absolute;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(15,23,42,.06);
    }
    .donut-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .round-dot {
      width: 34px;
      height: 34px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 900;
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 6px 12px rgba(15,23,42,.06);
    }

    .person-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid rgba(15,23,42,.08);
      background: white;
    }
    .person-dot {
      width: 11px;
      height: 11px;
      border-radius: 99px;
      box-shadow: 0 0 0 3px rgba(255,255,255,.8);
    }

    .bottom-safe { padding-bottom: max(18px, env(safe-area-inset-bottom)); }

    @media (max-width: 420px) {
      .btn { min-height: 52px; border-radius: 18px; }
      .input { min-height: 54px; border-radius: 18px; }
      .donut { width: 170px; height: 170px; }
      .donut::after { width: 114px; height: 114px; }
      .round-dot { width: 31px; height: 31px; border-radius: 11px; font-size: 13px; }
    }
  </style>
</head>

    // ==============================

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[s]));
    }

    function uidName(name) {
      return String(name).replace(/[.#$/\[\]]/g, "_");
    }

    function baseNormalize(text) {
      let s = String(text ?? "").trim().normalize("NFKC").toLowerCase();
      // カタカナをひらがなへ
      s = s.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
      // 小文字かなを普通のかな寄せ
      const smallMap = { "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お","ゃ":"や","ゅ":"ゆ","ょ":"よ","っ":"つ","ゎ":"わ" };
      s = s.replace(/[ぁぃぅぇぉゃゅょっゎ]/g, ch => smallMap[ch] || ch);
      // 伸ばし棒、空白、記号を除去
      s = s.replace(/[ーｰ〜~\s　!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}。、，．・！？「」『』【】（）()［］\[\]<>＜＞]/g, "");
      return s;
    }

    function normalizeAnswer(text) {
      const b = baseNormalize(text);
      return SYNONYM_CANONICAL[b] || b;
    }

    function randId(len = 5) {
      const chars = "abcdefghijkmnpqrstuvwxyz23456789";
      let out = "";
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    function getMembers() {
      return Array.isArray(gameState?.members) ? gameState.members : [];
    }

    function getGuesser() {
      const members = getMembers();
      if (!members.length) return "";
      const idx = Number(gameState?.guesserIdx || 0) % members.length;
      return members[idx];
    }

    function getJudge() {
      const members = getMembers();
      const host = gameState?.host || "";
      const guesser = getGuesser();
      if (!members.length) return "";
      if (host && host !== guesser) return host;
      const gi = members.indexOf(guesser);
      return members[(gi + 1 + members.length) % members.length] || host || members[0];
    }

    function isHost() { return gameState?.host === myName; }
    function isGuesser() { return getGuesser() === myName; }
    function isJudge() { return getJudge() === myName; }

    function getMemberColor(name) {
      const members = getMembers();

      if (idx < 0) idx = 0;
      return PERSON_COLORS[idx % PERSON_COLORS.length];

    function currentClueCount() {
      const setting = gameState?.clueCountMode || "auto";
      if (setting === "two") return 2;
      if (setting === "one") return 1;
      return recommendedClueCount(getMembers().length);
    }

    function cluePlayersNeeded() {
      return getMembers().filter(m => m !== getGuesser());
    }

    function getPlayerClues(name, cluesObj = gameState?.clues || {}) {
      const prefix = uidName(name) + "_";
      return Object.entries(cluesObj)
        .filter(([key, c]) => key.startsWith(prefix) && c?.text)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([key, c]) => ({ key, ...c }));
    }

    function submittedPlayerCount() {
      const needed = cluePlayersNeeded();
      const count = currentClueCount();
      return needed.filter(m => getPlayerClues(m).length >= count).length;
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, duration = .08, type = "sine", gain = .035, delay = 0) {
      if (!soundEnabled) return;
      ensureAudio();
      const now = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + .01);
      g.gain.exponentialRampToValueAtTime(.0001, now + duration);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + .03);
    }

    function playSound(kind) {
      if (!soundEnabled) return;
      if (kind === "tap") tone(520, .06, "triangle", .025);
      if (kind === "submit") { tone(660, .08, "sine", .03); tone(880, .08, "sine", .025, .08); }
      if (kind === "ready") { tone(520, .07); tone(740, .07, "sine", .025, .08); tone(990, .12, "triangle", .025, .16); }
      if (kind === "bad") { tone(180, .16, "sawtooth", .025); tone(120, .18, "sawtooth", .02, .12); }
      if (kind === "correct") { tone(523, .09); tone(659, .09, "sine", .03, .09); tone(784, .11, "sine", .03, .18); tone(1046, .18, "triangle", .035, .28); }
      if (kind === "wrong") { tone(220, .15, "sawtooth", .025); tone(165, .22, "sawtooth", .02, .14); }
      if (kind === "final") { [523,659,784,1046,1318].forEach((f,i)=>tone(f,.12,"triangle",.03,i*.09)); }
    }

    function joinGame(role) {
      const input = document.getElementById("name-input");
      const name = input ? input.value.trim() : "";
      if (!name) {
        input?.classList.add("shake");
        setTimeout(() => input?.classList.remove("shake"), 350);
        playSound("bad");
        return;
      }

      roomRef.transaction(curr => {
        if (!curr) {
          return { phase: "setup", members: [name], host: role === "host" ? name : "", createdAt: Date.now() };
        }
        if (!curr.members) curr.members = [];
        if (role === "host" && curr.host && curr.host !== name) return;
        if (!curr.members.includes(name)) curr.members.push(name);
        if (role === "host" && !curr.host) curr.host = name;
        return curr;
      }, (error, committed, snapshot) => {
        if (error) return alert("入室エラーです。もう一度お試しください。");
        if (!committed) return alert("このルームにはすでにホストがいます。ゲストで入室してください。");
        myName = name;
        myRole = (role === "host" && snapshot.val()?.host === name) ? "host" : "guest";
        localStorage.setItem("jod-name", myName);
        localStorage.setItem("jod-role", myRole);
        playSound("submit");
        gameState = snapshot.val();
        render();
      });
    }

      if (!confirm("ルームを解散しますか？全員の進行データが消えます。")) return;
      roomRef.remove().finally(() => {
        localStorage.removeItem("jod-name");
        localStorage.removeItem("jod-role");
        myName = "";
        myRole = "";
        gameState = null;
        playSound("bad");
        render();
        showToast("ルームを解散しました");
      });
    }

    function startGame() {
      if (!isHost()) return;
      const mode = document.getElementById("word-mode")?.value || "standard";
      const rounds = Math.max(1, Math.min(30, parseInt(document.getElementById("rounds-input")?.value || "13", 10)));
      const clueCountMode = document.getElementById("hint-count-mode")?.value || "auto";
      const customText = document.getElementById("custom-words")?.value || "";
      const customWords = customText.split(/\n|,|、/).map(s => s.trim()).filter(Boolean);

      let pool = [];
      if (mode === "kids") pool = [...(WORDS_DATA.kids || [])];
      else if (mode === "easy_party") pool = [...(WORDS_DATA.kids || []), ...(WORDS_DATA.easy_party || [])];
      else if (mode === "conversation") pool = [...(WORDS_DATA.easy_party || []), ...(WORDS_DATA.conversation || [])];
      else if (mode === "trend") pool = [...(WORDS_DATA.easy_party || []), ...(WORDS_DATA.trend || [])];
      else if (mode === "hard") pool = [...(WORDS_DATA.trend || []), ...(WORDS_DATA.hard || [])];
      else if (mode === "local_event") pool = [...(WORDS_DATA.kids || []), ...(WORDS_DATA.local_event || [])];
      else pool = Object.values(WORDS_DATA).flat();

      pool = [...new Set([...customWords, ...pool])].filter(Boolean);
      const fullPool = [...pool];
      if (!pool.length) return alert("ワードがありません");

      const shuffled = pool.sort(() => Math.random() - .5).slice(0, rounds);
      const members = getMembers();
      if (members.length < 2) return alert("2人以上で開始してください。3人以上推奨です。");

      roomRef.update({
        phase: "clue",
        totalRounds: shuffled.length,
        currentRound: 1,
        score: 0,
        words: shuffled,
        wordMode: mode,
        clueCountMode,
        rerollsLeft: 3,
        wordPool: fullPool,
        guesserIdx: 0,
        clues: {},
        manualInvalid: {},
        pendingCorrect: null,
        guess: "",
        history: {},
        roundStartedAt: Date.now()
      });
      playSound("submit");
    }

    function submitClue() {
      if (isGuesser()) return;

      const count = currentClueCount();
      const values = [];
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`clue-input-${i}`);
        const text = input ? input.value.trim() : "";
        if (!text) {
          input?.classList.add("shake");
          setTimeout(() => input?.classList.remove("shake"), 350);
          playSound("bad");
          return;
        }
        values.push(text);
      }

      const updates = {};
      values.forEach((text, i) => {
        updates[`clues/${uidName(myName)}_${i}`] = {
          name: myName,
          slot: i,
          text,
          norm: normalizeAnswer(text),
          at: Date.now()
        };
      });

      roomRef.update(updates).then(() => {
        values.forEach((_, i) => document.getElementById(`clue-input-${i}`)?.blur());
        playSound("submit");
        roomRef.transaction(curr => {
          if (!curr || curr.phase !== "clue") return curr;
          const members = curr.members || [];
          const guesser = members[(curr.guesserIdx || 0) % members.length];
          const needed = members.filter(m => m !== guesser);
          const clueCount = curr.clueCountMode === "two" ? 2 : curr.clueCountMode === "one" ? 1 : (members.length <= 4 ? 2 : 1);
          const clues = curr.clues || {};
          const done = needed.every(m => {
            const prefix = uidName(m) + "_";
            return Object.entries(clues).filter(([key, c]) => key.startsWith(prefix) && c && c.text).length >= clueCount;
          });
          if (done) {
            curr.phase = "review";
            curr.manualInvalid = curr.manualInvalid || {};
          }
          return curr;
        });
      });
    }

    function forceReview() {
      if (!(isHost() || isJudge())) return;
      if (!confirm("未入力者がいても判定画面へ進みますか？")) return;
      roomRef.update({ phase: "review" });
    }

    function toggleInvalid(key) {
      if (!isJudge()) return;
      const current = !!gameState?.manualInvalid?.[key];
      roomRef.child(`manualInvalid/${key}`).set(!current);
      playSound("tap");
    }

    function finishReview() {
      if (!isJudge()) return;
      roomRef.update({ phase: "guess" });
      playSound("submit");
    }

    function submitGuess() {
      if (!isGuesser()) return;
      const input = document.getElementById("guess-input");
      const text = input ? input.value.trim() : "";
      if (!text) {
        input?.classList.add("shake");
        setTimeout(() => input?.classList.remove("shake"), 350);
        playSound("bad");
        return;
      }
      const word = gameState.words[(gameState.currentRound || 1) - 1] || "";
      const autoCorrect = normalizeAnswer(text) === normalizeAnswer(word);
      roomRef.update({
        phase: "roundResult",
        guess: text,
        pendingCorrect: autoCorrect
      });
      playSound("submit");
    }

    function setPendingCorrect(value) {
      if (!(isHost() || isJudge())) return;
      roomRef.update({ pendingCorrect: !!value });
    }

    function finalizeRound() {
      if (!(isHost() || isJudge())) return;
      roomRef.transaction(curr => {
        if (!curr || curr.phase !== "roundResult") return curr;

        const round = curr.currentRound || 1;
        const word = (curr.words || [])[round - 1] || "";
        const members = curr.members || [];
        const guesser = members[(curr.guesserIdx || 0) % members.length] || "";
        const correct = !!curr.pendingCorrect;
        const clues = curr.clues || {};
        const invalidMap = computeInvalidMapFromData(clues, curr.manualInvalid || {});

        if (!curr.history) curr.history = {};
        curr.history[String(round)] = {
          round,
          word,
          guesser,
          judge: getJudgeFromData(curr),
          guess: curr.guess || "",
          correct,
          clues,
          invalidMap,
          at: Date.now()
        };

        if (correct) curr.score = (curr.score || 0) + 1;

        if (round >= (curr.totalRounds || 1)) {
          curr.phase = "finalResult";
        } else {
          curr.phase = "clue";
          curr.currentRound = round + 1;
          curr.guesserIdx = ((curr.guesserIdx || 0) + 1) % Math.max(1, members.length);
          curr.clues = {};
          curr.manualInvalid = {};
          curr.pendingCorrect = null;
          curr.guess = "";
          curr.roundStartedAt = Date.now();
        }
        return curr;
      });
    }

    function skipRound() {
      if (!(isHost() || isJudge())) return;
      if (!confirm("このラウンドをスキップしますか？")) return;
      roomRef.transaction(curr => {
        if (!curr) return curr;
        const members = curr.members || [];
        const round = curr.currentRound || 1;
        if (round >= (curr.totalRounds || 1)) {
          curr.phase = "finalResult";
        } else {
          curr.phase = "clue";
          curr.currentRound = round + 1;
          curr.guesserIdx = ((curr.guesserIdx || 0) + 1) % Math.max(1, members.length);
          curr.clues = {};
          curr.manualInvalid = {};
          curr.pendingCorrect = null;
          curr.guess = "";
        }
        return curr;
      });
    }

    function backToSetup() {
      if (!isHost()) return;
      if (!confirm("待機画面に戻しますか？")) return;
      roomRef.update({
        phase: "setup",
        currentRound: null,
        totalRounds: null,
        words: null,
        score: 0,
        clues: {},
        manualInvalid: {},
        pendingCorrect: null,
        guess: "",
        history: {}
      });
    }

    function getJudgeFromData(state) {
      const members = state.members || [];
      const host = state.host || "";
      const guesser = members[(state.guesserIdx || 0) % Math.max(1, members.length)] || "";
      if (host && host !== guesser) return host;
      const gi = members.indexOf(guesser);
      return members[(gi + 1 + members.length) % Math.max(1, members.length)] || host || members[0] || "";
    }

    function computeInvalidMapFromData(clues, manualInvalid) {
      const groups = {};
      Object.entries(clues || {}).forEach(([key, c]) => {
        if (!c?.text) return;
        const norm = c.norm || normalizeAnswer(c.text);
        if (!groups[norm]) groups[norm] = [];
        groups[norm].push(key);
      });
      const autoInvalid = {};
      Object.values(groups).forEach(keys => {
        if (keys.length >= 2) keys.forEach(k => autoInvalid[k] = true);
      });
      const out = { ...autoInvalid };
      Object.entries(manualInvalid || {}).forEach(([k, val]) => {
        out[k] = !!val;
      });
      return out;
    }

    function computeInvalidMap() {
      return computeInvalidMapFromData(gameState?.clues || {}, gameState?.manualInvalid || {});
    }

    function groupClues() {
      const clues = gameState?.clues || {};
      const groups = {};
      Object.entries(clues).forEach(([key, c]) => {
        if (!c?.text) return;
        const norm = c.norm || normalizeAnswer(c.text);
        if (!groups[norm]) groups[norm] = [];
        groups[norm].push({ key, ...c });
      });
      return groups;
    }


    function canRerollWord() {
      if (!gameState || gameState.phase !== "clue") return false;
      if (!(isHost() || isJudge())) return false;
      if (isGuesser()) return false;
      if ((gameState.rerollsLeft ?? 0) <= 0) return false;
      return Object.values(gameState.clues || {}).filter(c => c && c.text).length === 0;
    }

    function rerollWord() {
      if (!canRerollWord()) return;
      roomRef.transaction(curr => {
        if (!curr || curr.phase !== "clue") return curr;
        const clues = curr.clues || {};
        const hasAnyClue = Object.values(clues).some(c => c && c.text);
        if (hasAnyClue || (curr.rerollsLeft || 0) <= 0) return curr;

        const round = curr.currentRound || 1;
        const currentWord = (curr.words || [])[round - 1];
        const used = new Set((curr.words || []).filter(Boolean));
        used.delete(currentWord);

        let pool = Array.isArray(curr.wordPool) ? curr.wordPool.slice() : [];
        pool = pool.filter(w => w && !used.has(w) && w !== currentWord);
        if (!pool.length) return curr;

        const nextWord = pool[Math.floor(Math.random() * pool.length)];
        curr.words[round - 1] = nextWord;
        curr.rerollsLeft = (curr.rerollsLeft || 0) - 1;
        curr.roundStartedAt = Date.now();
        return curr;
      }, () => {
        playSound("tap");
      });
    }

          <h2 class="text-2xl font-black">重複ヒント判定</h2>
          <p class="text-xs font-bold text-slate-400 mt-2 leading-relaxed">お題：<span class="text-emerald-600">${escapeHtml(word)}</span> ／ 回答者：${escapeHtml(guesser)}さん</p>
          ${groupInfo.length ? `<p class="mt-3 text-[11px] font-black text-rose-500">自動で重複候補を検出しました</p>` : `<p class="mt-3 text-[11px] font-black text-emerald-600">自動重複候補はありません</p>`}
        </div>

        <div class="space-y-3">
          ${entries.map(([key, c]) => {
            const inv = !!invalidMap[key];
            const autoDup = Object.values(groups).some(g => g.length >= 2 && g.some(x => x.key === key));
            const color = getMemberColor(c.name || key);
            return `<button onclick="toggleInvalid('${key}')" class="w-full card rounded-[1.7rem] p-4 text-left flex items-center justify-between gap-3 ${inv ? "invalid" : ""}" style="border-left:8px solid ${color}">
              <div>
                <div class="text-[10px] font-black mb-1" style="color:${color}">${escapeHtml(c.name || key)}さん ${autoDup ? " / 自動重複候補" : ""}</div>
                <div class="text-2xl font-black">${escapeHtml(c.text)}</div>
              </div>
              <div class="shrink-0 rounded-2xl px-3 py-2 text-xs font-black ${inv ? "bg-slate-300 text-slate-600" : "bg-emerald-100 text-emerald-700"}">
                ${inv ? "無効" : "有効"}
              </div>
            </button>`;
          }).join("")}
        </div>

        <div class="card rounded-[2rem] p-4 text-left">
          <div class="mini-label mb-2">判定のコツ</div>
          <p class="text-[11px] font-bold text-slate-500 leading-relaxed">
            同じ意味・同じ表記ゆれは無効にします。微妙なものは場の雰囲気でOKです。タップで有効/無効を切り替えられます。
          </p>
        </div>

        <button onclick="finishReview()" class="btn btn-primary w-full text-lg">回答者にヒントを見せる</button>
      </section>`;
    }

    function renderGuess(container) {
      const invalidMap = computeInvalidMap();
      const validClues = Object.entries(gameState.clues || {})
        .filter(([key, c]) => c?.text && !invalidMap[key])
        .map(([key, c]) => ({ key, ...c }));

      if (!isGuesser()) {
        container.innerHTML = `<section class="card rounded-[2.6rem] p-8 text-center fade-in">
          <div class="text-5xl mb-4 pulse-soft">🤔</div>
          <div class="mini-label justify-center mb-4">GUESS TIME</div>
          <h2 class="text-xl font-black mb-3">${escapeHtml(getGuesser())}さんが回答中</h2>
          <p class="text-sm font-bold text-slate-500 leading-relaxed">回答を待っています。</p>
          <div class="mt-6 grid grid-cols-2 gap-2">
            ${validClues.map(c => `<div class="rounded-2xl p-3 font-black text-sm" style="background:${getMemberColor(c.name)}14;color:${getMemberColor(c.name)};border:1px solid ${getMemberColor(c.name)}33">${escapeHtml(c.text)}</div>`).join("") || `<div class="col-span-2 text-slate-300 text-xs font-black p-5">有効ヒントがありません</div>`}
          </div>
        </section>`;
        return;
      }

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.6rem] p-7 text-center">
          <div class="mini-label justify-center mb-4">VALID HINTS</div>
          <h2 class="text-xl font-black mb-5">このヒントからお題を当ててください</h2>
          <div class="grid grid-cols-2 gap-3">
            ${validClues.map(c => `<div class="rounded-[1.5rem] bg-white border-2 p-4 font-black text-xl shadow-sm pop" style="border-color:${getMemberColor(c.name)}55;color:${getMemberColor(c.name)}">${escapeHtml(c.text)}</div>`).join("") || `<div class="col-span-2 rounded-[1.5rem] bg-slate-50 text-slate-300 p-8 font-black">有効ヒントなし</div>`}
          </div>
        </div>

        <div class="card rounded-[2.2rem] p-5">
          <input id="guess-input" class="input text-center text-xl mb-4" placeholder="答えを入力" autocomplete="off" />
          <button onclick="submitGuess()" class="btn btn-primary w-full">回答する</button>
          <p class="text-[10px] leading-relaxed text-slate-400 font-bold mt-4">
            自動判定後、判定者が正解/不正解を調整できます。
          </p>
        </div>
      </section>`;
      setTimeout(() => document.getElementById("guess-input")?.focus(), 80);
    }

    function renderRoundResult(container) {
      const word = gameState.words[(gameState.currentRound || 1) - 1] || "";
      const correct = !!gameState.pendingCorrect;
      const canJudge = isHost() || isJudge();
      const invalidMap = computeInvalidMap();
      const clueList = Object.entries(gameState.clues || {}).filter(([_, c]) => c?.text);

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.8rem] p-8 text-center relative overflow-hidden">
          <div class="text-6xl mb-5 stamp-ok">${correct ? "⭕" : "❌"}</div>
          <div class="mini-label justify-center mb-3">ROUND RESULT</div>
          <h2 class="text-3xl font-black ${correct ? "text-emerald-600" : "text-rose-500"}">${correct ? "正解！" : "不正解"}</h2>
          <div class="mt-6 grid grid-cols-2 gap-3 text-left">
            <div class="rounded-[1.4rem] bg-slate-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">お題</div>
              <div class="text-xl font-black">${escapeHtml(word)}</div>
            </div>
            <div class="rounded-[1.4rem] bg-slate-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">回答</div>
              <div class="text-xl font-black">${escapeHtml(gameState.guess || "")}</div>
            </div>
          </div>
        </div>

        <div class="card rounded-[2rem] p-5">
          <div class="mini-label mb-3">HINTS</div>
          <div class="grid grid-cols-2 gap-2">
            ${clueList.map(([key, c]) => {
              const color = getMemberColor(c.name || "");
              return `<div class="rounded-2xl p-3 text-center font-black text-sm ${invalidMap[key] ? "bg-slate-100 text-slate-400 line-through" : ""}" style="${invalidMap[key] ? "" : `background:${color}14;color:${color};border:1px solid ${color}33`}">
                ${escapeHtml(c.text)}
                <div class="text-[8px] opacity-60 mt-1">${escapeHtml(c.name || "")}</div>
              </div>`;
            }).join("")}
          </div>
        </div>

        ${canJudge ? `<div class="card rounded-[2rem] p-5">
          <div class="mini-label mb-3">判定調整</div>
          <div class="grid grid-cols-2 gap-2 mb-3">
            <button onclick="setPendingCorrect(true)" class="btn ${correct ? "btn-primary" : "btn-soft"} text-sm">正解にする</button>
            <button onclick="setPendingCorrect(false)" class="btn ${!correct ? "btn-bad" : "btn-ghost"} text-sm">不正解にする</button>
          </div>
          <button onclick="finalizeRound()" class="btn btn-dark w-full">次へ進む</button>
        </div>` : `<div class="card rounded-[2rem] p-6 text-center">
          <p class="text-sm font-black text-slate-500">判定者が次へ進めます</p>
        </div>`}
      </section>`;
    }

    function renderFinalResult(container) {
      const score = gameState.score || 0;
      const total = gameState.totalRounds || 1;
      const rate = Math.round((score / total) * 100);
      const title = TITLES.find(t => rate >= t.min)?.text || TITLES[TITLES.length - 1].text;
      const history = Object.values(gameState.history || {}).sort((a,b) => (a.round||0)-(b.round||0));
      const degree = Math.round(rate * 3.6);
      const bestStreak = (() => {
        let best = 0, cur = 0;
        history.forEach(h => { if (h.correct) { cur++; best = Math.max(best, cur); } else cur = 0; });
        return best;
      })();

      container.innerHTML = `<section class="space-y-4 fade-in">
        <div class="card rounded-[2.8rem] p-8 text-center">
          <div class="text-5xl mb-4">🏆</div>
          <div class="mini-label justify-center mb-3">FINAL RESULT</div>
          <h2 class="text-3xl font-black mb-6">${escapeHtml(title)}</h2>

          <div class="donut mb-6" style="background:conic-gradient(#10b981 0deg, #06b6d4 ${degree}deg, #e2e8f0 ${degree}deg 360deg)">
            <div class="donut-inner">
              <div class="text-4xl font-black text-emerald-600 tracking-tighter">${rate}%</div>
              <div class="text-sm font-black text-slate-400">${score}/${total} 正解</div>
            </div>
          </div>

          <div class="h-6 rounded-full bg-slate-100 overflow-hidden border border-slate-100 mb-3">
            <div class="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full transition-all" style="width:${rate}%"></div>
          </div>
          <div class="flex justify-between text-[9px] font-black text-slate-400 px-1">
            <span>0%</span><span>50% 合格</span><span>70% すごい</span><span>100%</span>
          </div>

          <div class="mt-6 grid grid-cols-2 gap-3">
            <div class="rounded-[1.5rem] bg-emerald-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">BEST STREAK</div>
              <div class="text-2xl font-black text-emerald-600">${bestStreak}連続</div>
            </div>
            <div class="rounded-[1.5rem] bg-cyan-50 p-4">
              <div class="text-[9px] font-black text-slate-400 tracking-widest">ROUND</div>
              <div class="text-2xl font-black text-cyan-600">${total}問</div>
            </div>
          </div>
        </div>

        <div class="card rounded-[2rem] p-5 text-left">
          <div class="mini-label mb-3">ラウンド結果</div>
          <div class="grid grid-cols-7 gap-2">
            ${Array.from({length: total}).map((_, i) => {
              const h = history.find(x => Number(x.round) === i + 1);
              const color = h ? getMemberColor(h.guesser || "") : "#cbd5e1";
              return `<div class="round-dot ${h?.correct ? "text-white" : "text-slate-400 bg-slate-100"}" title="#${i+1}" style="${h?.correct ? `background:${color}` : ""}">${h ? (h.correct ? "○" : "×") : i+1}</div>`;
            }).join("")}
          </div>
          <p class="text-[10px] font-bold text-slate-400 mt-3">色はそのラウンドの回答者と連動しています。</p>
        </div>

        <div class="card rounded-[2rem] p-5 text-left">
          <div class="mini-label mb-3">振り返り</div>
          <div class="space-y-2 max-h-[360px] overflow-auto pr-1">
            ${history.map(h => {
              const color = getMemberColor(h.guesser || "");
              return `<div class="rounded-2xl bg-slate-50 border border-slate-100 p-3" style="border-left:8px solid ${color}">
                <div class="flex justify-between gap-2 items-center">
                  <div class="text-xs font-black" style="color:${color}">#${h.round} 回答者：${escapeHtml(h.guesser || "")}</div>
                  <div class="text-lg">${h.correct ? "⭕" : "❌"}</div>
                </div>
                <div class="font-black text-slate-800">お題：${escapeHtml(h.word || "")}</div>
                <div class="text-xs font-bold text-slate-500">回答：${escapeHtml(h.guess || "")}</div>
              </div>`;
            }).join("") || `<div class="text-center text-slate-300 font-black p-6">履歴がありません</div>`}
          </div>
        </div>

        ${isHost() ? `<div class="grid grid-cols-2 gap-2">
          <button onclick="backToSetup()" class="btn btn-soft">設定へ戻る</button>
          <button onclick="startGame()" class="btn btn-primary">同じ設定で再戦</button>
        </div>` : `<div class="card rounded-[2rem] p-6 text-center">
          <p class="text-sm font-black text-slate-500">ホストが次のゲームを開始できます</p>
        </div>`}
      </section>`;
    }

    // Enter key helpers
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter" || e.isComposing) return;
      const active = document.activeElement;
      if (!active) return;
      if (active.id === "name-input") joinGame(document.querySelector("button[onclick=\"joinGame('host')\"]:disabled") ? "guest" : "host");
      if (active.id && active.id.startsWith("clue-input-")) submitClue();
      if (active.id === "guess-input") submitGuess();
    });

    render();
  </script>
</body>
</html>
