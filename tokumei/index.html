<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>匿名本音メーター Deluxe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');
    :root{
      --pink:#ff3ea5; --violet:#7c3aed; --cyan:#06b6d4; --gold:#fbbf24;
      --ink:#14091f; --glass:rgba(255,255,255,.13); --line:rgba(255,255,255,.22);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;margin:0}
    body{
      font-family:'Zen Maru Gothic',system-ui,sans-serif;
      color:white; overflow-x:hidden; touch-action:manipulation;
      background:
        radial-gradient(circle at 20% 8%, rgba(255,62,165,.55), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(6,182,212,.45), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(251,191,36,.28), transparent 30%),
        linear-gradient(135deg,#13051e 0%,#251044 42%,#071827 100%);
    }
    body::before{
      content:""; position:fixed; inset:-30%; pointer-events:none; z-index:-2;
      background:
        conic-gradient(from 140deg at 50% 50%, rgba(255,255,255,.08), transparent 18%, rgba(255,62,165,.10), transparent 45%, rgba(6,182,212,.12), transparent 72%, rgba(251,191,36,.08));
      animation: aurora 16s linear infinite; filter:blur(30px);
    }
    body::after{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
      background-image:radial-gradient(rgba(255,255,255,.45) 1px, transparent 1.4px);
      background-size:28px 28px; opacity:.12; mask-image:linear-gradient(to bottom,transparent,black 18%,black 82%,transparent);
    }
    @keyframes aurora{to{transform:rotate(360deg)}}
    .wrap{max-width:520px;margin:0 auto;min-height:100dvh;padding:16px 16px max(24px,env(safe-area-inset-bottom));}
    .glass{
      background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.09));
      border:1px solid var(--line); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      box-shadow:0 22px 70px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .card{border-radius:34px;padding:24px}
    .title{
      font-weight:900; letter-spacing:-.08em; line-height:.95;
      text-shadow:0 0 24px rgba(255,62,165,.7),0 0 52px rgba(6,182,212,.35);
    }
    .mini{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.64)}
    .btn{
      min-height:58px;border-radius:22px;font-weight:900;letter-spacing:.02em;
      transition:transform .08s ease,filter .18s ease,box-shadow .18s ease; user-select:none;
    }
    .btn:active{transform:translateY(2px) scale(.985)}
    .btn-main{background:linear-gradient(135deg,var(--pink),var(--violet),var(--cyan));box-shadow:0 16px 38px rgba(255,62,165,.28);color:white}
    .btn-gold{background:linear-gradient(135deg,#f59e0b,#fbbf24,#fde68a);box-shadow:0 16px 38px rgba(251,191,36,.22);color:#2b1400}
    .btn-ghost{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.22);color:white}
    .btn-yes{background:linear-gradient(135deg,#ff3ea5,#fb7185);box-shadow:0 18px 40px rgba(255,62,165,.26)}
    .btn-no{background:linear-gradient(135deg,#06b6d4,#2563eb);box-shadow:0 18px 40px rgba(6,182,212,.24)}
    .input,.select{
      width:100%;min-height:56px;border-radius:20px;padding:14px 16px;
      color:white;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.22);
      outline:none;font-weight:900;
    }
    .input::placeholder{color:rgba(255,255,255,.45)}
    .select option{color:#111827;background:white}
    .meter{
      width:min(300px,78vw);height:min(300px,78vw);border-radius:999px;margin:auto;position:relative;display:grid;place-items:center;
      background:conic-gradient(from 180deg,var(--pink) 0deg,var(--gold) var(--deg),rgba(255,255,255,.13) var(--deg) 360deg);
      box-shadow:0 0 38px rgba(255,62,165,.34),0 28px 80px rgba(0,0,0,.35);
    }
    .meter::after{content:"";position:absolute;inset:28px;border-radius:999px;background:linear-gradient(145deg,rgba(20,9,31,.92),rgba(32,15,50,.82));border:1px solid rgba(255,255,255,.16)}
    .meter-inner{position:relative;z-index:2;text-align:center}
    .count{font-size:clamp(54px,15vw,88px);font-weight:900;letter-spacing:-.09em;line-height:.86}
    .spark{position:fixed;width:8px;height:8px;border-radius:999px;background:white;pointer-events:none;z-index:90;animation:spark 1.2s ease-out forwards;box-shadow:0 0 18px white}
    @keyframes spark{to{transform:translate(var(--x),var(--y)) scale(.2);opacity:0}}
    .fade{animation:fade .35s ease-out both}.pop{animation:pop .42s cubic-bezier(.16,1,.3,1) both}
    @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .pulse{animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{50%{transform:translateY(-2px);filter:brightness(1.15)}}
    .shake{animation:shake .34s ease-in-out}@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
    .choice{position:relative;overflow:hidden}
    .choice.selected::before{content:"";position:absolute;inset:-2px;border-radius:24px;border:3px solid rgba(255,255,255,.9);box-shadow:0 0 30px rgba(255,255,255,.45)}
    .bar{height:14px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden}
    .bar>div{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--gold))}
    .qrbox canvas,.qrbox img{border-radius:18px;overflow:hidden}
    .particle{position:absolute;pointer-events:none;opacity:.75;animation:float 7s ease-in-out infinite}
    @keyframes float{50%{transform:translateY(-16px) rotate(8deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="glass card sticky top-3 z-40 mb-4">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="mini">ANONYMOUS REAL VOICE</div>
          <h1 class="title text-[34px] mt-1">匿名本音<br>メーター</h1>
        </div>
        <div class="flex gap-2">
          <button onclick="toggleBgm()" id="bgmBtn" class="btn btn-ghost w-12 min-h-12">♪</button>
          <button onclick="copyUrl()" class="btn btn-ghost w-12 min-h-12">🔗</button>
        </div>
      </div>
      <div id="hud" class="mt-4"></div>
    </header>
    <main id="app"></main>
    <footer class="pt-5 text-center">
      <button onclick="resetRoom()" class="text-[10px] font-black tracking-widest text-white/35 border border-white/10 rounded-full px-4 py-2">ROOM RESET</button>
    </footer>
  </div>

  <script>
    // ==============================
    // Firebase：Just One Online Deluxe と同じプロジェクト設定
    // DBパスだけ分けているので、既存Just Oneの進行データとは混ざりません。
    // ==============================
    const firebaseConfig = {
      apiKey: "AIzaSyBmzPmehSaV--mn0Hd0S-fd97nf5RX4Dvg",
      authDomain: "membertoiro.firebaseapp.com",
      databaseURL: "https://membertoiro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "membertoiro",
      storageBucket: "membertoiro.firebasestorage.app",
      messagingSenderId: "858132874746",
      appId: "1:858132874746:web:9d6e1156a350dd396b9043"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(location.search);
    const roomId = params.get("room") || makeId(5);
    if(!params.get("room")){
      const u = new URL(location.href); u.searchParams.set("room", roomId); history.replaceState(null,"",u);
    }
    const roomRef = db.ref("rooms/" + roomId + "_hon_meter_deluxe");

    const QUESTION_SETS = {
      papa: {
        name:"パパ友セット",
        desc:"笑えるけど少し刺さる、大人の本音",
        questions:[
          "この年になって本音で話せる友達がほぼいない",
          "実は見栄を張って生きてる部分がある",
          "SNSで元カノを検索したことがある",
          "今の仕事を辞めたいと思ったことがある",
          "正直結婚に後悔したことがある",
          "家に帰りたくないと思うことがある",
          "仕事を育児の逃げ場にしてる（現在進行形）",
          "奥さん以外に気になる人ができたことがある",
          "子育てで本気で泣いたことがある",
          "若い頃の自分に戻りたいと思うことがある"
        ]
      },
      work: {
        name:"職場セット",
        desc:"会社では言いにくい本音を匿名で",
        questions:[
          "今の会社を辞めたいと思ってる（現在進行形）",
          "上司を心底尊敬できないと思ったことがある",
          "社内に好きな人ができたことがある",
          "仕事でミスをうまく誤魔化したことがある",
          "同期に嫉妬したことがある",
          "給料に不満がある",
          "実力じゃなく要領で乗り切ったことがある",
          "この中に苦手な人がいる",
          "転職・独立を本気で考えてる",
          "仕事よりプライベートを優先して後悔したことがある"
        ]
      },
      mix: {
        name:"男女混合セット",
        desc:"飲み会の空気が一気に変わる恋愛寄り",
        questions:[
          "今夜この中で気になる人ができた",
          "元カレ・元カノとまだ連絡とってる",
          "今夜誰かと2人で話したいと思ってる",
          "一目惚れしたことがある",
          "今の恋愛・結婚状況に不満がある",
          "今夜誰かに嘘ついてることがある",
          "この中に自分より幸せそうで羨ましい人がいる",
          "人生で一番やらかした恋愛はまだ誰にも話してない",
          "今夜が数少ない息抜きになってる",
          "実はここに来た理由が別にある"
        ]
      },
      soft: {
        name:"ライトセット",
        desc:"初回・場慣らし用。重すぎず盛り上がる",
        questions:[
          "今日ちょっとだけ見栄を張っている",
          "実は最近ちょっと疲れている",
          "この中で一番飲み会慣れしている人がいると思う",
          "本音ではもっと褒められたい",
          "昔の自分より今の自分の方が好き",
          "返信をわざと遅らせたことがある",
          "今夜、まだ帰りたくない気持ちが少しある",
          "実は人見知りを隠している",
          "今年中に変えたいことがある",
          "今日のメンバーでまた集まりたい"
        ]
      }
    };

    let state = null;
    let visitorId = localStorage.getItem("hon-meter-visitor") || makeId(12);
    localStorage.setItem("hon-meter-visitor", visitorId);
    let bgmOn = localStorage.getItem("hon-meter-bgm") === "on";
    let audioCtx = null, bgmTimer = null;
    let lastPhase = "";

    roomRef.on("value", snap => {
      state = snap.val();
      if(state){
        if(!state.participants) state.participants = {};
        if(!state.votes) state.votes = {};
      }
      const phase = `${state?.phase||"none"}:${state?.qIndex??0}:${state?.revealing||false}:${state?.published||false}`;
      if(lastPhase && lastPhase !== phase){
        if(state?.phase === "vote") sfx("start");
        if(state?.phase === "closed") sfx("close");
        if(state?.revealing) sfx("drum");
        if(state?.published) { sfx("reveal"); burst(); }
      }
      lastPhase = phase;
      render();
    });

    function makeId(n=5){
      const c="abcdefghijkmnpqrstuvwxyz23456789"; let s="";
      for(let i=0;i<n;i++) s+=c[Math.floor(Math.random()*c.length)];
      return s;
    }
    function esc(x){return String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
    function roomUrl(){
      const u = new URL(location.href); u.searchParams.set("room", roomId); return u.toString();
    }
    function isHost(){ return localStorage.getItem("hon-meter-host-" + roomId) === "1"; }
    function voteOfMe(){ return state?.votes?.[visitorId]?.answer || null; }
    function participantsCount(){ return Object.keys(state?.participants || {}).length; }
    function votes(){ return Object.values(state?.votes || {}).filter(v => v && v.answer); }
    function yesCount(){ return votes().filter(v=>v.answer==="yes").length; }
    function noCount(){ return votes().filter(v=>v.answer==="no").length; }
    function expected(){ return Number(state?.expectedCount || 0); }
    function answered(){ return votes().length; }
    function qText(){ return (state?.questions || [])[state?.qIndex || 0] || ""; }

    function initRoom(){
      const setKey = document.getElementById("setKey")?.value || "papa";
      const expectedCount = Math.max(1, Math.min(80, parseInt(document.getElementById("expected")?.value || "8",10)));
      const autoClose = document.getElementById("autoClose")?.checked ?? true;
      const custom = (document.getElementById("customQ")?.value || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
      const qs = [...custom, ...QUESTION_SETS[setKey].questions];
      localStorage.setItem("hon-meter-host-" + roomId, "1");
      roomRef.set({
        phase:"lobby",
        hostCreatedAt: Date.now(),
        expectedCount,
        autoClose,
        setKey,
        questions: qs,
        qIndex: 0,
        participants:{ [visitorId]: { joinedAt: Date.now(), host: true } },
        votes:{},
        published:false,
        revealing:false,
        history:{}
      });
      sfx("tap");
    }

    function joinAnon(){
      roomRef.child("participants/" + visitorId).set({ joinedAt: Date.now(), ua: navigator.userAgent.slice(0,80) });
      sfx("tap");
    }

    function startQuestion(index = null, customQuestion = ""){
      if(!isHost()) return;
      let qIndex = index === null ? (state?.qIndex || 0) : index;
      let questions = Array.isArray(state?.questions) ? [...state.questions] : [];
      const text = String(customQuestion || "").trim();

      if(text){
        questions.push(text);
        qIndex = questions.length - 1;
      }

      roomRef.update({
        phase:"vote",
        qIndex,
        questions,
        votes:{},
        published:false,
        revealing:false,
        startedAt:Date.now()
      });
      sfx("start");
    }

    function startSelectedQuestion(){
      if(!isHost()) return;
      const custom = document.getElementById("hostCustomQuestion")?.value || "";
      if(custom.trim()){
        startQuestion(null, custom);
        return;
      }
      const selected = document.querySelector('input[name="questionPick"]:checked');
      const idx = selected ? parseInt(selected.value, 10) : (state?.qIndex || 0);
      startQuestion(idx);
    }

    function pickQuestion(index){
      const el = document.getElementById("qpick-" + index);
      if(el) el.checked = true;
      sfx("tap");
    }

    function sendVote(answer){
      if(!state || state.phase !== "vote") return;
      const updates = {};
      updates["participants/" + visitorId] = { joinedAt: state.participants?.[visitorId]?.joinedAt || Date.now(), lastAt: Date.now() };
      updates["votes/" + visitorId] = { answer, at: Date.now() };
      roomRef.update(updates).then(()=>{
        sfx(answer === "yes" ? "yes" : "no");
        if(state.autoClose){
          setTimeout(()=>{
            roomRef.transaction(curr=>{
              if(!curr || curr.phase !== "vote") return curr;
              const v = Object.values(curr.votes || {}).filter(x=>x && x.answer).length;
              const ex = Number(curr.expectedCount || 0);
              if(ex > 0 && v >= ex) curr.phase = "closed";
              return curr;
            });
          }, 220);
        }
      });
    }

    function hostSendVote(answer){
      if(!isHost()) return;
      sendVote(answer);
    }
    function closeVote(){ if(isHost()) roomRef.update({ phase:"closed", closedAt:Date.now() }); }
    function revealResult(){
      if(!isHost()) return;
      roomRef.update({ revealing:true, published:false });
      sfx("drum");
      setTimeout(()=> roomRef.update({ revealing:false, published:true, phase:"result", publishedAt:Date.now() }), 2600);
    }
    function nextQuestion(){
      if(!isHost()) return;
      const idx = Math.min((state.qIndex||0)+1, (state.questions||[]).length-1);
      roomRef.update({ qIndex:idx, phase:"lobby", votes:{}, published:false, revealing:false });
    }
    function resetRoom(){
      if(!confirm("このルームをリセットしますか？")) return;
      roomRef.remove();
      localStorage.removeItem("hon-meter-host-" + roomId);
      sfx("close");
    }
    async function copyUrl(){
      try{ await navigator.clipboard.writeText(roomUrl()); toast("URLをコピーしました"); sfx("tap");}
      catch{ prompt("このURLをコピーしてください", roomUrl()); }
    }

    function ensureAudio(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === "suspended") audioCtx.resume();
    }
    function tone(f,d=.08,type="sine",g=.035,delay=0){
      ensureAudio();
      const t=audioCtx.currentTime+delay, o=audioCtx.createOscillator(), gain=audioCtx.createGain();
      o.type=type; o.frequency.setValueAtTime(f,t);
      gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(g,t+.01); gain.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(gain); gain.connect(audioCtx.destination); o.start(t); o.stop(t+d+.03);
    }
    function sfx(k){
      if(!bgmOn && k!=="tap") return;
      try{
        if(k==="tap") tone(600,.05,"triangle",.02);
        if(k==="start") [392,523,659].forEach((f,i)=>tone(f,.09,"triangle",.035,i*.08));
        if(k==="yes") [620,900].forEach((f,i)=>tone(f,.08,"sine",.03,i*.07));
        if(k==="no") [360,260].forEach((f,i)=>tone(f,.10,"sawtooth",.02,i*.06));
        if(k==="close") [220,180,140].forEach((f,i)=>tone(f,.10,"sawtooth",.025,i*.08));
        if(k==="drum") for(let i=0;i<22;i++) tone(80+Math.random()*35,.045,"square",.018,i*.095);
        if(k==="reveal") [392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.11,"triangle",.04,i*.08));
      }catch(e){}
    }
    function toggleBgm(){
      bgmOn = !bgmOn;
      localStorage.setItem("hon-meter-bgm", bgmOn ? "on":"off");
      document.getElementById("bgmBtn").textContent = bgmOn ? "♪" : "×";
      if(bgmOn){ ensureAudio(); startBgm(); toast("BGM ON");}
      else{ stopBgm(); toast("BGM OFF");}
    }
    function startBgm(){
      stopBgm();
      const seq=[261.63,329.63,392,493.88,392,329.63,293.66,392];
      let i=0;
      bgmTimer=setInterval(()=>{
        if(!bgmOn) return;
        tone(seq[i%seq.length],.18,"sine",.012);
        tone(seq[(i+2)%seq.length]/2,.24,"triangle",.009,.02);
        i++;
      },420);
    }
    function stopBgm(){ if(bgmTimer) clearInterval(bgmTimer); bgmTimer=null; }
    function burst(){
      for(let i=0;i<70;i++){
        const e=document.createElement("div"); e.className="spark";
        e.style.left="50vw"; e.style.top="45vh";
        const a=Math.random()*Math.PI*2, r=90+Math.random()*240;
        e.style.setProperty("--x", Math.cos(a)*r+"px"); e.style.setProperty("--y", Math.sin(a)*r+"px");
        e.style.background=["#ff3ea5","#06b6d4","#fbbf24","#fff","#a78bfa"][Math.floor(Math.random()*5)];
        document.body.appendChild(e); setTimeout(()=>e.remove(),1300);
      }
    }
    function toast(msg){
      const e=document.createElement("div");
      e.textContent=msg;
      e.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:200;background:rgba(0,0,0,.78);color:white;padding:12px 18px;border-radius:18px;font-weight:900;font-size:12px;box-shadow:0 12px 30px rgba(0,0,0,.35)";
      document.body.appendChild(e); setTimeout(()=>e.remove(),1600);
    }

    function render(){
      const app=document.getElementById("app");
      document.getElementById("bgmBtn").textContent = bgmOn ? "♪" : "×";
      if(bgmOn && !bgmTimer) startBgm();
      renderHud();

      if(!state) return app.innerHTML = hostCreateView();
      if(!state.participants?.[visitorId] && !isHost()) return app.innerHTML = guestJoinView();

      if(state.revealing) return app.innerHTML = drumView();
      if(state.phase === "lobby") return app.innerHTML = isHost() ? hostLobbyView() : guestLobbyView();
      if(state.phase === "vote") return app.innerHTML = isHost() ? hostVoteView() : guestVoteView();
      if(state.phase === "closed") return app.innerHTML = isHost() ? hostClosedView() : guestClosedView();
      if(state.phase === "result") return app.innerHTML = resultView();
      app.innerHTML = hostCreateView();
    }

    function renderHud(){
      const hud=document.getElementById("hud");
      const setName = QUESTION_SETS[state?.setKey]?.name || "未設定";
      hud.innerHTML = `
        <div class="grid grid-cols-3 gap-2 text-center">
          <div class="rounded-2xl bg-white/10 border border-white/10 p-2"><div class="mini">ROOM</div><div class="font-black">${esc(roomId)}</div></div>
          <div class="rounded-2xl bg-white/10 border border-white/10 p-2"><div class="mini">JOIN</div><div class="font-black">${participantsCount()}/${expected()||"-"}</div></div>
          <div class="rounded-2xl bg-white/10 border border-white/10 p-2"><div class="mini">SET</div><div class="font-black truncate">${esc(setName)}</div></div>
        </div>`;
    }

    function hostCreateView(){
      return `<section class="glass card fade relative overflow-hidden">
        <div class="particle text-5xl" style="right:18px;top:22px">💎</div>
        <div class="mini mb-3">HOST SETUP</div>
        <h2 class="text-3xl font-black tracking-tight mb-2">ルームを作成</h2>
        <p class="text-white/62 text-sm font-bold leading-relaxed mb-5">参加者は名前入力なし。誰が押したかは保存せず、Yes/Noの人数だけをリアルタイム集計します。</p>
        <label class="mini">参加予定人数</label>
        <input id="expected" type="number" value="8" min="1" max="80" class="input mt-2 mb-4" />
        <label class="mini">質問セット</label>
        <select id="setKey" class="select mt-2 mb-4">
          ${Object.entries(QUESTION_SETS).map(([k,v])=>`<option value="${k}">${esc(v.name)} - ${esc(v.desc)}</option>`).join("")}
        </select>
        <label class="flex items-center gap-3 rounded-2xl bg-white/10 border border-white/10 p-4 mb-4">
          <input id="autoClose" type="checkbox" checked class="scale-125">
          <span class="font-black text-sm">全員回答したら自動締め切り</span>
        </label>
        <label class="mini">追加質問 任意 / 1行1問</label>
        <textarea id="customQ" class="input mt-2 mb-5 min-h-[100px]" placeholder="今日だけの質問を追加できます"></textarea>
        <button onclick="initRoom()" class="btn btn-main w-full text-lg">ルーム起動</button>
      </section>`;
    }

    function guestJoinView(){
      return `<section class="glass card fade text-center">
        <div class="text-6xl mb-4 pulse">🎭</div>
        <div class="mini mb-3">NO NAME / FULL ANONYMOUS</div>
        <h2 class="text-3xl font-black mb-3">匿名で参加</h2>
        <p class="text-white/62 font-bold text-sm leading-relaxed mb-6">名前は入力しません。<br>端末ごとの匿名IDで、二重投票だけ防ぎます。</p>
        <button onclick="joinAnon()" class="btn btn-main w-full text-lg">参加する</button>
      </section>`;
    }

    function hostLobbyView(){
      const qs = Array.isArray(state.questions) ? state.questions : [];
      const current = state.qIndex || 0;
      const cards = [];
      for(let i=0; i<5; i++){
        const idx = (current + i) % Math.max(1, qs.length);
        if(qs[idx]) cards.push({ idx, text: qs[idx] });
      }
      return `<section class="space-y-4 fade">
        <div class="glass card text-center">
          <div class="mini mb-3">INVITE</div>
          <h2 class="text-2xl font-black mb-4">QRで参加してもらう</h2>
          <div id="qrcode" class="qrbox inline-block bg-white p-3 rounded-[24px] mb-4"></div>
          <p class="text-[11px] text-white/60 font-bold break-all">${esc(roomUrl())}</p>
          <button onclick="copyUrl()" class="btn btn-ghost w-full mt-4">参加者URLコピー</button>
          <button onclick="openGuestView()" class="btn btn-main w-full mt-3">この端末で参加者画面を開く</button>
        </div>

        <div class="glass card">
          <div class="mini mb-3">QUESTION SELECT</div>
          <h2 class="text-2xl font-black mb-2">質問を選んで出題</h2>
          <p class="text-white/55 text-xs font-bold mb-4">カードから選ぶか、下に自由入力して出題できます。</p>

          <div class="space-y-3 mb-5">
            ${cards.map((q, i)=>`
              <label onclick="pickQuestion(${q.idx})" class="block rounded-[24px] bg-white/10 border border-white/10 p-4 cursor-pointer">
                <div class="flex gap-3 items-start">
                  <input id="qpick-${q.idx}" name="questionPick" type="radio" value="${q.idx}" ${i===0 ? "checked" : ""} class="mt-1 scale-125">
                  <div class="flex-1">
                    <div class="mini mb-1">CARD ${i+1} / Q${q.idx+1}</div>
                    <div class="font-black leading-relaxed">${esc(q.text)}</div>
                  </div>
                </div>
              </label>
            `).join("")}
          </div>

          <label class="mini">自由入力の質問</label>
          <textarea id="hostCustomQuestion" class="input mt-2 mb-4 min-h-[92px]" placeholder="ここに入力すると、カードではなくこの質問を出題します"></textarea>

          <button onclick="startSelectedQuestion()" class="btn btn-gold w-full text-lg">選んだ質問を出題</button>
        </div>
      </section>`;
    }

    function guestLobbyView(){
      return `<section class="glass card text-center fade">
        <div class="text-6xl mb-5 pulse">✨</div>
        <div class="mini mb-3">STAND BY</div>
        <h2 class="text-2xl font-black mb-3">ホストの出題を待っています</h2>
        <p class="text-white/58 text-sm font-bold">スマホはこのままでOKです。</p>
      </section>`;
    }

    function hostVoteView(){
      const mine = voteOfMe();
      return `<section class="space-y-4 fade">
        <div class="glass card">
          <div class="mini mb-3">NOW VOTING / HOST CAN VOTE</div>
          <h2 class="text-2xl font-black leading-relaxed">${esc(qText())}</h2>
          <div class="mt-5">
            <div class="flex justify-between text-sm font-black mb-2"><span>回答済み</span><span>${answered()}/${expected() || participantsCount()}</span></div>
            <div class="bar"><div style="width:${Math.min(100, answered()/Math.max(1, expected()||participantsCount())*100)}%"></div></div>
          </div>
        </div>

        <div class="glass card text-center">
          <div class="mini mb-3">HOST VOTE</div>
          <p class="text-white/60 text-xs font-bold mb-4">ホストも匿名票として投票できます。結果には誰の票か表示されません。</p>
          <div class="grid grid-cols-2 gap-3">
            <button onclick="hostSendVote('yes')" class="btn btn-yes choice ${mine==='yes'?'selected':''} text-2xl">YES<br><span class="text-xs opacity-70">押す</span></button>
            <button onclick="hostSendVote('no')" class="btn btn-no choice ${mine==='no'?'selected':''} text-2xl">NO<br><span class="text-xs opacity-70">押さない</span></button>
          </div>
          <p class="text-white/45 text-[11px] font-bold mt-4">${mine ? "ホスト投票済み。締め切りまで変更できます。" : "ホストもここで投票してください。"}</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="closeVote()" class="btn btn-ghost">締め切る</button>
          <button onclick="revealResult()" class="btn btn-gold">結果公開</button>
        </div>
      </section>`;
    }

    function guestVoteView(){
      const mine = voteOfMe();
      return `<section class="glass card text-center fade">
        <div class="mini mb-3">QUESTION ${(state.qIndex||0)+1}</div>
        <h2 class="text-[28px] font-black leading-relaxed mb-7">${esc(qText())}</h2>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="sendVote('yes')" class="btn btn-yes choice ${mine==='yes'?'selected':''} text-2xl">YES<br><span class="text-xs opacity-70">押す</span></button>
          <button onclick="sendVote('no')" class="btn btn-no choice ${mine==='no'?'selected':''} text-2xl">NO<br><span class="text-xs opacity-70">押さない</span></button>
        </div>
        <p class="text-white/50 text-xs font-bold mt-5">${mine ? "投票済み。締め切りまで変更できます。" : "どちらかをタップしてください。"}</p>
      </section>`;
    }

    function hostClosedView(){
      return `<section class="glass card text-center fade">
        <div class="text-6xl mb-4">🔒</div>
        <div class="mini mb-3">CLOSED</div>
        <h2 class="text-2xl font-black mb-3">投票を締め切りました</h2>
        <p class="text-white/62 font-bold mb-6">回答数：${answered()} / ${expected() || participantsCount()}</p>
        <button onclick="revealResult()" class="btn btn-gold w-full text-lg">ドラムロールで公開</button>
      </section>`;
    }

    function guestClosedView(){
      return `<section class="glass card text-center fade">
        <div class="text-6xl mb-4 pulse">🥁</div>
        <div class="mini mb-3">LOCKED</div>
        <h2 class="text-2xl font-black">結果公開を待っています</h2>
      </section>`;
    }

    function drumView(){
      return `<section class="glass card text-center fade">
        <div class="text-7xl mb-5 pulse">🥁</div>
        <div class="mini mb-4">DRUM ROLL</div>
        <h2 class="text-4xl font-black tracking-tight">公開中…</h2>
        <div class="mt-8 bar"><div class="animate-pulse" style="width:100%"></div></div>
      </section>`;
    }

    function resultView(){
      const y=yesCount(), n=noCount(), total=y+n, ex=expected() || participantsCount();
      const rate = total ? Math.round(y/total*100) : 0;
      const deg = Math.round(rate*3.6);
      return `<section class="space-y-4 fade">
        <div class="glass card text-center overflow-hidden">
          <div class="mini mb-3">RESULT</div>
          <h2 class="text-xl font-black leading-relaxed mb-6">${esc(qText())}</h2>
          <div class="meter pop" style="--deg:${deg}deg">
            <div class="meter-inner">
              <div class="mini">YES</div>
              <div class="count">${y}<span class="text-3xl tracking-normal">/${ex}</span></div>
              <div class="text-sm font-black text-white/55 mt-2">${rate}% が押した</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-7">
            <div class="rounded-[24px] bg-pink-500/15 border border-pink-300/20 p-4"><div class="mini">YES</div><div class="text-4xl font-black text-pink-200">${y}</div></div>
            <div class="rounded-[24px] bg-cyan-500/15 border border-cyan-300/20 p-4"><div class="mini">NO</div><div class="text-4xl font-black text-cyan-200">${n}</div></div>
          </div>
        </div>
        ${isHost()?`<div class="grid grid-cols-2 gap-3">
          <button onclick="startQuestion()" class="btn btn-ghost">同じ質問を再投票</button>
          <button onclick="nextQuestion()" class="btn btn-main">次の質問へ</button>
        </div>`:`<div class="glass card text-center"><p class="font-black text-white/65">次の質問を待っています</p></div>`}
      </section>`;
    }

    // QR生成はDOM反映後に実行
    const observer = new MutationObserver(()=>{
      const q = document.getElementById("qrcode");
      if(q && !q.dataset.done && window.QRCode){
        q.dataset.done="1";
        new QRCode(q, { text: roomUrl(), width: 184, height: 184, correctLevel: QRCode.CorrectLevel.M });
      }
    });
    observer.observe(document.body,{childList:true,subtree:true});

    render();
  </script>
</body>
</html>
