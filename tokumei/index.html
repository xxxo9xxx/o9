function startQuestion(index=null,customQuestion=""){if(!isHost())return;let questions=Array.isArray(state?.questions)?[...state.questions]:[];let qIndex=index===null?(state?.qIndex||0):index;const text=String(customQuestion||"").trim();if(text){questions.push(text);qIndex=questions.length-1}const usedIndexes={...(state?.usedIndexes||{})};usedIndexes[qIndex]=true;roomRef.update({phase:"vote",qIndex,questions,usedIndexes,roundNo:completedCount()+1,votes:{},published:false,revealing:false,startedAt:Date.now()});sfx("start")}function startSelectedQuestion(index){if(!isHost())return;startQuestion(index)}

function sendVote(answer){if(!state||state.phase!=="vote")return;const updates={};updates["participants/"+visitorId]={joinedAt:state.participants?.[visitorId]?.joinedAt||Date.now(),lastAt:Date.now()};updates["votes/"+visitorId]={answer,at:Date.now()};roomRef.update(updates).then(()=>sfx(answer==="yes"?"yes":"no"))}function closeVote(){if(isHost())roomRef.update({phase:"closed",closedAt:Date.now()})}
function revealResult(){if(!isHost())return;roomRef.update({revealing:true,published:false});sfx("drum");setTimeout(()=>{const idx=state?.qIndex||0;const totalVotes=answered();const key=String(completedCount()+1).padStart(3,"0");roomRef.update({revealing:false,published:true,phase:"result",publishedAt:Date.now(),["history/"+key]:{order:completedCount()+1,index:idx,question:qText(),yes:yesCount(),no:noCount(),total:totalVotes,participants:participantsCount(),at:Date.now()}})},2800)}

function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}function tone(f,d=.08,type="sine",g=.035,delay=0){ensureAudio();const t=audioCtx.currentTime+delay,o=audioCtx.createOscillator(),gain=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(g,t+.01);gain.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(gain);gain.connect(audioCtx.destination);o.start(t);o.stop(t+d+.03)}function sfx(k){if(!bgmOn&&k!=="tap")return;try{if(k==="tap")tone(600,.05,"triangle",.02);if(k==="start")[392,523,659].forEach((f,i)=>tone(f,.09,"triangle",.035,i*.08));if(k==="yes")[620,900].forEach((f,i)=>tone(f,.08,"sine",.03,i*.07));if(k==="no")[360,260].forEach((f,i)=>tone(f,.10,"sawtooth",.02,i*.06));if(k==="close")[220,180,140].forEach((f,i)=>tone(f,.10,"sawtooth",.025,i*.08));if(k==="drum")for(let i=0;i<24;i++)tone(80+Math.random()*35,.045,"square",.018,i*.095);if(k==="reveal")[392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.11,"triangle",.04,i*.08))}catch(e){}}
function toggleBgm(){bgmOn=!bgmOn;localStorage.setItem("hon-meter-bgm",bgmOn?"on":"off");document.getElementById("bgmBtn").textContent=bgmOn?"♪":"×";if(bgmOn){ensureAudio();startBgm();toast("BGM ON")}else{stopBgm();toast("BGM OFF")}}function startBgm(){stopBgm();const seq=[261.63,329.63,392,493.88,392,329.63,293.66,392];let i=0;bgmTimer=setInterval(()=>{if(!bgmOn)return;tone(seq[i%seq.length],.18,"sine",.012);tone(seq[(i+2)%seq.length]/2,.24,"triangle",.009,.02);i++},420)}function stopBgm(){if(bgmTimer)clearInterval(bgmTimer);bgmTimer=null}function burst(){for(let i=0;i<70;i++){const e=document.createElement("div");e.className="spark";e.style.left="50vw";e.style.top="45vh";const a=Math.random()*Math.PI*2,r=90+Math.random()*240;e.style.setProperty("--x",Math.cos(a)*r+"px");e.style.setProperty("--y",Math.sin(a)*r+"px");e.style.background=["#ff3ea5","#06b6d4","#fbbf24","#fff","#a78bfa"][Math.floor(Math.random()*5)];document.body.appendChild(e);setTimeout(()=>e.remove(),1300)}}function toast(msg){const e=document.createElement("div");e.textContent=msg;e.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:200;background:rgba(0,0,0,.78);color:white;padding:12px 18px;border-radius:18px;font-weight:900;font-size:12px;box-shadow:0 12px 30px rgba(0,0,0,.35)";document.body.appendChild(e);setTimeout(()=>e.remove(),1600)}
function render(){const app=document.getElementById("app");document.getElementById("bgmBtn").textContent=bgmOn?"♪":"×";if(bgmOn&&!bgmTimer)startBgm();renderHud();if(urlRole()==="admin")return app.innerHTML=questionAdminView();if(!state)return app.innerHTML=hostCreateView();if(!state.participants?.[visitorId]&&!isHost())return app.innerHTML=guestJoinView();if(state.revealing){app.innerHTML=rollView();startVisualRoll();return}else stopVisualRoll();if(state.phase==="invite")return app.innerHTML=isHost()?hostInviteView():guestLobbyView("開始まで待っています");if(state.phase==="select")return app.innerHTML=(!isHost()&&state.questionSelectVisible===false)?guestLobbyView("ホストが質問を選んでいます"):questionSelectView();if(state.phase==="vote")return app.innerHTML=voteView();if(state.phase==="closed")return app.innerHTML=isHost()?hostClosedView():guestLobbyView("結果公開を待っています");if(state.phase==="result")return app.innerHTML=resultView();if(state.phase==="summary")return app.innerHTML=summaryView();app.innerHTML=hostCreateView()}

function hostClosedView(){return `<section class="glass card text-center fade"><div class="text-6xl mb-4">🔒</div><div class="mini mb-3">CLOSED</div><h2 class="text-2xl font-black mb-3">投票を締め切りました</h2><p class="text-white/62 font-bold mb-6">回答数：${answered()} / ${participantsCount()}</p><button onclick="revealResult()" class="btn btn-gold w-full text-lg">デジタル発表へ</button></section>`}
function rollView(){return `<section class="glass card text-center fade"><div class="mini mb-4">DIGITAL ROLL</div><h2 class="text-2xl font-black leading-relaxed mb-2">${esc(qText())}</h2><div class="digit-wrap"><div id="rollA" class="digit spin">0</div><div class="text-6xl font-black pb-4">/</div><div id="rollB" class="digit spin">0</div></div><p class="text-white/60 font-black">YES人数を集計中…</p></section>`}function startVisualRoll(){stopVisualRoll();rollTimer=setInterval(()=>{const a=document.getElementById("rollA"),b=document.getElementById("rollB");if(a)a.textContent=Math.floor(Math.random()*10);if(b)b.textContent=Math.max(1,participantsCount()||1)},70)}function stopVisualRoll(){if(rollTimer)clearInterval(rollTimer);rollTimer=null}
function resultView(){const y=yesCount(),n=noCount(),total=y+n,members=participantsCount();const rate=total?Math.round(y/total*100):0;const deg=Math.round(rate*3.6);return `<section class="space-y-4 fade"><div class="glass card text-center overflow-hidden"><div class="mini mb-3">RESULT</div><h2 class="text-xl font-black leading-relaxed mb-6">${esc(qText())}</h2><div class="digit-wrap pop"><div class="digit">${y}</div><div class="text-6xl font-black pb-4">/</div><div class="digit">${members}</div></div><div class="text-2xl font-black text-amber-200 mb-6">YES</div><div class="meter pop" style="--deg:${deg}deg"><div class="meter-inner"><div class="mini">YES RATE</div><div class="count">${rate}<span class="text-3xl tracking-normal">%</span></div><div class="text-sm font-black text-white/55 mt-2">NO ${n}人</div></div></div></div>${isHost()?`<div class="grid grid-cols-2 gap-3"><button onclick="startQuestion(state.qIndex)" class="btn btn-ghost">同じ質問を再投票</button><button onclick="nextFlow()" class="btn btn-main">${completedCount()>=totalQuestions()?"結果一覧へ":"次の質問へ"}</button></div><button onclick="showFinalSummary()" class="btn btn-gold w-full mt-3">途中結果一覧を見る</button>${inviteFold()}`:`<div class="glass card text-center"><p class="font-black text-white/65">次の質問を待っています</p></div>`}</section>`}
function summaryView(){const items=Object.values(state?.history||{}).sort((a,b)=>(a.order||0)-(b.order||0));const ranked=[...items].sort((a,b)=>{const ar=a.total?a.yes/a.total:0,br=b.total?b.yes/b.total:0;return br-ar});const top=ranked.slice(0,3);const totalYes=items.reduce((s,x)=>s+(x.yes||0),0);const totalVotes=items.reduce((s,x)=>s+(x.total||0),0);const avg=totalVotes?Math.round(totalYes/totalVotes*100):0;return `<section class="space-y-4 fade"><div id="summary-capture" class="space-y-4"><div class="glass card text-center"><div class="text-6xl mb-4">🏆</div><div class="mini mb-3">FINAL SUMMARY</div><h2 class="text-3xl font-black mb-2">結果一覧</h2><p class="text-white/60 font-bold text-sm">実施 ${items.length}問 / YES平均 ${avg}%</p></div><div class="glass card"><div class="mini mb-4">YES率ランキング TOP3</div><div class="space-y-3">${top.map((x,i)=>{const rate=x.total?Math.round(x.yes/x.total*100):0;return `<div class="rounded-[24px] bg-white/10 border border-white/10 p-4"><div class="flex items-center justify-between gap-3 mb-2"><div class="text-2xl font-black text-amber-200">#${i+1}</div><div class="text-3xl font-black">${x.yes}/${x.participants||x.total}</div></div><div class="font-black leading-relaxed">${esc(x.question)}</div><div class="bar mt-3"><div style="width:${rate}%"></div></div><div class="text-right text-xs font-black text-white/55 mt-1">${rate}%</div></div>`}).join("")||`<div class="text-center text-white/40 font-black py-8">まだ公開済みの結果がありません</div>`}</div></div><div class="glass card"><div class="mini mb-4">ALL RESULTS</div><div class="space-y-2">${items.map((x,i)=>{const rate=x.total?Math.round(x.yes/x.total*100):0;return `<div class="rounded-2xl bg-white/10 border border-white/10 p-3"><div class="flex justify-between gap-3"><div class="font-black text-sm leading-relaxed">${i+1}. ${esc(x.question)}</div><div class="font-black text-pink-200 shrink-0">${x.yes}/${x.participants||x.total}</div></div><div class="bar mt-2"><div style="width:${rate}%"></div></div><div class="text-right text-[10px] font-black text-white/45 mt-1">YES ${rate}% / NO ${x.no||0}人</div></div>`}).join("")}</div></div></div>${isHost()?`<div class="grid grid-cols-1 gap-3"><button onclick="exportSummaryImage()" class="btn btn-gold">ALL RESULTSを画像保存</button><div class="grid grid-cols-2 gap-3"><button onclick="beginSelect()" class="btn btn-main">質問を続ける</button><button onclick="resetRoom()" class="btn btn-ghost">終了</button></div>${inviteFold()}`:`<div class="glass card text-center"><p class="font-black text-white/65">ホストが次へ進めます</p></div>`}</section>`}
const observer=new MutationObserver(()=>{const q=document.getElementById("qrcode");if(q&&!q.dataset.done&&window.QRCode){q.dataset.done="1";new QRCode(q,{text:roomUrl(),width:184,height:184,correctLevel:QRCode.CorrectLevel.M})}});observer.observe(document.body,{childList:true,subtree:true});render();
</script></body></html>
