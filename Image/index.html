<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Profile - Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; touch-action: manipulation; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .god-mode { background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899, #f43f5e); background-size: 300% 300%; animation: rainbow 2s linear infinite; color: white !important; }
        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .bar-segment { height: 100%; transition: width 1s ease-in-out; border-right: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 text-slate-800 flex flex-col">

    <div id="app" class="max-w-md mx-auto text-center flex-grow w-full">
        <header class="mb-6 pt-4">
            <h1 class="text-3xl font-black text-indigo-600 italic tracking-tighter">Image Profile</h1>
            <p id="room-display" class="text-[8px] font-bold text-slate-400 mt-2 uppercase tracking-[0.3em]"></p>
        </header>
        <div id="game-content"></div>
    </div>

    <div id="footer-reset" class="max-w-md mx-auto w-full py-8 text-center space-y-4">
        <div id="host-force-area"></div>
        <button onclick="allReset()" class="text-[10px] text-slate-300 hover:text-red-400 font-bold uppercase tracking-widest transition-colors">
            --- Room Dissolution ---
        </button>
    </div>

    <script>
        // お題セット
        const QUESTIONS_SET = {
            standard: ["優しそう", "頭が良さそう", "嘘がつけなそう", "行動力がありそう", "落ち着いていそう", "モテそうなオーラ", "運動が得意そう", "話しが上手そう", "メンタルが強そう", "センスが良さそう"],
            normal_extra: [
                "相談にのってくれそう", "困っている人を放っておけなそう", "隠れた才能を持ってそう", "決めたことは最後までやり遂げそう", "どんな場所でも馴染めそう",
                "意外と涙もろそう", "知識の引き出しが多そう", "丁寧に暮らしてそう", "家族との仲が良そう", "自分の意見をしっかり持ってそう",
                "先回りして行動できそう", "誰にでも平等に接しそう", "感情が安定してそう", "アドバイス上手そう", "責任感が人一倍強そう",
                "流されない芯がありそう", "早起きしてそう", "謙虚そう", "いつも勉強していそう", "変化を楽しめそう",
                "字が綺麗そう", "周りの空気を読むのが上手そう", "人から信頼されてそう", "健康管理を徹底してそう", "自分の世界観を大切にしてそう",
                "集中力がありそう", "聞き上手そう", "記憶力が良さそう", "なにかを育てるのが上手そう", "目標を持って生きてそう",
                "頼まれたら断れなそう", "冷静な判断ができそう", "意外な趣味を持ってそう", "努力を人に見せなそう", "トラブルも楽しめそう",
                "品格がありそう", "物を長く大切に使ってそう", "精神的に自立してそう", "柔軟な発想ができそう", "誠実な恋愛をしてそう",
                "将来のビジョンが明確そう", "包容力がありそう", "誰かの憧れの存在になってそう", "アイデアを出すのが得意そう", "トラブルを解決してくれそう",
                "レスポンスが速そう", "人を惹きつけそう", "ピンチをチャンスに変えそう", "計算が速そう", "論理的な説明が上手そう",
                "決断に迷いがなそう", "仕事ができそう", "周囲盛り上げるのが上手そう", "根回しや調整が完璧そう", "独自のキャリアプランを持ってそう",
                "コミュ力が高そう", "仕事を楽しんでやってそう", "自分の独特なペースを持っていそう", "人脈を広げるのが上手そう", "メンタルが安定してそう",
                "人のサポートが得意そう", "街中で声をかけられることが多そう", "日記を書いていそう", "楽器が弾けそう", "初見の人に好かれそう", "人をよく観察していそう", "コミュ力が高そう"
            ],
            black: [
                "腹黒そう", "怒ると怖そう", "嘘が上手そう", "私生活が謎そう", "浪費癖がありそう", 
                "家ではズボラそう", "毒舌そう", "執念深そう",
                "人を使うのが上手そう", "不倫しそう", "昔はやんちゃしてそう", "酔うと性格が変わりそう", "他人に興味なさそう",
                "飽きっぽそう", "実は潔癖症そう", "意外と毒を吐きそう", "無意識に人を惑わせそう",
                "弱みを見せなそう", "裏では繊細そう"
            ]
        };
        const COLORS = ["#6366f1", "#8b5cf6", "#a855f7", "#d946ef", "#ec4899", "#f43f5e", "#ef4444", "#f59e0b", "#10b981", "#06b6d4"];

        const firebaseConfig = {
            apiKey: "AIzaSyBmzPmehSaV--mn0Hd0S-fd97nf5RX4Dvg",
            authDomain: "membertoiro.firebaseapp.com",
            databaseURL: "https://membertoiro-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "membertoiro",
            storageBucket: "membertoiro.firebasestorage.app",
            messagingSenderId: "858132874746",
            appId: "1:858132874746:web:9d6e1156a350dd396b9043"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'party-room';
        const roomRef = db.ref("rooms/" + roomId);
        document.getElementById('room-display').innerText = "ROOM: " + roomId;

        let myName = localStorage.getItem("toiro-name") || "";
        let myRole = localStorage.getItem("toiro-role") || ""; 
        let gameState = null;

        roomRef.on("value", (snapshot) => {
            gameState = snapshot.val();
            if (!gameState && myName) { 
                localStorage.clear(); myName = ""; myRole = ""; location.reload(); 
            }

            // localStorageに古いhost情報が残っていても、DB上のhost本人以外はゲスト扱いに戻す
            if (gameState && myRole === 'host' && gameState.host && gameState.host !== myName) {
                myRole = 'guest';
                localStorage.setItem("toiro-role", "guest");
            }

            render();
        });

        function joinGame(role) {
            const name = document.getElementById('name-input')?.value.trim();
            if (!name) return;

            roomRef.transaction((curr) => {
                // ルームが存在しない場合だけ、最初のホスト作成を許可
                if (!curr) {
                    return {
                        phase: 'setup',
                        members: [name],
                        host: (role === 'host' ? name : "")
                    };
                }

                if (!curr.members) curr.members = [];

                // すでにホストがいる場合、別名の人はホスト参加できない
                if (role === 'host' && curr.host && curr.host !== name) {
                    return; // transactionを中止
                }

                if (!curr.members.includes(name)) curr.members.push(name);

                // ホストが未設定の場合だけホストを設定
                if (role === 'host' && !curr.host) {
                    curr.host = name;
                }

                return curr;
            }, (error, committed, snapshot) => {
                if (error) {
                    alert("参加処理でエラーが発生しました。もう一度お試しください。");
                    return;
                }

                if (!committed) {
                    alert("このルームにはすでにホストがいます。ゲストとして参加してください。");
                    return;
                }

                myName = name;
                myRole = (role === 'host' && snapshot.val()?.host === name) ? 'host' : 'guest';
                localStorage.setItem("toiro-name", myName);
                localStorage.setItem("toiro-role", myRole);
            });
        }

        function startGame(mode) {
            let qs = [];
            if (mode === 'standard') {
                qs = QUESTIONS_SET.standard;
            } else if (mode === 'black') {
                qs = [...QUESTIONS_SET.black].sort(() => 0.5 - Math.random()).slice(0, 10);
            } else if (mode === 'normal_random') {
                qs = [...QUESTIONS_SET.normal_extra].sort(() => 0.5 - Math.random()).slice(0, 10);
            } else if (mode === 'all_random') {
                const all = [...QUESTIONS_SET.normal_extra, ...QUESTIONS_SET.black];
                qs = all.sort(() => 0.5 - Math.random()).slice(0, 10);
            }
            if (qs.length < 10) qs = qs.concat(QUESTIONS_SET.standard).slice(0, 10);

            roomRef.update({ phase: 'playing', questions: qs, currentQIdx: 0, answers: {}, selfExpects: {}, revealIdx: 0 });
        }

        function submitAnswer(selection) {
            const qIdx = gameState.currentQIdx;
            roomRef.child(`answers/${qIdx}/${myName}`).set(selection).then(() => {
                roomRef.transaction((curr) => {
                    if (!curr || !curr.answers[qIdx]) return curr;
                    if (Object.keys(curr.answers[qIdx]).length === curr.members.length) {
                        if (curr.currentQIdx < 9) curr.currentQIdx++; else curr.phase = 'self-check';
                    }
                    return curr;
                });
            });
        }

        function submitSelfExpect(idx) {
            roomRef.child(`selfExpects/${myName}`).set(idx).then(() => {
                roomRef.transaction((curr) => {
                    if (!curr || !curr.selfExpects) return curr;
                    if (Object.keys(curr.selfExpects).length === curr.members.length) {
                        curr.phase = 'revealing';
                    }
                    return curr;
                });
            });
        }

        function forceNext() {
            if (!confirm("強制的に次のステップへ進めますか？")) return;
            roomRef.transaction((curr) => {
                if (!curr) return curr;
                if (curr.phase === 'playing') {
                    if (curr.currentQIdx < 9) curr.currentQIdx++; else curr.phase = 'self-check';
                } else if (curr.phase === 'self-check') {
                    curr.phase = 'revealing';
                }
                return curr;
            });
        }

        function allReset() { if (confirm("ルームを解散しますか？")) roomRef.remove(); }

        function render() {
            const container = document.getElementById('game-content');
            const forceArea = document.getElementById('host-force-area');
            forceArea.innerHTML = "";

            // --- 入力中に消えないように修正 ---
            if (!myName) {
                // すでに描画済みなら何もしない（他の人が入室してもinputの中身を保護する）
                if (document.getElementById('name-input')) return;

                const hostExists = !!(gameState && gameState.host);
                container.innerHTML = `<div class="bg-white p-8 rounded-3xl shadow-xl fade-in">
                    <input id="name-input" type="text" placeholder="名前" class="w-full mb-6 border-2 p-4 rounded-2xl font-bold text-center outline-none focus:border-indigo-500">
                    <button onclick="joinGame('host')" class="w-full ${hostExists?'bg-slate-100 text-slate-400':'bg-indigo-600 text-white'} h-14 rounded-2xl font-bold mb-3" ${hostExists?'disabled':''}>${hostExists?'ホスト参加済み':'ホスト参加'}</button>
                    <button onclick="joinGame('guest')" class="w-full border-2 border-indigo-100 text-indigo-600 h-14 rounded-2xl font-bold">ゲスト参加</button>
                    ${hostExists ? `<p class="mt-3 text-[10px] text-slate-400 font-bold">ホストは1人だけです。2人目以降はゲストで参加してください。</p>` : ''}
                </div>`;
                return;
            }

            if (!gameState || gameState.phase === 'setup') {
                const members = gameState?.members || [myName];
                container.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-lg mb-6 fade-in text-left">
                    <div class="flex flex-wrap justify-center gap-2 mb-8">${members.map(m => `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold text-xs">#${m}</span>`).join('')}</div>
                    ${myRole === 'host' ? `
                        <div class="space-y-3">
                            <button onclick="startGame('standard')" class="w-full bg-indigo-600 text-white h-14 rounded-2xl font-bold">スタンダード (固定10問)</button>
                            <button onclick="startGame('black')" class="w-full bg-slate-800 text-white h-14 rounded-2xl font-bold">ブラック (ランダム10問)</button>
                            <button onclick="startGame('normal_random')" class="w-full border-2 border-indigo-600 text-indigo-600 h-14 rounded-2xl font-bold">ノーマルランダム (別枠10問)</button>
                            <button onclick="startGame('all_random')" class="w-full border-2 border-slate-800 text-slate-800 h-14 rounded-2xl font-bold">オールランダム (混合10問)</button>
                        </div>
                    ` : `<p class="p-4 text-center text-indigo-400 font-bold animate-pulse text-xs">ホストが開始するのを待っています...</p>`}
                </div>`;
            }

            else if (gameState.phase === 'playing') {
                const q = gameState.questions[gameState.currentQIdx];
                const currentAns = (gameState.answers && gameState.answers[gameState.currentQIdx]) || {};
                const others = gameState.members.filter(m => m !== myName);
                if (myRole === 'host' && currentAns[myName]) {
                    forceArea.innerHTML = `<button onclick="forceNext()" class="text-[9px] bg-white border border-slate-200 text-slate-300 px-4 py-1 rounded-full font-bold">SKIP ❯❯</button>`;
                }
                container.innerHTML = `<div class="mb-6 fade-in"><p class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-1 rounded font-bold inline-block mb-2">Question ${gameState.currentQIdx+1}</p><h2 class="text-2xl font-black text-slate-800 leading-tight">一番、<span class="text-indigo-600 underline">${q}</span>な人は？</h2></div>
                ${currentAns[myName] ? `<div class="p-12 text-slate-300 font-bold animate-pulse text-xs italic">Waiting for others...</div>` : `<div class="card-grid">${others.map(m => `<button onclick="submitAnswer('${m}')" class="h-24 rounded-2xl font-black bg-white border-b-4 border-slate-200 text-indigo-600 shadow-sm active:translate-y-1 transition-all">${m}<small class="san">さん</small></button>`).join('')}</div>`}`;
            }

            else if (gameState.phase === 'self-check') {
                const hasEx = gameState.selfExpects && gameState.selfExpects[myName] !== undefined;
                if (myRole === 'host' && hasEx) {
                    forceArea.innerHTML = `<button onclick="forceNext()" class="text-[9px] bg-white border border-slate-200 text-slate-300 px-4 py-1 rounded-full font-bold">FORCE RESULT ❯❯</button>`;
                }
                container.innerHTML = `<div class="fade-in"><h2 class="text-2xl font-black text-slate-800 mb-2">自己予想</h2><p class="text-[11px] text-slate-400 mb-8 italic">自分が最も票を集めそうな項目は？</p>
                ${hasEx ? `<div class="p-12 text-slate-300 font-bold animate-pulse text-xs italic">Waiting for everyone...</div>` : `<div class="grid grid-cols-2 gap-2">${gameState.questions.map((q, i) => `<button onclick="submitSelfExpect(${i})" class="bg-white border border-indigo-100 p-4 rounded-xl font-bold text-indigo-600 text-[10px] shadow-sm active:bg-indigo-50"># ${q}</button>`).join('')}</div>`}</div>`;
            }

            else if (gameState.phase === 'revealing') {
                const rIdx = gameState.revealIdx || 0;
                const q = gameState.questions[rIdx];
                const ans = (gameState.answers && gameState.answers[rIdx]) || {};
                const counts = {}; gameState.members.forEach(m => counts[m] = 0);
                Object.values(ans).forEach(v => { if(counts[v] !== undefined) counts[v]++; });
                const max = Math.max(...Object.values(counts));
                const winners = Object.keys(counts).filter(m => counts[m] === max && max > 0);
                const correctGuessers = gameState.members.filter(m => gameState.selfExpects[m] === rIdx);

                container.innerHTML = `<div class="fade-in"><p class="text-slate-400 font-bold text-[10px] mb-2 uppercase tracking-widest">Question ${rIdx+1}</p><h2 class="text-xl font-black mb-10 text-slate-700 underline decoration-indigo-200 underline-offset-8">一番、${q}人は？</h2>
                    <div class="bg-white p-12 rounded-[3.5rem] shadow-xl border-t-8 border-indigo-500 mb-8">
                        <div class="text-[10px] font-bold text-indigo-300 mb-4 uppercase">Result</div>
                        <div class="text-4xl font-black text-slate-800 mb-2">${winners.length?winners.join(' & '):'該当者なし'}${winners.length?'<small class="san">さん</small>':''}</div>
                        <div class="text-[10px] font-bold text-indigo-400 tracking-widest">${max} VOTES</div>
                    </div>
                    ${correctGuessers.length > 0 ? `<div class="god-mode p-4 rounded-2xl mb-10 shadow-lg text-white font-black text-sm animate-bounce">✨ ${correctGuessers.join(', ')}さん 予想的中！<br>自己客観視の天才です！ ✨</div>` : ''}
                    ${myRole === 'host' ? `<button onclick="${rIdx < 9 ? 'roomRef.update({revealIdx: '+(rIdx+1)+'})' : 'roomRef.update({phase:\'result\'})'}" class="w-full bg-indigo-600 text-white h-16 rounded-2xl font-bold shadow-lg text-lg">NEXT ❯</button>` : ''}
                </div>`;
            }

            else if (gameState.phase === 'result') {
                const stat = { detail: Array(10).fill(0), total: 0 };
                Object.values(gameState.answers || {}).forEach(qAns => {
                    Object.values(qAns).forEach(votee => { if(votee === myName) stat.total++; });
                });
                Object.entries(gameState.answers || {}).forEach(([qIdx, qAns]) => {
                    Object.values(qAns).forEach(votee => { if(votee === myName) stat.detail[qIdx]++; });
                });
                const maxVal = Math.max(...stat.detail);
                const topIndices = stat.detail.map((v, i) => v === maxVal && v > 0 ? i : -1).filter(v => v !== -1);

                container.innerHTML = `<div class="fade-in px-2 text-left pb-10">
                    <h2 class="text-3xl font-black text-slate-800 mb-8 italic tracking-tighter text-center">Your Profile</h2>
                    <div class="bg-white p-8 rounded-[3rem] shadow-md border border-indigo-100 mb-10">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-slate-700 text-lg">${myName}<small class="san text-xs">さんの統計</small></span>
                            <div class="bg-indigo-600 px-3 py-1 rounded-full text-[10px] font-black text-white">${stat.total} VOTES</div>
                        </div>
                        <div class="w-full bg-slate-50 h-10 rounded-full overflow-hidden flex mb-6 border border-slate-100">
                            ${stat.total === 0 ? `<div class="w-full flex items-center justify-center text-[8px] text-slate-300 font-bold uppercase tracking-widest">No Votes</div>` : 
                                stat.detail.map((count, i) => count > 0 ? `<div class="bar-segment" style="width: ${(count/stat.total)*100}%; background-color: ${COLORS[i]};"></div>` : '').join('')
                            }
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${topIndices.length > 0 ? topIndices.map(idx => `<span class="px-4 py-1 rounded-full font-black text-white text-[10px] shadow-sm" style="background-color: ${COLORS[idx]}"># ${gameState.questions[idx]}</span>`).join('') : '<p class="text-[10px] text-slate-300 italic">票がありませんでした</p>'}
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-10">
                        <p class="text-[9px] font-bold text-slate-300 uppercase mb-4 tracking-widest text-center border-b pb-2">Color Legend</p>
                        <div class="grid grid-cols-2 gap-y-3 gap-x-4">
                            ${gameState.questions.map((q, i) => `<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full shrink-0 shadow-sm" style="background-color: ${COLORS[i]}"></div><span class="text-[10px] font-bold text-slate-500 truncate">${q}</span></div>`).join('')}
                        </div>
                    </div>
                    ${myRole === 'host' ? `<button onclick="roomRef.update({phase:'setup'})" class="mt-8 w-full bg-slate-800 text-white h-16 rounded-2xl font-bold shadow-xl">TRY AGAIN</button>` : ''}
                </div>`;
            }
        }
        render();
    </script>
</body>
</html>
