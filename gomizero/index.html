<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ごみゼロ分別マスター 浜松市イベント版</title>
<style>
:root{--blue:#2f80ed;--green:#2fbf71;--red:#eb5757;--yellow:#f2c94c;--dark:#263238;--panel:rgba(255,255,255,.94);--shadow:0 14px 30px rgba(0,0,0,.18);}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at top,#fff8d8,#dff7ff 52%,#d7f8df);color:var(--dark);overflow:hidden;touch-action:none;user-select:none}
.app{position:relative;width:100vw;height:100vh;padding:94px 132px;display:flex;align-items:center;justify-content:center}
.guide{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:1000;color:white;text-shadow:0 2px 0 rgba(0,0,0,.14);letter-spacing:.02em;box-shadow:var(--shadow);z-index:3;border:0;transition:height .25s,width .25s,opacity .2s}
.guide>div{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6px}.guide .small{display:block;font-size:clamp(11px,1.35vw,17px);font-weight:900;margin-top:4px;line-height:1.25}
.guide .big{display:block;font-size:clamp(18px,2.35vw,34px);line-height:1.1}
.guide.up{top:0;left:50%;transform:translateX(-50%);width:min(720px,64vw);height:86px;background:var(--blue);border-radius:0 0 24px 24px}
.guide.down{bottom:0;left:50%;transform:translateX(-50%);width:min(720px,64vw);height:86px;background:var(--green);border-radius:24px 24px 0 0}
.guide.left{left:0;top:50%;transform:translateY(-50%);width:156px;height:min(650px,86vh);background:var(--red);border-radius:0 24px 24px 0}
.guide.right{right:0;top:50%;transform:translateY(-50%);width:156px;height:min(650px,86vh);background:var(--yellow);color:#5d4500;text-shadow:none;border-radius:24px 0 0 24px}
body.playing .guide-example{display:none!important}
body.playing .guide.left,body.playing .guide.right{height:min(520px,70vh);width:122px}
.screen{width:min(820px,78vw);height:min(650px,72vh);background:var(--panel);border-radius:36px;box-shadow:var(--shadow);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:6px solid rgba(255,255,255,.72);position:relative;z-index:2;overflow:hidden}
.title{font-size:clamp(28px,4.6vw,56px);margin:0 0 12px;font-weight:1000;color:#1f5c3b;line-height:1.08;white-space:nowrap}
.subtitle{font-size:clamp(15px,2vw,24px);font-weight:900;margin:0 0 14px;color:#52636b}
.rule-box{width:min(690px,100%);background:#fff8dc;border:4px solid #ffe08a;border-radius:24px;padding:14px 18px;margin:4px 0 10px;text-align:left;font-size:clamp(14px,1.75vw,21px);font-weight:900;line-height:1.55;box-shadow:0 8px 18px rgba(0,0,0,.08)}
.assist-status{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:clamp(9px,.9vw,12px);font-weight:700;opacity:.24;margin:0;letter-spacing:.02em;pointer-events:none}
.mode-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;width:100%;max-width:520px;margin-top:10px}.mode-grid button{border:1.5px solid rgba(38,50,56,.22)}
.today-ranking{width:min(460px,100%);margin:8px auto 0;text-align:left;background:#f7fbff;border:3px solid #dbefff;border-radius:18px;padding:10px 14px;font-size:clamp(13px,1.5vw,18px);font-weight:900;line-height:1.45}.today-ranking-title{text-align:center;font-weight:1000;margin-bottom:4px;color:#2f5b78}.today-ranking ol{margin:4px 0 0 1.4em;padding:0}.endless-confirm{display:grid;gap:14px;place-items:center;width:100%;max-width:620px}.endless-confirm .big-score{font-size:clamp(32px,5vw,64px);font-weight:1000;color:#1f5c3b}
button{border:0;border-radius:22px;padding:16px 13px;font-size:clamp(15px,2vw,23px);font-weight:1000;cursor:pointer;background:#fff;color:var(--dark);box-shadow:0 8px 0 rgba(0,0,0,.11),0 12px 22px rgba(0,0,0,.12);transition:transform .05s,box-shadow .05s}
button:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.11),0 8px 16px rgba(0,0,0,.1)}
.hud{position:absolute;left:22px;top:18px;right:22px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-weight:1000;font-size:clamp(14px,1.75vw,23px)}
.timer{width:104px;height:104px;border-radius:50%;background:conic-gradient(#ff5c5c var(--timerAngle),#eee 0deg);display:grid;place-items:center;box-shadow:inset 0 0 0 8px white,0 8px 18px rgba(0,0,0,.15)}
.timer span{width:74px;height:74px;border-radius:50%;background:white;display:grid;place-items:center;font-size:31px;color:#e43d3d}
.question-card{margin-top:86px;width:100%;display:grid;place-items:center;gap:12px}
.garbage-img{width:min(245px,35vw);height:min(245px,35vw);object-fit:contain;border-radius:30px;background:#fffdf3;border:5px dashed #f0d988;padding:16px;display:grid;place-items:center;font-size:clamp(68px,15vw,145px);line-height:1}
.garbage-name{font-size:clamp(32px,4.8vw,66px);font-weight:1000;line-height:1.12}
.hint{font-size:clamp(14px,1.7vw,20px);font-weight:900;color:#607177}
.flash{position:absolute;inset:0;display:none;place-items:center;z-index:10;font-size:clamp(50px,10vw,130px);font-weight:1000;color:white;text-shadow:0 5px 0 rgba(0,0,0,.18);border-radius:28px}
.flash.show{display:grid}.flash.correct{background:rgba(47,191,113,.9)}.flash.wrong{background:rgba(235,87,87,.9)}
.result-wrap{display:grid;grid-template-columns:230px 1fr;gap:18px;align-items:center;width:100%;max-width:720px}
.rate-circle{width:210px;height:210px;border-radius:50%;background:conic-gradient(#2fbf71 var(--rateAngle),#eee 0deg);display:grid;place-items:center;box-shadow:inset 0 0 0 14px white,0 10px 24px rgba(0,0,0,.16)}
.rate-circle span{width:138px;height:138px;border-radius:50%;background:white;display:grid;place-items:center;font-size:38px;font-weight:1000;color:#1f5c3b}
.badge{display:inline-block;background:#fff1a6;border:4px solid #f2c94c;border-radius:999px;padding:8px 16px;font-size:clamp(19px,2.4vw,30px);font-weight:1000;margin:8px 0}
.result-list{width:100%;max-height:220px;overflow:auto;text-align:left;padding-right:6px}
.miss-item{background:#fff7e8;border:3px solid #ffe0a6;border-radius:18px;padding:10px 13px;margin:8px 0;font-size:clamp(13px,1.45vw,18px);font-weight:850}
.settings{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:20;display:none;align-items:center;justify-content:center;padding:20px}
.settings.show{display:flex}
.settings-panel{width:min(610px,92vw);max-height:92vh;overflow:auto;background:white;border-radius:30px;padding:26px;box-shadow:var(--shadow);border:6px solid #f4f4f4}
.settings-panel h2{margin:0 0 18px;font-size:32px}.setting-row{margin:16px 0;font-weight:900;font-size:18px;display:grid;gap:8px}
input[type=range]{width:100%}input[type=number]{font-size:22px;padding:8px 12px;border-radius:12px;border:2px solid #ccc}label.inline{display:flex;align-items:center;gap:10px}
input[type=checkbox]{width:24px;height:24px}
.footer-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}.tiny{font-size:14px;opacity:.72;margin-top:12px;line-height:1.5;font-weight:800}
.practice-note{background:#eef9ff;border:4px solid #bde8ff;border-radius:24px;padding:14px 18px;font-size:clamp(16px,2vw,24px);font-weight:900;line-height:1.55;margin-top:6px}
.guide.assist{animation:pulseGuide .75s infinite alternate;filter:brightness(1.18) saturate(1.25)}
@keyframes pulseGuide{from{box-shadow:0 0 0 0 rgba(255,255,255,.8),var(--shadow)}to{box-shadow:0 0 0 16px rgba(255,255,255,.45),var(--shadow)}}
.confetti{position:fixed;top:-30px;z-index:50;font-size:26px;animation:fall 1.8s linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.2}}
@media(max-width:820px){.app{padding:88px 82px}.guide.up,.guide.down{width:70vw;height:78px}.guide.left,.guide.right{width:82px;height:min(640px,86vh)}body.playing .guide.left,body.playing .guide.right{width:74px;height:min(480px,68vh)}.mode-grid{grid-template-columns:1fr 1fr;max-width:500px}.screen{width:88vw;height:72vh;padding:18px}.title{font-size:clamp(26px,7vw,42px)}.timer{width:78px;height:78px}.timer span{width:56px;height:56px;font-size:24px}.question-card{margin-top:72px}.result-wrap{grid-template-columns:1fr}.rate-circle{width:170px;height:170px;margin:auto}}
@media(max-width:480px){.app{padding:78px 60px}.guide.up,.guide.down{width:72vw;height:68px}.guide .big{font-size:clamp(13px,3.7vw,18px)}.guide .small{font-size:9px;line-height:1.15}.guide.left,.guide.right{width:60px;height:min(600px,84vh)}body.playing .guide.left,body.playing .guide.right{width:54px;height:min(420px,64vh)}.screen{width:90vw;height:74vh;border-radius:28px;padding:14px 12px 26px}.title{font-size:clamp(24px,7.2vw,34px);margin-bottom:8px}.subtitle{font-size:clamp(13px,4vw,17px);margin-bottom:8px}.rule-box{padding:10px 12px;font-size:clamp(12px,3.5vw,15px);line-height:1.45}.mode-grid{gap:9px}.mode-grid button{font-size:clamp(13px,4vw,16px);padding:13px 8px;border-radius:16px}.garbage-name{font-size:clamp(26px,8vw,40px)}.garbage-img{width:min(190px,43vw);height:min(190px,43vw)}}

/* スマホ表示時のみ、左右の分別ガイドを縦書きにする */
@media(max-width:820px){
  .guide.left, .guide.right{writing-mode:vertical-rl;text-orientation:upright;}
  .guide.left > div, .guide.right > div{writing-mode:vertical-rl;text-orientation:upright;display:flex;align-items:center;justify-content:center;}
  .guide.left .big, .guide.right .big{writing-mode:vertical-rl;text-orientation:upright;line-height:1.25;letter-spacing:.08em;}
  .guide.left .small, .guide.right .small{writing-mode:vertical-rl;text-orientation:upright;line-height:1.2;letter-spacing:.04em;margin-top:0;margin-right:6px;}
}

/* fixed5: Safari safe-area and compact bottom guide */
html,body{width:100%;height:100%;min-height:100dvh;}
.app{height:100dvh;min-height:100dvh;padding-bottom:calc(94px + env(safe-area-inset-bottom,0px));}
.guide.down{bottom:env(safe-area-inset-bottom,0px);}
@media(max-width:820px){.app{height:100dvh;min-height:100dvh;padding-bottom:calc(82px + env(safe-area-inset-bottom,0px));}.guide.down{height:66px;bottom:env(safe-area-inset-bottom,0px)}.guide.down .big{font-size:clamp(13px,3.4vw,20px)}}
@media(max-width:480px){.app{padding-bottom:calc(66px + env(safe-area-inset-bottom,0px));}.guide.down{height:54px}.guide.down .big{font-size:clamp(11px,3vw,15px)}.guide.down .small{font-size:8px}.screen{height:72dvh;max-height:calc(100dvh - 132px - env(safe-area-inset-bottom,0px));}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="guide up" data-dir="up"><div><span class="big">↑ 資源（リサイクル）</span><span class="small guide-example">しげん：ペットボトル・缶・瓶・プラ</span></div></div>
  <div class="guide down" data-dir="down"><div><span class="big">↓ 連絡ごみ（大きなごみ）</span><span class="small guide-example">連絡ごみ：家具・自転車など</span></div></div>
  <div class="guide left" data-dir="left"><div><span class="big">←<br>もえるごみ</span><span class="small guide-example">生ごみ・紙くず・木や布など</span></div></div>
  <div class="guide right" data-dir="right"><div><span class="big">→<br>もえないごみ</span><span class="small guide-example">ガラス・せともの・金属・小型家電など</span></div></div>
  <main class="screen" id="screen"></main>
</div>
<div class="settings" id="settings"><div class="settings-panel">
  <h2>運営設定</h2>
  <div class="setting-row"><label>制限時間（秒）</label><input id="timeLimit" type="number" min="3" max="30" step="1" value="10"></div>
  <div class="setting-row"><label>出題数</label><input id="questionCount" type="number" min="3" max="30" step="1" value="10"></div>
  <div class="setting-row"><label>クリアに必要な正解数</label><input id="clearCount" type="number" min="1" max="30" step="1" value="8"></div>
  <div class="setting-row"><label>エンドレス突入に必要な正解数（ふつう）</label><input id="endlessNeed" type="number" min="1" max="30" step="1" value="10"></div>
  <div class="setting-row"><label class="inline"><input id="assistMode" type="checkbox">幼児向け：正解方向を光らせる</label></div>
  <div class="setting-row"><label>音量</label><input id="volume" type="range" min="0" max="1" step="0.05" value="0.7"></div>
  <div class="setting-row"><div>ハイスコア：<span id="highScoreLabel">0</span></div></div>
  <div class="footer-buttons"><button onclick="resetHighScore()">ハイスコアリセット</button><button onclick="closeSettings()">閉じる</button></div>
  <p class="tiny">Sキー、または画面長押しで表示。イベント中はスタッフのみ操作してください。</p>
</div></div>
<script>
const DIRECTIONS={up:{label:"資源（リサイクル）",color:"#2f80ed"},down:{label:"連絡ごみ（大きなごみ）",color:"#2fbf71"},left:{label:"もえるごみ",color:"#eb5757"},right:{label:"もえないごみ",color:"#f2c94c"}};

function normalizeSettings(){state.timeLimit=+timeLimitInput.value||10;state.questionCount=Math.max(3,+questionCountInput.value||10);state.clearCount=Math.max(1,Math.min(+clearCountInput.value||8,state.questionCount));state.endlessNeed=Math.max(1,Math.min(+endlessNeedInput.value||state.questionCount,state.questionCount));state.assistMode=assistModeInput.checked;state.volume=+volumeInput.value;clearCountInput.value=state.clearCount;endlessNeedInput.value=state.endlessNeed;}
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function pickQuestions(mode,count){let pool=mode==="normal"?QUESTION_BANK.normalCommon:QUESTION_BANK[mode];let p=[];while(p.length<count)p.push(...shuffle(pool));return p.slice(0,count)}
function setPlaying(v){document.body.classList.toggle("playing",v);clearAssist()}
function clearAssist(){document.querySelectorAll(".guide").forEach(g=>g.classList.remove("assist"))}
function showAssist(dir){clearAssist();if(state.assistMode)document.querySelector(`.guide[data-dir="${dir}"]`)?.classList.add("assist")}

function getCurrentQuestion(){if(state.endless){const pool=QUESTION_BANK.normalEndless;return pool[Math.floor(Math.random()*pool.length)]}return state.questions[state.currentIndex]}
let currentQ=null;
function showQuestion(){clearInterval(state.timerId);state.accepting=!state.waitingRelease;state.timeLeft=Math.max(1,state.timeLimit-(state.endless?state.endlessCount*.1:0));currentQ=getCurrentQuestion();showAssist(currentQ.ans);const num=state.endless?state.endlessCount+1:state.currentIndex+1,total=state.endless?"∞":state.questions.length;screen.style.setProperty("--timerAngle","360deg");screen.innerHTML=`<div class="hud"><div>${state.endless?"エンドレス":"問題"} ${num}/${total}</div><div>正解 ${state.score}</div><div class="timer"><span id="timerText">${state.timeLeft.toFixed(1)}</span></div></div><div class="question-card"><div class="garbage-img">${currentQ.image?`<img src="${currentQ.image}" alt="${currentQ.name}" style="max-width:100%;max-height:100%;object-fit:contain">`:currentQ.emoji}</div><div class="garbage-name">${currentQ.name}</div><div class="hint">${state.assistMode?"光っている方向をえらんでみよう！":"上下左右で、正しい分別をえらぼう！"}</div></div><div class="flash" id="flash"></div>`;showAssist(currentQ.ans);startTimer()}
function startTimer(){const start=performance.now(),limitMs=state.timeLeft*1000;state.timerId=setInterval(()=>{const remain=Math.max(0,(limitMs-(performance.now()-start))/1000);state.timeLeft=remain;const t=document.getElementById("timerText");if(t)t.textContent=remain.toFixed(1);screen.style.setProperty("--timerAngle",`${Math.max(0,remain/(limitMs/1000))*360}deg`);if(remain<=0){clearInterval(state.timerId);timeUp()}},50)}
function answer(direction){if(state.phase!=="game"||!state.accepting||state.waitingRelease)return;state.accepting=false;state.waitingRelease=true;clearInterval(state.timerId);clearAssist();const q=currentQ,correct=q.ans===direction,flash=document.getElementById("flash");if(correct){state.score++;if(flash){flash.className="flash show correct";flash.textContent="正解！"}playTone("correct");setTimeout(nextQuestion,420)}else{state.misses.push({...q,selected:direction});if(flash){flash.className="flash show wrong";flash.textContent="ざんねん！"}playTone("wrong");setTimeout(()=>state.endless?finishEndless():nextQuestion(),560)}}
function timeUp(){playTone("wrong");clearAssist();if(state.endless){finishEndless();return}state.misses.push({...currentQ,selected:"timeup"});renderGameOver("タイムアップ！")}
function nextQuestion(){if(state.endless){state.endlessCount++;if(state.endlessCount>=100){finishEndless(true);return}showQuestion();return}state.currentIndex++;if(state.currentIndex>=state.questions.length){if(state.mode==="normal"&&state.score>=state.endlessNeed)showEndlessConfirm();else renderResult()}else showQuestion()}
function showEndlessConfirm(){state.phase="endlessReady";clearAssist();celebrate();screen.innerHTML=`<div class="endless-confirm"><h1 class="title">クリア！</h1><p class="subtitle">正解数 ${state.score}問</p><div class="big-score">エンドレスモードに挑戦！</div><p class="tiny">ここからは少し悩む浜松市基準の問題が出るよ。正解数はここまでの${state.score}問にプラスされます。</p><button onclick="beginEndless()">OK</button></div>`}
function beginEndless(){state.endless=true;state.endlessCount=0;state.phase="game";setPlaying(true);showQuestion()}
function badge(score,total,clear){const r=score/total;if(r===1)return"ごみ分別マスター";if(r>=.9)return"リサイクル博士";if(clear)return"ごみ分別名人";if(r>=.5)return"分別チャレンジャー";return"もう一回チャレンジ"}
function renderResult(){state.phase="result";clearAssist();const clear=state.score>=state.clearCount;if(clear)celebrate();const rate=Math.round(state.score/state.questionCount*100);screen.style.setProperty("--rateAngle",`${rate*3.6}deg`);screen.innerHTML=`<h1 class="title">${clear?"クリア！":"もう少し！"}</h1><div class="result-wrap"><div class="rate-circle"><span>${rate}%</span></div><div><p class="subtitle">正解数：${state.score}/${state.questionCount}問</p><div class="badge">${badge(state.score,state.questionCount,clear)}</div><p class="subtitle">クリアライン：${state.clearCount}問</p></div></div>${missListHtml()}<div class="footer-buttons"><button onclick="renderTitle()">タイトルへ</button><button onclick="startGame('${state.mode}')">もう一回</button></div>`}
function renderGameOver(message){state.phase="result";clearAssist();const clear=state.score>=state.clearCount,rate=Math.round(state.score/state.questionCount*100);if(clear)celebrate();screen.style.setProperty("--rateAngle",`${rate*3.6}deg`);screen.innerHTML=`<h1 class="title">${message}</h1><div class="result-wrap"><div class="rate-circle"><span>${rate}%</span></div><div><p class="subtitle">正解数：${state.score}/${state.questionCount}問</p><div class="badge">${badge(state.score,state.questionCount,clear)}</div><p class="subtitle">${clear?"クリアラインには届いていたよ！":`クリアには${state.clearCount}問正解が必要だよ`}</p></div></div>${missListHtml()}<div class="footer-buttons"><button onclick="renderTitle()">タイトルへ</button><button onclick="startGame('${state.mode}')">もう一回</button></div>`}
function todayScoreKey(){const d=new Date();const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `gomiTodayScores_${y}${m}${day}`}
function saveTodayScore(score){const key=todayScoreKey();let list=[];try{list=JSON.parse(localStorage.getItem(key)||"[]")}catch(e){list=[]}list.push({score,time:Date.now()});list=list.sort((a,b)=>b.score-a.score||a.time-b.time).slice(0,5);localStorage.setItem(key,JSON.stringify(list));return list}
function todayRankingHtml(list){if(!list.length)return"";return `<div class="today-ranking"><div class="today-ranking-title">今日のハイスコア TOP5</div><ol>${list.map(x=>`<li>${x.score}問</li>`).join("")}</ol></div>`}
function finishEndless(perfect=false){clearInterval(state.timerId);clearAssist();const totalScore=state.score,prev=+localStorage.getItem("gomiHighScore")||0;if(totalScore>prev)localStorage.setItem("gomiHighScore",String(totalScore));const todayList=saveTodayScore(totalScore);updateHighScoreLabel();screen.innerHTML=`<h1 class="title">エンドレス終了！</h1><p class="subtitle">最終スコア：${totalScore}問</p><p class="tiny">通常問題 ${state.questionCount}問 + エンドレス ${Math.max(0,totalScore-state.questionCount)}問</p><div class="badge">${totalScore>=60?"伝説の分別王":totalScore>=30?"リサイクル博士":"ごみ分別名人"}</div>${todayRankingHtml(todayList)}<div class="footer-buttons"><button onclick="renderTitle()">タイトルへ</button><button onclick="startGame('normal')">もう一回</button></div>`;state.phase="result"}
function missListHtml(){if(!state.misses.length)return`<p class="subtitle">まちがいなし！すごい！</p>`;return`<div class="result-list">${state.misses.map(m=>`<div class="miss-item"><div>問題：${m.name}</div><div>正解：${DIRECTIONS[m.ans].label}</div><div>豆知識：${m.note}</div></div>`).join("")}</div>`}
function celebrate(){const marks=["🎉","✨","♻️","🌟","👏"];for(let i=0;i<70;i++){const s=document.createElement("div");s.className="confetti";s.textContent=marks[Math.floor(Math.random()*marks.length)];s.style.left=Math.random()*100+"vw";s.style.animationDelay=Math.random()*.45+"s";s.style.fontSize=(18+Math.random()*22)+"px";document.body.appendChild(s);setTimeout(()=>s.remove(),2400)}playTone("correct");setTimeout(()=>playTone("correct"),180)}
function toggleAssistMode(){state.assistMode=!state.assistMode;assistModeInput.checked=state.assistMode;if(state.phase==="title")renderTitle();else if(state.phase==="game"){const q=getCurrentQuestion();showAssist(q.ans)}else if(state.phase==="practice"){const q=state.practiceList[state.practiceIndex%state.practiceList.length];showAssist(q.ans)}}
// 分別ガイド部分をタッチ・クリックしても回答できるようにする
document.querySelectorAll(".guide[data-dir]").forEach(g=>{
  g.addEventListener("pointerup",e=>{
    if(state.phase!=="game")return;
    e.preventDefault();
    answer(g.dataset.dir);
    releaseCheck();
  });
});

const keyMap={ArrowUp:"up",KeyW:"up",ArrowDown:"down",KeyS:"down",ArrowLeft:"left",KeyA:"left",ArrowRight:"right",KeyD:"right"};
window.addEventListener("keydown",e=>{if(e.code==="KeyH"&&!state.hHoldTimer){state.hHoldTriggered=false;state.hHoldTimer=setTimeout(()=>{state.hHoldTriggered=true;toggleAssistMode();playTone("correct")},650);return}if(e.code==="KeyS"&&e.shiftKey){openSettings();return}if(e.key==="s"&&state.phase!=="game"){openSettings();return}if(state.phase==="endlessReady"&&(e.code==="Space"||e.code==="Enter")){beginEndless();return}if(state.phase==="practice"&&(e.code==="Space"||e.code==="Enter")){nextPractice();return}const dir=keyMap[e.code];if(dir)answer(dir)});
window.addEventListener("keyup",e=>{if(e.code==="KeyH"){clearTimeout(state.hHoldTimer);state.hHoldTimer=null;state.hHoldTriggered=false;return}releaseCheck()});
function releaseCheck(){state.waitingRelease=false;if(state.phase==="game")state.accepting=true}
document.addEventListener("touchstart",e=>{const t=e.touches[0];state.touchStart={x:t.clientX,y:t.clientY,time:Date.now()};state.longPressTimer=setTimeout(openSettings,900)},{passive:false});
document.addEventListener("touchmove",()=>clearTimeout(state.longPressTimer),{passive:false});
document.addEventListener("touchend",e=>{clearTimeout(state.longPressTimer);if(!state.touchStart||!e.changedTouches.length)return;const t=e.changedTouches[0],dx=t.clientX-state.touchStart.x,dy=t.clientY-state.touchStart.y,absX=Math.abs(dx),absY=Math.abs(dy);if(Math.max(absX,absY)<45)return;if(state.phase==="endlessReady"){beginEndless();return}if(state.phase==="practice"){nextPractice();return}answer(absX>absY?(dx>0?"right":"left"):(dy>0?"down":"up"));releaseCheck()},{passive:false});
function pollGamepad(){const pads=navigator.getGamepads?navigator.getGamepads():[],pad=[...pads].find(Boolean);let dir=null,pressed=false;if(pad){const b=pad.buttons,axes=pad.axes||[],dead=.55;if(b[12]?.pressed||axes[1]<-dead||b[3]?.pressed)dir="up";if(b[13]?.pressed||axes[1]>dead||b[1]?.pressed)dir="down";if(b[14]?.pressed||axes[0]<-dead||b[2]?.pressed)dir="left";if(b[15]?.pressed||axes[0]>dead||b[0]?.pressed)dir="right";pressed=!!dir;if(pressed&&!state.gamepadPrevPressed){if(state.phase==="endlessReady")beginEndless();else if(state.phase==="practice")nextPractice();else answer(dir)}if(!pressed&&state.gamepadPrevPressed)releaseCheck();state.gamepadPrevPressed=pressed}requestAnimationFrame(pollGamepad)}
function openSettings(){settings.classList.add("show");updateHighScoreLabel()}
function closeSettings(){normalizeSettings();settings.classList.remove("show");if(state.phase==="title")renderTitle()}
function resetHighScore(){localStorage.removeItem("gomiHighScore");localStorage.removeItem(todayScoreKey());updateHighScoreLabel()}
function updateHighScoreLabel(){highScoreLabel.textContent=localStorage.getItem("gomiHighScore")||"0"}
volumeInput.addEventListener("input",()=>state.volume=+volumeInput.value);
[timeLimitInput,questionCountInput,clearCountInput,endlessNeedInput,assistModeInput].forEach(i=>i.addEventListener("change",normalizeSettings));
settings.addEventListener("click",e=>{if(e.target===settings)closeSettings()});
renderTitle();pollGamepad();
</script>
</body>
</html>
