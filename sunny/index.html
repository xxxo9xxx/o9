<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>サニーさんのモヤモヤサバイバー 完成版</title>
<style>
:root{--safe-bottom:env(safe-area-inset-bottom,0px);--glass:rgba(255,255,255,.12);--line:rgba(255,255,255,.24);--gold:#ffdf6b;--cyan:#66d9ff;--bg:#10182f;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none;}
#game{position:relative;width:100vw;height:100vh;overflow:hidden;background:#10182f;}
canvas{display:block;width:100%;height:100%;background:#142044;touch-action:none;}
button{font:inherit;font-weight:900;border:0;border-radius:16px;padding:14px 20px;margin:6px;cursor:pointer;background:linear-gradient(#ffe779,#ffad3d);color:#362100;box-shadow:0 7px 0 rgba(0,0,0,.28);min-height:48px;}
button:active{transform:translateY(2px);box-shadow:0 4px 0 rgba(0,0,0,.28)}
#menu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 25%,rgba(255,223,107,.16),rgba(0,0,0,.64));z-index:10;padding:20px;}
#panel{width:min(560px,94vw);padding:24px;border-radius:22px;text-align:center;background:var(--glass);border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.35);backdrop-filter:blur(10px);}
h1{font-size:clamp(30px,8vw,42px);line-height:1.12;margin:8px 0 12px;}p{line-height:1.6;color:#e3e9ff;margin:8px 0;}
#hud{position:absolute;left:8px;right:8px;top:8px;z-index:5;display:none;pointer-events:none;font-weight:900;}
.pill{display:inline-block;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 12px;margin-right:6px;margin-bottom:6px;text-shadow:0 1px 2px rgba(0,0,0,.8);}
#hpOuter,#expOuter{position:absolute;left:8px;width:min(360px,calc(100vw - 16px));height:18px;background:rgba(0,0,0,.55);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.22);display:none;z-index:5;}
#hpOuter{top:86px;width:min(240px,calc(100vw - 16px));}
#expOuter{top:110px;}
#hpBar{height:100%;width:100%;background:linear-gradient(90deg,#69f58b,#fff36e,#ff6678);transition:width .12s linear;}
#expBar{height:100%;width:0%;background:linear-gradient(90deg,#66d9ff,#d7a6ff,#ffdf6b);transition:width .12s linear;}
#expText{position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.85);}
#msg{position:absolute;left:50%;top:136px;transform:translateX(-50%);z-index:20;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 14px;font-weight:900;display:none;max-width:min(92vw,640px);white-space:normal;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.3);}
#warning{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:19;display:none;font-size:clamp(46px,11vw,96px);font-weight:1000;color:#ff445f;letter-spacing:.08em;text-shadow:0 0 18px rgba(255,68,95,.9),0 5px 0 rgba(0,0,0,.35);pointer-events:none;}
#error{position:absolute;left:8px;right:8px;bottom:8px;z-index:99;background:rgba(255,0,0,.85);padding:10px;border-radius:10px;display:none;font-size:12px;white-space:pre-wrap;}
#bottomSlots{position:absolute;left:50%;bottom:calc(8px + var(--safe-bottom));transform:translateX(-50%);z-index:6;display:none;gap:12px;pointer-events:none;max-width:96vw;}
.slotGroup{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:7px 9px;backdrop-filter:blur(8px);}
.slotLabel{font-size:11px;color:#dce5ff;font-weight:900;writing-mode:vertical-rl;letter-spacing:.05em;opacity:.9;}
.slot{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.24);display:grid;place-items:center;position:relative;font-size:21px;box-shadow:inset 0 0 14px rgba(255,255,255,.04);}
.slot.empty{color:rgba(255,255,255,.35);font-size:18px}.slot .lv{position:absolute;right:2px;bottom:0;font-size:10px;background:rgba(0,0,0,.72);border-radius:999px;padding:0 4px;font-weight:900;color:#fff;}.slot.fusion{border-color:rgba(255,223,107,.85);box-shadow:0 0 18px rgba(255,223,107,.28),inset 0 0 16px rgba(255,223,107,.08);}
.modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.64);z-index:30;padding:18px;}
.panelGlass{width:min(820px,96vw);max-height:92vh;overflow:auto;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:20px;text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.42);backdrop-filter:blur(12px);}
#levelPanel h2{font-size:clamp(30px,7vw,42px);margin:6px 0 8px;}#choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.choice{text-align:left;min-height:148px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.22);color:#fff;}
.choice.weaponChoice{border-color:rgba(185,140,255,.7);box-shadow:0 0 20px rgba(185,140,255,.18);}.choice.passiveChoice{border-color:rgba(102,217,255,.65);}.choice.fusionChoice{border-color:rgba(255,223,107,.98);box-shadow:0 0 30px rgba(255,223,107,.42);background:linear-gradient(180deg,rgba(255,223,107,.25),rgba(255,255,255,.09));}
.choice .tag{display:inline-block;font-size:11px;font-weight:900;border-radius:999px;padding:3px 7px;background:rgba(0,0,0,.45);margin-bottom:6px;color:#fff3a6;}.choice .emoji{font-size:32px;line-height:1;}.choice b{display:block;color:#fff5b5;font-size:17px;margin:6px 0 4px;}.choice small{display:block;color:#e3e9ff;line-height:1.45;font-weight:700;}
#rerollBtn{display:none;margin-top:14px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.25);box-shadow:none;}
.resultPanel{width:min(780px,96vw);max-height:92vh;overflow:auto;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:22px;text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.42);backdrop-filter:blur(12px);}
.resultPanel h2{font-size:clamp(32px,8vw,56px);margin:8px 0 10px;}.clearGlow{color:var(--gold);text-shadow:0 0 22px rgba(255,223,107,.8);}.endlessMark{color:#ffdf6b;text-shadow:0 0 12px rgba(255,223,107,.5);}
.statsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0;}.statBox{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px;}.statBox.wide{grid-column:1/-1}.statBox span{display:block;color:#dce5ff;font-size:13px;}.statBox b{display:block;color:#fff3a6;font-size:clamp(22px,5vw,30px);margin-top:2px;}.buildLine{margin:12px 0;padding:12px;border-radius:16px;background:rgba(0,0,0,.28);color:#e3e9ff;line-height:1.55;text-align:left;}
#debugPanel{position:absolute;right:8px;top:118px;z-index:7;display:none;flex-direction:column;gap:4px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:8px;backdrop-filter:blur(8px);}.debugTitle{font-size:11px;font-weight:900;color:#fff3a6;text-align:center;margin-bottom:2px;}#debugPanel button{font-size:11px;padding:6px 8px;margin:0;border-radius:9px;box-shadow:none;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);text-align:left;min-height:28px;}
@media(max-width:680px){#choices{grid-template-columns:1fr}.pill{font-size:11px;padding:6px 8px;margin-right:3px;margin-bottom:4px}#hud{left:6px;right:6px;top:6px}#hpOuter{left:6px;top:82px;width:min(220px,calc(100vw - 12px));height:16px}#expOuter{left:6px;top:104px;width:min(290px,calc(100vw - 12px));height:16px}#msg{top:128px;font-size:13px;border-radius:16px;padding:9px 12px}.panelGlass,.resultPanel{padding:15px;border-radius:20px}.choice{min-height:auto;padding:13px}.slot{width:32px;height:32px;font-size:16px;border-radius:10px}.slot .lv{font-size:9px}.slotGroup{padding:5px 6px;gap:5px;border-radius:14px}.slotLabel{font-size:9px}#bottomSlots{gap:6px;bottom:calc(7px + var(--safe-bottom))}#debugPanel{right:4px;top:138px;transform:scale(.8);transform-origin:right top;opacity:.55}.statsGrid{grid-template-columns:1fr 1fr}.statBox{padding:10px}button{width:100%;margin:6px 0}}
</style>
</head>
<body>
<div id="game">
<canvas id="canvas"></canvas>
<div id="hud"><span class="pill" id="timeText">Time 0:00</span><span class="pill" id="levelText">Lv 1</span><span class="pill" id="scoreText">Score 0</span><span class="pill" id="sunnyText">☀️ Lv1</span><span class="pill" id="modeText">NORMAL</span></div>
<div id="hpOuter"><div id="hpBar"></div></div>
<div id="expOuter"><div id="expBar"></div><span id="expText">EXP 0/8</span></div>
<div id="bottomSlots"><div class="slotGroup"><span class="slotLabel">武器</span><div id="weaponSlots"></div></div><div class="slotGroup"><span class="slotLabel">パッシブ</span><div id="passiveSlots"></div></div></div>
<div id="debugPanel"><div class="debugTitle">DEBUG</div><button type="button" data-debug="level">L レベルUP</button><button type="button" data-spawn="normal">1 基本</button><button type="button" data-spawn="fast">2 速い</button><button type="button" data-spawn="tank">3 硬い</button><button type="button" data-spawn="none">4 予備</button><button type="button" data-spawn="split">5 分裂</button><button type="button" data-boss="basicBoss">6 中ボス</button><button type="button" data-boss="specialBoss">7 特殊ボス</button><button type="button" data-boss="rushBoss">8 突進ボス</button></div>
<div id="msg"></div><div id="warning">WARNING</div><div id="error"></div>
<div id="levelScreen" class="modal"><div id="levelPanel" class="panelGlass"><h2>LEVEL UP!</h2><p>強化を1つ選んでね</p><div id="choices"></div><button id="rerollBtn" type="button">デバッグ：3択ひきなおし</button></div></div>
<div id="clearScreen" class="modal"><div class="resultPanel"><h2 class="clearGlow">GAME CLEAR!</h2><p>5分間生存成功！ここで結果を見るか、エンドレスへ挑戦できます。</p><div id="clearStats" class="statsGrid"></div><div id="clearBuild" class="buildLine"></div><button id="finishBtn" type="button">結果を見る</button><button id="endlessBtn" type="button">エンドレスへ挑戦</button></div></div>
<div id="resultScreen" class="modal"><div class="resultPanel"><h2 id="resultTitle">RESULT</h2><p id="resultComment"></p><div id="resultStats" class="statsGrid"></div><div id="resultBuild" class="buildLine"></div><button id="againBtn" type="button">もう一度</button><button id="titleBtn" type="button">タイトルへ</button></div></div>
<div id="menu"><div id="panel"><div style="font-size:64px">☀️</div><h1>サニーさんの<br>モヤモヤサバイバー</h1><p>5分間生き残るサバイバー系ゲーム。<br>武器2つをLv5にして、強力な合成武器を作ろう！</p><button id="startBtn" type="button">ゲームスタート</button></div></div>
</div>
<script>
(function(){
'use strict';
var DEBUG_MODE=new URLSearchParams(location.search).get('debug')==='1';
var CLEAR_TIME=300;
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
var width=window.innerWidth,height=window.innerHeight,dpr=window.devicePixelRatio||1;
var running=false,paused=false,gameOver=false,clearOffered=false,endlessMode=false;
var totalKills=0,lastTime=performance.now(),player=null;
var enemies=[],bullets=[],items=[],particles=[],trails=[],lightnings=[],zones=[];
var iceAngle=0,screenFlash=0,warningTimer=0,warningText='WARNING';
var keys={},touch={active:false,startX:0,startY:0,x:0,y:0};
var gameTime=0,score=0,level=1,exp=0,nextExp=8,spawnTimer=0,sunnyTimer=0,hitFreeze=0;
var bossFlags={},lastEndlessBossMinute=5;
var weaponLevels={},fusionLevels={},passiveLevels={},weaponTimers={};
var audioCtx=null;

window.onerror=function(message,source,line,column){var box=document.getElementById('error');box.style.display='block';box.textContent=['JavaScript Error:',String(message),'line:'+line+' col:'+column].join('\n');};

var weaponDefs={
  laser:{icon:'🌈',name:'レーザー',desc:'向いている方向へ長射程貫通。Lvで本数増加。'},
  machinegun:{icon:'🔫',name:'マシンガン',desc:'向いている方向へ連射。少しブレる。'},
  missile:{icon:'🚀',name:'ミサイル',desc:'慣性追尾。煙を引いて飛び、外れることもある。'},
  thunder:{icon:'⚡',name:'サンダー',desc:'ランダム敵へ落雷。'},
  fire:{icon:'🔥',name:'ファイア',desc:'向いている左右方向へムチ風攻撃。Lv3以降左右展開。'},
  ice:{icon:'❄️',name:'アイス',desc:'自機周囲を回る氷オーブ。接触ダメージ＋鈍足。'},
  iron:{icon:'⚫',name:'鉄球',desc:'向いている方向へ重い高威力弾。'},
  needle:{icon:'🪡',name:'ニードル',desc:'近い敵を自動狙い。短射程・扇状・貫通。'},
  beam:{icon:'💠',name:'散弾',desc:'向いている方向へ広角ばらまき。'}
};
var weaponOrder=['laser','machinegun','missile','thunder','fire','ice','iron','needle','beam'];
var fusionDefs={
  reflectLaser:{icon:'↩️',name:'反射レーザー',a:'laser',b:'iron',desc:'レーザーの貫通＋鉄球の重撃。壁反射する強力レーザー。'},
  flashLaser:{icon:'✨',name:'フラッシュレーザー',a:'laser',b:'thunder',desc:'貫通レーザー＋落雷閃光。命中時に爆発。'},
  needleGun:{icon:'🪡',name:'ニードルガン',a:'machinegun',b:'needle',desc:'マシンガンの手数＋ニードルの貫通自動処理。'},
  burningGun:{icon:'🔥',name:'バーニングフレア',a:'machinegun',b:'fire',desc:'手数と火力を両立。大火球を前方乱射。'},
  fireworks:{icon:'🎆',name:'花火',a:'missile',b:'fire',desc:'追尾ミサイル＋爆発後の放射小弾。'},
  allMissile:{icon:'🚀',name:'全方位ミサイル',a:'missile',b:'beam',desc:'追尾性能＋散弾の広範囲。周囲へ大量射出。'},
  hardIce:{icon:'🧊',name:'カチカチ氷',a:'ice',b:'iron',desc:'周囲防衛＋重い氷塊。鈍足と押し返し。'},
  steamExplosion:{icon:'💨',name:'水蒸気爆発',a:'ice',b:'thunder',desc:'鈍足フィールド＋落雷爆発。広範囲制圧。'},
  burstNeedle:{icon:'💥',name:'爆裂ニードル',a:'needle',b:'beam',desc:'短射程針散弾＋命中時小爆発。'}
};
var fusionOrder=['reflectLaser','flashLaser','needleGun','burningGun','fireworks','allMissile','hardIce','steamExplosion','burstNeedle'];
var passiveDefs={
  heart:{icon:'❤️',name:'大きなハート',desc:'最大HPアップ＋回復。'},
  speed:{icon:'👟',name:'移動スピード',desc:'移動速度アップ。'},
  magnet:{icon:'🧲',name:'きらきら磁石',desc:'経験値吸引範囲アップ。'},
  power:{icon:'💪',name:'元気パワー',desc:'全武器ダメージアップ。'},
  haste:{icon:'⚡',name:'発射速度',desc:'武器の発射間隔短縮。'},
  area:{icon:'✨',name:'ひろがる光',desc:'弾と範囲攻撃の当たり判定アップ。'},
  goggles:{icon:'🥽',name:'ゴーグル',desc:'敵HP表示。Lv2で数値、Lv3で瀕死マーク。'}
};
var passiveOrder=['heart','speed','magnet','power','haste','area','goggles'];
var weaponIntervals={laser:.82,machinegun:.19,missile:1.05,thunder:.98,fire:.72,ice:99,iron:.9,needle:.42,beam:.65};

function resize(){width=window.innerWidth;height=window.innerHeight;dpr=window.devicePixelRatio||1;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+'px';canvas.style.height=height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}window.addEventListener('resize',resize);resize();
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rand(a,b){return a+Math.random()*(b-a);}
function choose(arr){return arr[Math.floor(Math.random()*arr.length)];}
function formatTime(sec){var s=Math.floor(Math.max(0,sec));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function getWeaponLevel(id){return weaponLevels[id]||0;}function getFusionLevel(id){return fusionLevels[id]||0;}function getPassiveLevel(id){return passiveLevels[id]||0;}
function weaponCount(){var c=0;weaponOrder.forEach(function(id){if(getWeaponLevel(id)>0)c++;});fusionOrder.forEach(function(id){if(getFusionLevel(id)>0)c++;});return c;}
function passiveCount(){var c=0;passiveOrder.forEach(function(id){if(getPassiveLevel(id)>0)c++;});return c;}
function canAddWeapon(){return weaponCount()<3;}function canAddPassive(){return passiveCount()<3;}
function damageMult(){return 1+getPassiveLevel('power')*.14;}function areaMult(){return 1+getPassiveLevel('area')*.10;}function hasteMult(){return 1+getPassiveLevel('haste')*.10;}
function fusionCount(){var c=0;fusionOrder.forEach(function(id){if(getFusionLevel(id)>0)c++;});return c;}
function showMessage(text,duration){var m=document.getElementById('msg');m.textContent=text;m.style.display='block';clearTimeout(showMessage.timer);showMessage.timer=setTimeout(function(){m.style.display='none';},duration||1100);}
function playSfx(name){try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();var now=audioCtx.currentTime;var osc=audioCtx.createOscillator();var gain=audioCtx.createGain();var freq={level:660,fusion:880,hit:140,boss:220,clear:740,gameover:110,shoot:420}[name]||440;osc.type=name==='hit'||name==='gameover'?'sawtooth':'triangle';osc.frequency.setValueAtTime(freq,now);if(name==='fusion'||name==='clear'){osc.frequency.exponentialRampToValueAtTime(freq*1.8,now+.18);}else if(name==='gameover'){osc.frequency.exponentialRampToValueAtTime(55,now+.32);}gain.gain.setValueAtTime(name==='shoot'?0.012:0.04,now);gain.gain.exponentialRampToValueAtTime(.0001,now+(name==='gameover'?.38:.18));osc.connect(gain);gain.connect(audioCtx.destination);osc.start(now);osc.stop(now+(name==='gameover'?.4:.2));}catch(e){}}
function bigBurst(x,y,color,count,scale){count=count||40;scale=scale||1;for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,sp=rand(60,250)*scale;particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(.35,.9),max:.9,color:color,r:rand(2,5)});}}
function burst(x,y,color,count){bigBurst(x,y,color,count||14,.55);}
function addTrail(x,y,color,size,life,type){trails.push({x:x,y:y,color:color,size:size||5,life:life||.22,max:life||.22,type:type||'dot'});if(trails.length>620)trails.splice(0,trails.length-620);}
function celebrateText(text){showMessage(text,1500);screenFlash=Math.max(screenFlash,.34);if(player)bigBurst(player.x,player.y,'#ffdf6b',90,1.25);playSfx('fusion');}
function showWarning(text){warningText=text||'WARNING';warningTimer=2.1;var w=document.getElementById('warning');w.textContent=warningText;w.style.display='block';playSfx('boss');}
function ensureAudio(){try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}

function statGridHtml(){var titles=earnedTitles();return '<div class="statBox"><span>スコア</span><b>'+Math.floor(score)+'</b></div>'+
'<div class="statBox"><span>生存時間</span><b>'+formatTime(gameTime)+'</b></div>'+
'<div class="statBox"><span>撃破数</span><b>'+totalKills+'</b></div>'+
'<div class="statBox"><span>到達Lv</span><b>'+level+'</b></div>'+
'<div class="statBox wide"><span>称号</span><b>'+titles.join(' / ')+'</b></div>';}
function buildText(){var weapons=[];weaponOrder.forEach(function(id){var lv=getWeaponLevel(id);if(lv>0)weapons.push(weaponDefs[id].icon+' '+weaponDefs[id].name+' Lv'+lv);});fusionOrder.forEach(function(id){var lv=getFusionLevel(id);if(lv>0)weapons.push(fusionDefs[id].icon+' '+fusionDefs[id].name+' Lv'+lv);});var passives=[];passiveOrder.forEach(function(id){var lv=getPassiveLevel(id);if(lv>0)passives.push(passiveDefs[id].icon+' '+passiveDefs[id].name+' Lv'+lv);});return '<b>所持武器</b><br>'+(weapons.length?weapons.join(' / '):'なし')+'<br><br><b>所持パッシブ</b><br>'+(passives.length?passives.join(' / '):'なし');}

function updateSlots(){var wbox=document.getElementById('weaponSlots');var pbox=document.getElementById('passiveSlots');wbox.innerHTML='';pbox.innerHTML='';var list=[];weaponOrder.forEach(function(id){var lv=getWeaponLevel(id);if(lv>0)list.push({icon:weaponDefs[id].icon,lv:lv,fusion:false});});fusionOrder.forEach(function(id){var lv=getFusionLevel(id);if(lv>0)list.push({icon:fusionDefs[id].icon,lv:lv,fusion:true});});for(var i=0;i<3;i++){var div=document.createElement('div');if(list[i]){div.className='slot '+(list[i].fusion?'fusion':'');div.innerHTML=list[i].icon+'<span class="lv">'+(list[i].lv>=5?'MAX':list[i].lv)+'</span>';}else{div.className='slot empty';div.textContent='＋';}wbox.appendChild(div);}var plist=[];passiveOrder.forEach(function(id){var lv=getPassiveLevel(id);if(lv>0)plist.push({icon:passiveDefs[id].icon,lv:lv});});for(var j=0;j<3;j++){var pd=document.createElement('div');if(plist[j]){pd.className='slot';pd.innerHTML=plist[j].icon+'<span class="lv">'+plist[j].lv+'</span>';}else{pd.className='slot empty';pd.textContent='＋';}pbox.appendChild(pd);}}

function buildAllChoices(){var choices=[];if(player.sunnyLevel<5)choices.push({id:'sunny',tag:'固定武器',icon:'☀️',name:'サニーショット Lv'+(player.sunnyLevel+1),desc:'固定武器を少し強化。序盤補助・最低保証火力。'});fusionOrder.forEach(function(fid){var fd=fusionDefs[fid];if(getFusionLevel(fid)===0&&getWeaponLevel(fd.a)>=5&&getWeaponLevel(fd.b)>=5){choices.push({id:'fusion_'+fid,tag:'✨合成チャンス',icon:fd.icon,name:fd.name,desc:weaponDefs[fd.a].name+' Lv5 + '+weaponDefs[fd.b].name+' Lv5。'+fd.desc});}else if(getFusionLevel(fid)>0&&getFusionLevel(fid)<3){choices.push({id:'fusionLv_'+fid,tag:'合成武器強化',icon:fd.icon,name:fd.name+' Lv'+(getFusionLevel(fid)+1),desc:fd.desc});}});weaponOrder.forEach(function(wid){var lv=getWeaponLevel(wid),wd=weaponDefs[wid];if(lv===0&&canAddWeapon()){choices.push({id:wid,tag:'武器追加',icon:wd.icon,name:wd.name,desc:wd.desc});}else if(lv>0&&lv<5){choices.push({id:wid,tag:'武器強化',icon:wd.icon,name:wd.name+' Lv'+(lv+1),desc:wd.desc});}});passiveOrder.forEach(function(pid){var lv=getPassiveLevel(pid),pd=passiveDefs[pid];if(lv===0&&canAddPassive()){choices.push({id:'passive_'+pid,tag:'パッシブ追加',icon:pd.icon,name:pd.name,desc:pd.desc});}else if(lv>0&&lv<5){choices.push({id:'passive_'+pid,tag:'パッシブ強化',icon:pd.icon,name:pd.name+' Lv'+(lv+1),desc:pd.desc});}});if(choices.length===0)choices.push({id:'heal',tag:'回復',icon:'❤️',name:'HP回復',desc:'HPを大きく回復する。'});return choices;}
function renderLevelChoices(){var box=document.getElementById('choices');box.innerHTML='';var choices=buildAllChoices();var out=[],used={};function take(filter){var pool=choices.filter(function(c){return !used[c.id]&&filter(c);});if(!pool.length)return false;var c=choose(pool);used[c.id]=true;out.push(c);return true;}take(function(c){return c.id.indexOf('fusion_')===0;});if(out.length<3)take(function(c){return c.id.indexOf('fusionLv_')===0;});if(out.length<3)take(function(c){return weaponDefs[c.id]&&getWeaponLevel(c.id)>0;});if(out.length<3)take(function(c){return c.id.indexOf('passive_')===0&&getPassiveLevel(c.id.replace('passive_',''))>0;});var guard=0;while(out.length<3&&guard++<80){var c=choose(choices);if(!used[c.id]){used[c.id]=true;out.push(c);}}out.forEach(function(c){var btn=document.createElement('button');var isWeapon=!!weaponDefs[c.id],isPassive=c.id.indexOf('passive_')===0,isFusion=c.id.indexOf('fusion')===0;btn.className='choice '+(isFusion?'fusionChoice':isWeapon?'weaponChoice':isPassive?'passiveChoice':'');btn.innerHTML='<span class="tag">'+c.tag+'</span><div class="emoji">'+c.icon+'</div><b>'+c.name+'</b><small>'+c.desc+'</small>';btn.addEventListener('click',function(){applyChoice(c);});box.appendChild(btn);});}
function openLevelChoices(){paused=true;renderLevelChoices();document.getElementById('levelScreen').style.display='flex';playSfx('level');}
function applyChoice(c){if(c.id==='sunny'){player.sunnyLevel++;showMessage('サニーショット強化');}
else if(c.id==='heal'){player.hp=Math.min(player.maxHp,player.hp+65);showMessage('HP回復');}
else if(c.id.indexOf('passive_')===0){var pid=c.id.replace('passive_','');if(getPassiveLevel(pid)===0&&!canAddPassive()){showMessage('パッシブ枠がいっぱい！');return;}if(getPassiveLevel(pid)<5){passiveLevels[pid]=getPassiveLevel(pid)+1;if(pid==='heart'){player.maxHp+=22;player.hp=Math.min(player.maxHp,player.hp+45);}if(pid==='speed'){player.baseSpeed+=24;}if(getPassiveLevel(pid)>=5)celebrateText('MAX! '+passiveDefs[pid].name);else showMessage(passiveDefs[pid].name+' Lv'+getPassiveLevel(pid));}}
else if(c.id.indexOf('fusion_')===0){var fid=c.id.replace('fusion_',''),fd=fusionDefs[fid];weaponLevels[fd.a]=0;weaponLevels[fd.b]=0;weaponTimers[fd.a]=0;weaponTimers[fd.b]=0;fusionLevels[fid]=1;weaponTimers[fid]=0;celebrateText('✨ '+fd.name+' 合成！');}
else if(c.id.indexOf('fusionLv_')===0){var fid2=c.id.replace('fusionLv_','');fusionLevels[fid2]=Math.min(3,getFusionLevel(fid2)+1);if(getFusionLevel(fid2)>=3)celebrateText('MAX! '+fusionDefs[fid2].name);else showMessage(fusionDefs[fid2].name+' Lv'+getFusionLevel(fid2));}
else if(weaponDefs[c.id]){if(getWeaponLevel(c.id)===0&&!canAddWeapon()){showMessage('武器枠がいっぱい！');return;}weaponLevels[c.id]=Math.min(5,getWeaponLevel(c.id)+1);weaponTimers[c.id]=0;if(getWeaponLevel(c.id)>=5)celebrateText('MAX! '+weaponDefs[c.id].name);else showMessage(weaponDefs[c.id].name+' Lv'+getWeaponLevel(c.id));}
updateSlots();document.getElementById('levelScreen').style.display='none';paused=false;}
function levelUp(){level++;nextExp=nextExpFor(level);if(player){player.hp=Math.min(player.maxHp,player.hp+12);}openLevelChoices();}
function checkLevelUps(){if(paused||!running)return;if(exp>=nextExp){exp-=nextExp;levelUp();}}

function difficulty(){var t=gameTime;var hp=1+t/145,sp=1+t/520,den=1+t/140;if(t>=180){hp*=1.18;den*=1.15;}if(t>=240){hp*=1.32;sp*=1.08;den*=1.35;}if(t>=270){hp*=1.26;sp*=1.07;den*=1.22;}if(endlessMode){var e=t-CLEAR_TIME;hp*=1+e/95;sp*=1+e/620;den*=1+e/150;if(t>=480){hp*=1.35;den*=1.24;}if(t>=600){hp*=1.7;sp*=1.16;den*=1.4;}}return{hp:hp,sp:sp,den:den};}
function enemyPool(){var t=gameTime,p=['normal'];if(t>12)p.push('fast');if(t>35)p.push('tank');if(t>95)p.push('split');if(t>180)p.push('fast','tank');if(t>230)p.push('split','tank','fast');if(t>270)p.push('split','tank','tank','fast');if(endlessMode)p.push('split','tank','fast','tank');return p;}
function spawnEnemy(type,fromRing,x,y){type=type||choose(enemyPool());if(type==='none')return;var side=Math.floor(Math.random()*4);if(x===undefined||y===undefined){if(side===0){x=Math.random()*width;y=-40;}if(side===1){x=width+40;y=Math.random()*height;}if(side===2){x=Math.random()*width;y=height+40;}if(side===3){x=-40;y=Math.random()*height;}}var d=difficulty();var base={normal:{r:15,hp:22,speed:58,damage:14,color:'#b98cff',emoji:'☁️'},fast:{r:12,hp:15,speed:104,damage:12,color:'#ff6678',emoji:'💢'},tank:{r:22,hp:58,speed:38,damage:20,color:'#9aa8bd',emoji:'🪨'},split:{r:17,hp:34,speed:55,damage:14,color:'#d6f4ff',emoji:'🫧'},mini:{r:9,hp:13,speed:84,damage:7,color:'#d6f4ff',emoji:'☁️'}}[type]||null;if(!base)return;var e={type:type,x:x,y:y,r:base.r,hp:base.hp*d.hp,maxHp:base.hp*d.hp,baseSpeed:base.speed*d.sp,speed:base.speed*d.sp,damage:base.damage,boss:false,color:base.color,emoji:base.emoji,slowTimer:0,iceHitTimer:0,hitPulse:0,aiTimer:Math.random()*2};if(fromRing)e.r*=.95;enemies.push(e);}
function spawnBoss(kind){var side=Math.floor(Math.random()*4),pad=80,x=width/2,y=height/2;if(side===0){x=Math.random()*width;y=-pad;}if(side===1){x=width+pad;y=Math.random()*height;}if(side===2){x=Math.random()*width;y=height+pad;}if(side===3){x=-pad;y=Math.random()*height;}var d=difficulty();var data={basicBoss:{r:34,hp:720,speed:34,damage:25,color:'#ff445f',emoji:'👹'},specialBoss:{r:33,hp:920,speed:38,damage:22,color:'#8a9bff',emoji:'🌀'},rushBoss:{r:41,hp:1250,speed:30,damage:32,color:'#bca27a',emoji:'💥'}}[kind]||{r:34,hp:760,speed:34,damage:25,color:'#ff445f',emoji:'👹'};var e={type:'boss',boss:true,bossKind:kind,x:x,y:y,r:data.r,hp:data.hp*d.hp,maxHp:data.hp*d.hp,baseSpeed:data.speed*d.sp,speed:data.speed*d.sp,damage:data.damage,color:data.color,emoji:data.emoji,slowTimer:0,iceHitTimer:0,hitPulse:0,aiTimer:0,chargeTimer:1.4,chargeX:0,chargeY:0};enemies.push(e);spawnBossRing(kind);showWarning('WARNING');showMessage('中ボス出現！ '+data.emoji,1400);}
function spawnBossRing(kind){var count=kind==='rushBoss'?24:(kind==='specialBoss'?20:16);var radius=Math.max(width,height)*.62;for(var i=0;i<count;i++){var a=Math.PI*2*i/count;var type=i%5===0?'tank':(i%3===0?'fast':(kind!=='basicBoss'&&i%4===0?'split':'normal'));spawnEnemy(type,true,width/2+Math.cos(a)*radius,height/2+Math.sin(a)*radius);}}
function updateSpawns(dt){spawnTimer-=dt;var d=difficulty();var interval=clamp(.82-gameTime*.002,.18,.82)/clamp(d.den,.9,3.8);if(spawnTimer<=0){spawnTimer+=interval;var count=1;if(gameTime>55)count++;if(gameTime>110)count++;if(gameTime>180)count++;if(gameTime>235)count+=2;if(gameTime>270)count++;if(endlessMode)count+=Math.floor((gameTime-CLEAR_TIME)/90)+2;var cap=endlessMode?330:230;for(var i=0;i<count&&enemies.length<cap;i++)spawnEnemy();}
if(gameTime>=90&&!bossFlags.b90){bossFlags.b90=true;spawnBoss('basicBoss');}
if(gameTime>=180&&!bossFlags.b180){bossFlags.b180=true;spawnBoss('specialBoss');}
if(gameTime>=270&&!bossFlags.b270){bossFlags.b270=true;spawnBoss('rushBoss');}
if(endlessMode){var minute=Math.floor(gameTime/60);if(minute>lastEndlessBossMinute){lastEndlessBossMinute=minute;var n=gameTime>=600?3:(gameTime>=480?2:1);for(var b=0;b<n;b++){spawnBoss(choose(['basicBoss','specialBoss','rushBoss']));}}}}

function nearestEnemyFrom(x,y,maxDist){var best=null,bd=maxDist||999999;for(var i=0;i<enemies.length;i++){var e=enemies[i];var d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}return best;}function nearestEnemy(){return player?nearestEnemyFrom(player.x,player.y):null;}
function expValueFor(e){if(e.boss)return 95;if(e.type==='tank')return 6+Math.floor(gameTime/120);if(e.type==='split')return 5+Math.floor(gameTime/150);if(e.type==='fast')return 4+Math.floor(gameTime/160);if(e.type==='mini')return 1;return 3+Math.floor(gameTime/150);}
function killEnemyAt(i){var e=enemies[i];if(!e)return;totalKills++;score+=e.boss?600:35;if(e.type==='split'){for(var m=0;m<3;m++)spawnEnemy('mini',false,e.x+rand(-20,20),e.y+rand(-20,20));}items.push({x:e.x,y:e.y,r:e.boss?8:5,value:expValueFor(e),vx:rand(-25,25),vy:rand(-25,25),life:24});burst(e.x,e.y,e.color,12);enemies.splice(i,1);}
function damageEnemy(e,amount,kind){e.hp-=amount;e.hitPulse=.12;if(kind==='ice'){e.slowTimer=Math.max(e.slowTimer,1.2);}if(kind==='flash'){lightnings.push({x:e.x,y:e.y,life:.16,max:.16});}return e.hp<=0;}

function addBullet(o){if(o.fusion){var fp={reflectLaser:1.85,flashLaser:2.05,needleGun:1.75,burningGun:1.9,fireworks:1.75,allMissile:1.65,hardIce:1.95,steamExplosion:1.8,burstNeedle:1.8}[o.fusion]||1.7;o.damage*=fp;o.r=(o.r||3)*(1.05+fp*.05);if(o.explode)o.explode*=1.16;if(o.pierce!==undefined)o.pierce+=1;if(o.life)o.life*=1.08;}bullets.push(o);}
function rocketLaunchBurst(x,y,angle,lv){var back=angle+Math.PI;for(var i=0;i<8+lv*3;i++){var a=back+rand(-.38,.38),sp=rand(80,250);particles.push({x:x+Math.cos(back)*rand(5,14),y:y+Math.sin(back)*rand(5,14),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(.25,.6),max:.7,color:Math.random()<.45?'#ffb06a':'#d8d8d8',r:rand(2,5)});}addTrail(x+Math.cos(back)*14,y+Math.sin(back)*14,'#d8d8d8',18+lv, .55,'smoke');addTrail(x+Math.cos(back)*6,y+Math.sin(back)*6,'#ffb06a',11+lv,.35,'flame');}
function explodeAt(x,y,r,damage,color,slow){burst(x,y,color||'#ffdf6b',28);for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];var d=Math.hypot(e.x-x,e.y-y);if(d<r+e.r){var fall=.55+.45*(1-d/(r+e.r));if(slow)e.slowTimer=Math.max(e.slowTimer,slow);if(d>0){var a=Math.atan2(e.y-y,e.x-x);e.x+=Math.cos(a)*10;e.y+=Math.sin(a)*10;}if(damageEnemy(e,damage*fall,'explosion'))killEnemyAt(i);}}}

function updateWeapons(dt){sunnyTimer-=dt;if(sunnyTimer<=0){sunnyTimer+=Math.max(.48,.92-player.sunnyLevel*.05);shootSunny();}weaponOrder.forEach(function(id){var lv=getWeaponLevel(id);if(lv<=0||id==='ice')return;weaponTimers[id]=(weaponTimers[id]||0)-dt;var interval=Math.max(.06,(weaponIntervals[id]-(lv-1)*.045)/hasteMult());if(weaponTimers[id]<=0){weaponTimers[id]+=interval;fireNormalWeapon(id,lv);}});fusionOrder.forEach(function(id){var lv=getFusionLevel(id);if(lv<=0)return;weaponTimers[id]=(weaponTimers[id]||0)-dt;var interval=fusionInterval(id,lv);if(weaponTimers[id]<=0){weaponTimers[id]+=interval;fireFusion(id,lv);}});updateIceOrbs(dt);}

function updateInput(dt){var mx=0,my=0;if(keys.arrowleft||keys.a)mx--;if(keys.arrowright||keys.d)mx++;if(keys.arrowup||keys.w)my--;if(keys.arrowdown||keys.s)my++;if(touch.active){var dx=touch.x-touch.startX,dy=touch.y-touch.startY,len=Math.hypot(dx,dy);if(len>8){mx=dx/Math.max(48,len);my=dy/Math.max(48,len);var mlen=Math.hypot(mx,my);if(mlen>1){mx/=mlen;my/=mlen;}}}var len=Math.hypot(mx,my);player.speed=player.baseSpeed;if(len>0){mx/=len;my/=len;player.x+=mx*player.speed*dt;player.y+=my*player.speed*dt;player.facingX=mx;player.facingY=my;}player.x=clamp(player.x,player.r,width-player.r);player.y=clamp(player.y,player.r,height-player.r);if(player.inv>0)player.inv-=dt;}
function updateEnemies(dt){for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];e.aiTimer+=dt;if(e.slowTimer>0)e.slowTimer-=dt;if(e.iceHitTimer>0)e.iceHitTimer-=dt;if(e.hitPulse>0)e.hitPulse-=dt;var slow=e.slowTimer>0?.48:1;var dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy)||1;var vx=dx/dist,vy=dy/dist;var sp=e.baseSpeed*slow;if(e.boss&&e.bossKind==='specialBoss'){var side=Math.sin(e.aiTimer*2.4);var ox=-vy*side*.65,oy=vx*side*.65;vx=vx*.82+ox;vy=vy*.82+oy;var l=Math.hypot(vx,vy)||1;vx/=l;vy/=l;}if(e.boss&&e.bossKind==='rushBoss'){e.chargeTimer-=dt;if(e.chargeTimer<=0){e.chargeTimer=2.2;var l=Math.hypot(dx,dy)||1;e.chargeX=dx/l;e.chargeY=dy/l;showMessage('突進！',500);}if(e.chargeTimer>1.45){vx=e.chargeX||vx;vy=e.chargeY||vy;sp*=3.4;}}e.x+=vx*sp*dt;e.y+=vy*sp*dt;if(dist<e.r+player.r){if(player.inv<=0){player.hp-=e.damage;player.inv=.22;playSfx('hit');screenFlash=Math.max(screenFlash,.08);var a=Math.atan2(player.y-e.y,player.x-e.x);player.x=clamp(player.x+Math.cos(a)*16,player.r,width-player.r);player.y=clamp(player.y+Math.sin(a)*16,player.r,height-player.r);if(player.hp<=0){player.hp=0;showGameOver();return;}}}}}
function finishBullet(b){if(b.explode)explodeAt(b.x,b.y,b.explode*areaMult(),b.damage*.75,b.color,b.slow||0);if(b.firework)spawnFirework(b.x,b.y,b.damage*.55,b.fireworkLv||1);}
function updateBullets(dt){for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];if(b.homing){var target=nearestEnemyFrom(b.x,b.y,620);if(target){var ta=Math.atan2(target.y-b.y,target.x-b.x),ca=Math.atan2(b.vy,b.vx);var diff=Math.atan2(Math.sin(ta-ca),Math.cos(ta-ca));ca+=diff*(b.homingPower||.02)*60*dt;var sp=b.baseSpeed||Math.hypot(b.vx,b.vy);b.vx=Math.cos(ca)*sp;b.vy=Math.sin(ca)*sp;}}b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;addWeaponTrail(b);var remove=false;if(b.reflect&&b.reflect>0&&(b.x<0||b.x>width||b.y<0||b.y>height)){if(b.x<0||b.x>width)b.vx*=-1;if(b.y<0||b.y>height)b.vy*=-1;b.x=clamp(b.x,0,width);b.y=clamp(b.y,0,height);b.reflect--;bigBurst(b.x,b.y,b.color,14,.5);}else if(b.x<-120||b.x>width+120||b.y<-120||b.y>height+120){remove=true;}if(b.life<=0)remove=true;var br=(b.r||3)*areaMult();for(var j=enemies.length-1;j>=0&&!remove;j--){var e=enemies[j];if(Math.hypot(e.x-b.x,e.y-b.y)<e.r+br){if(b.slow)e.slowTimer=Math.max(e.slowTimer,b.slow);if(b.knock){var a=Math.atan2(e.y-b.y,e.x-b.x);e.x+=Math.cos(a)*Math.min(b.knock,80)*.18;e.y+=Math.sin(a)*Math.min(b.knock,80)*.18;}if(damageEnemy(e,b.damage,b.flash?'flash':b.type==='ice'?'ice':'bullet'))killEnemyAt(j);if(b.flash)explodeAt(b.x,b.y,(b.explode||36)*areaMult(),b.damage*.42,'#fff0a8',0);if(b.burst)explodeAt(b.x,b.y,(b.explode||26)*areaMult(),b.damage*.48,'#ffdf6b',0);if(b.pierce&&b.pierce>0){b.pierce--;fusionImpactOnHit(b);}else{finishBullet(b);remove=true;}}}if(remove){if(b.life<=0)finishBullet(b);bullets.splice(i,1);}}}
function fusionImpactOnHit(b){if(b.fusion&&Math.random()<.35){if(b.fusion==='hardIce')bigBurst(b.x,b.y,'#9ee8ff',10,.45);else if(b.fusion==='burningGun')bigBurst(b.x,b.y,'#ff7a35',8,.45);else if(b.fusion==='flashLaser')bigBurst(b.x,b.y,'#fff0a8',10,.45);else addTrail(b.x,b.y,b.color||'#fff',12,.18,'spark');}}
function updateZones(dt){for(var zi=zones.length-1;zi>=0;zi--){var z=zones[zi];z.life-=dt;if(z.followPlayer){z.x=player.x;z.y=player.y;}z.tick-=dt;if(z.tick<=0){z.tick=.16;for(var i=enemies.length-1;i>=0;i--){var e=enemies[i],d=Math.hypot(e.x-z.x,e.y-z.y);if(d<z.r+e.r){if(z.slow)e.slowTimer=Math.max(e.slowTimer,z.slow);var dmg=z.damage*(.7+.3*(1-d/(z.r+e.r)));if(damageEnemy(e,dmg,z.type==='steam'?'flash':'ice'))killEnemyAt(i);}}}if(z.life<=0)zones.splice(zi,1);}}
function updateItems(dt){var mag=92+getPassiveLevel('magnet')*58;for(var i=items.length-1;i>=0;i--){var it=items[i];it.life-=dt;it.x+=it.vx*dt;it.y+=it.vy*dt;it.vx*=.96;it.vy*=.96;var dx=player.x-it.x,dy=player.y-it.y,d=Math.hypot(dx,dy)||1;if(d<mag){var pull=(1-d/mag)*520+80;it.x+=dx/d*pull*dt;it.y+=dy/d*pull*dt;}if(d<player.r+it.r+8){exp+=it.value;score+=it.value*3;items.splice(i,1);continue;}if(it.life<=0)items.splice(i,1);}}
function updateEffects(dt){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;if(p.life<=0)particles.splice(i,1);}for(var t=trails.length-1;t>=0;t--){trails[t].life-=dt;if(trails[t].life<=0)trails.splice(t,1);}for(var l=lightnings.length-1;l>=0;l--){lightnings[l].life-=dt;if(lightnings[l].life<=0)lightnings.splice(l,1);}if(screenFlash>0)screenFlash=Math.max(0,screenFlash-dt*1.8);if(warningTimer>0){warningTimer-=dt;if(warningTimer<=0)document.getElementById('warning').style.display='none';else document.getElementById('warning').style.opacity=String(Math.min(1,warningTimer)*(.65+.35*Math.sin(performance.now()/70)));}}
function update(dt){if(!running||!player)return;if(paused){updateEffects(dt);return;}gameTime+=dt;if(!endlessMode&&!clearOffered&&gameTime>=CLEAR_TIME){showClearScreen();updateHud();return;}updateInput(dt);updateSpawns(dt);updateWeapons(dt);updateEnemies(dt);if(gameOver)return;updateBullets(dt);updateZones(dt);updateItems(dt);updateEffects(dt);checkLevelUps();updateHud();}

function drawBackground(){ctx.clearRect(0,0,width,height);var g=ctx.createRadialGradient(width*.5,height*.28,0,width*.5,height*.5,Math.max(width,height));g.addColorStop(0,endlessMode?'#41265f':'#263a70');g.addColorStop(.6,'#111936');g.addColorStop(1,'#070b18');ctx.fillStyle=g;ctx.fillRect(0,0,width,height);ctx.strokeStyle='rgba(255,255,255,.045)';ctx.lineWidth=1;for(var gx=0;gx<width;gx+=48){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,height);ctx.stroke();}for(var gy=0;gy<height;gy+=48){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(width,gy);ctx.stroke();}}
function drawEnemyHp(en){var g=getPassiveLevel('goggles');if(g<=0&&!en.boss)return;var ratio=Math.max(0,en.hp/en.maxHp),barW=Math.max(en.boss?62:24,en.r*2.2),y=en.y-en.r-12;ctx.save();ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(en.x-barW/2,y,barW,5);ctx.fillStyle=ratio<.35?'#ff6678':'#79ff8e';ctx.fillRect(en.x-barW/2,y,barW*ratio,5);if(g>=2||en.boss){ctx.font='10px system-ui';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillStyle='#fff';ctx.fillText(Math.ceil(en.hp),en.x,y-2);}if(g>=3&&ratio<.35){ctx.font='13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ffdf6b';ctx.fillText('!',en.x+barW/2+7,y+4);}ctx.restore();}
function drawIceOrbs(){var lv=getWeaponLevel('ice');if(lv<=0||!player)return;var count=1+(lv>=3?1:0)+(lv>=5?1:0),radius=44+lv*8,orbR=(10+lv*1.25)*areaMult();for(var o=0;o<count;o++){var a=iceAngle+Math.PI*2*o/count,ox=player.x+Math.cos(a)*radius,oy=player.y+Math.sin(a)*radius;ctx.save();ctx.fillStyle='#9ee8ff';ctx.shadowColor='#66d9ff';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(ox,oy,orbR,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.arc(ox-orbR*.25,oy-orbR*.25,orbR*.35,0,Math.PI*2);ctx.fill();ctx.restore();}}
function draw(){drawBackground();if(!running&&!player)return;if(!player)return;items.forEach(function(item){ctx.save();ctx.fillStyle='#6cff92';ctx.shadowColor='#6cff92';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(item.x,item.y,item.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=.8;ctx.beginPath();ctx.arc(item.x-1,item.y-1,item.r*.35,0,Math.PI*2);ctx.fill();ctx.restore();});zones.forEach(function(z){var za=Math.max(0,z.life/z.max);ctx.save();ctx.globalAlpha=.20+za*.28;ctx.fillStyle=z.type==='steam'?'#dff7ff':'#9ee8ff';ctx.strokeStyle=z.type==='steam'?'#ffffff':'#66d9ff';ctx.lineWidth=3;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.65*za;ctx.stroke();ctx.restore();});trails.forEach(function(tr){var ta=Math.max(0,tr.life/tr.max);ctx.save();ctx.globalAlpha=ta*.7;ctx.fillStyle=tr.color;ctx.strokeStyle=tr.color;ctx.shadowColor=tr.color;ctx.shadowBlur=tr.type==='spark'?12:8;if(tr.type==='line'){ctx.lineWidth=Math.max(1,tr.size*.25);ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.stroke();}else if(tr.type==='smoke'){ctx.globalAlpha=ta*.42;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*(1.45-ta*.25),0,Math.PI*2);ctx.fill();}else if(tr.type==='flame'){ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd06a';ctx.globalAlpha=ta*.4;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*.45*ta,0,Math.PI*2);ctx.fill();}else if(tr.type==='ice'){ctx.globalAlpha=ta*.45;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*.45*ta,0,Math.PI*2);ctx.fill();}else{ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.fill();}ctx.restore();});particles.forEach(function(p){var pa=Math.max(0,p.life/(p.max||.8));ctx.save();ctx.globalAlpha=pa;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,(p.r||3)*pa,0,Math.PI*2);ctx.fill();ctx.restore();});lightnings.forEach(function(ln){var la=Math.max(0,ln.life/ln.max);ctx.save();ctx.globalAlpha=la;ctx.strokeStyle='#fff06b';ctx.lineWidth=3;ctx.shadowColor='#fff06b';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(ln.x+rand(-10,10),0);ctx.lineTo(ln.x+4,ln.y-20);ctx.lineTo(ln.x-5,ln.y+8);ctx.lineTo(ln.x+8,ln.y+22);ctx.stroke();ctx.restore();});enemies.forEach(function(en){ctx.save();var pulse=en.hitPulse>0?1.25:1;ctx.fillStyle=en.color;ctx.shadowColor=en.slowTimer>0?'#66d9ff':en.color;ctx.shadowBlur=en.slowTimer>0?20:10;ctx.beginPath();ctx.arc(en.x,en.y,en.r*pulse,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.font=Math.max(14,en.r*1.1)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(en.emoji||'☁️',en.x,en.y+1);ctx.restore();drawEnemyHp(en);});bullets.forEach(function(b){ctx.save();if(b.type==='missile'){var ma=Math.atan2(b.vy,b.vx);ctx.translate(b.x,b.y);ctx.rotate(ma);ctx.globalAlpha=.42;ctx.fillStyle='#d8d8d8';ctx.shadowColor='#d8d8d8';ctx.shadowBlur=14;ctx.beginPath();ctx.ellipse(-b.r*2.4,0,b.r*1.8,b.r*.75,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.8;ctx.fillStyle='#ffb06a';ctx.shadowColor='#ffb06a';ctx.beginPath();ctx.ellipse(-b.r*1.25,0,b.r*.95,b.r*.42,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=14;ctx.beginPath();ctx.ellipse(0,0,b.r*1.35,b.r*.85,0,0,Math.PI*2);ctx.fill();}else if(b.type==='laser'||b.type==='needle'){var ang=Math.atan2(b.vy,b.vx),lx=Math.cos(ang)*(b.length||18),ly=Math.sin(ang)*(b.length||18);ctx.strokeStyle=b.color;ctx.lineWidth=b.thickness||1.5;ctx.lineCap='round';ctx.shadowColor=b.color;ctx.shadowBlur=b.type==='laser'?14:8;ctx.beginPath();ctx.moveTo(b.x-lx*.15,b.y-ly*.15);ctx.lineTo(b.x+lx,b.y+ly);ctx.stroke();}else{ctx.fillStyle=b.color;ctx.shadowColor=b.type==='iron'?'#c9d0dd':b.color;ctx.shadowBlur=b.type==='iron'?16:10;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();if(b.type==='fire'||b.type==='ice'||b.type==='iron'){var emoji=b.type==='fire'?'🔥':(b.type==='ice'?'❄️':'⚫');ctx.shadowBlur=0;ctx.font=Math.max(12,b.r*1.1)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(emoji,b.x,b.y+1);}}ctx.restore();});drawIceOrbs();ctx.save();ctx.globalAlpha=player.inv>0?.65+.35*Math.sin(performance.now()/35):1;ctx.fillStyle='#ffd95a';ctx.shadowColor='#ffd95a';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#362100';ctx.font='25px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☀️',player.x,player.y+1);ctx.restore();if(touch.active){ctx.save();ctx.globalAlpha=.35;ctx.strokeStyle='#66d9ff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(touch.startX,touch.startY,42,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(touch.x,touch.y,20,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(touch.startX,touch.startY);ctx.lineTo(touch.x,touch.y);ctx.stroke();ctx.restore();}if(screenFlash>0){ctx.save();ctx.globalAlpha=screenFlash*.65;ctx.fillStyle='#fff6b8';ctx.fillRect(0,0,width,height);ctx.restore();}}
function loop(){var now=performance.now();var dt=Math.min((now-lastTime)/1000,.033);lastTime=now;update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
if(DEBUG_MODE){window.__SUNNY_TEST__={start:startGame,setTime:function(t){gameTime=t;},giveExp:function(v){exp+=v;checkLevelUps();updateHud();},setWeapon:function(id,lv){weaponLevels[id]=lv;updateSlots();},setFusion:function(id,lv){fusionLevels[id]=lv;updateSlots();},spawnBoss:spawnBoss,state:function(){return{running:running,paused:paused,gameTime:gameTime,level:level,exp:exp,nextExp:nextExp,enemies:enemies.length,bullets:bullets.length,clearOffered:clearOffered,endlessMode:endlessMode,hp:player&&player.hp};}};}
})();
