<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>サニーさんサバイバー</title>
<style>

:root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--game-height:100dvh;--glass:rgba(255,255,255,.12);--line:rgba(255,255,255,.24);--gold:#ffdf6b;--cyan:#66d9ff;--bg:#10182f;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none;overscroll-behavior:none;}
#game{position:relative;width:100vw;height:var(--game-height,100dvh);min-height:100svh;max-height:var(--game-height,100dvh);overflow:hidden;background:#10182f;}
canvas{display:block;width:100%;height:100%;background:#142044;touch-action:none;}
button{font:inherit;font-weight:900;border:0;border-radius:16px;padding:14px 20px;margin:6px;cursor:pointer;background:linear-gradient(#ffe779,#ffad3d);color:#362100;box-shadow:0 7px 0 rgba(0,0,0,.28);min-height:48px;}
button:active{transform:translateY(2px);box-shadow:0 4px 0 rgba(0,0,0,.28)}
#menu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 25%,rgba(255,223,107,.16),rgba(0,0,0,.68));z-index:10;padding:20px;}
#panel{width:min(580px,94vw);padding:24px;border-radius:22px;text-align:center;background:var(--glass);border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.35);backdrop-filter:blur(10px);}
.menuHero{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:8px}.titleSprite{position:relative;width:108px;height:108px;display:grid;place-items:center;filter:drop-shadow(0 8px 24px rgba(0,0,0,.25));}.titleSprite img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}.titleSprite .ring{z-index:1}.titleSprite .face{z-index:2}.menuCatch{font-size:clamp(17px,4.6vw,22px);font-weight:1000;color:#fff3a6;text-shadow:0 2px 12px rgba(255,223,107,.35);margin:4px 0 12px;line-height:1.35}.menuQrWrap{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:8px}.menuQrWrap img{width:132px;height:132px;border-radius:14px;background:#fff;padding:8px;box-shadow:0 10px 28px rgba(0,0,0,.25);}.menuQrHint{font-size:12px;color:#dce5ff;line-height:1.5}
h1{font-size:clamp(30px,8vw,42px);line-height:1.12;margin:8px 0 12px;}p{line-height:1.6;color:#e3e9ff;margin:8px 0;}
#hud{position:absolute;left:8px;right:8px;top:calc(8px + var(--safe-top));z-index:5;display:none;pointer-events:none;font-weight:900;flex-wrap:wrap;gap:4px 6px;align-items:flex-start;max-width:calc(100vw - 16px);}
.pill{display:inline-block;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:7px 10px;margin:0;text-shadow:0 1px 2px rgba(0,0,0,.8);}
#hpOuter,#expOuter{position:absolute;left:8px;width:min(360px,calc(100vw - 16px));height:18px;background:rgba(0,0,0,.55);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.22);display:none;z-index:5;}
#hpOuter{top:calc(58px + var(--safe-top));width:min(240px,calc(100vw - 16px));}
#expOuter{top:calc(82px + var(--safe-top));}
#hpBar{height:100%;width:100%;background:linear-gradient(90deg,#69f58b,#fff36e,#ff6678);transition:width .12s linear;}
#expBar{height:100%;width:0%;background:linear-gradient(90deg,#66d9ff,#d7a6ff,#ffdf6b);transition:width .12s linear;}
#expText{position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.85);}
#msg{position:absolute;left:50%;top:calc(108px + var(--safe-top));transform:translateX(-50%);z-index:20;background:rgba(0,0,0,.74);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:9px 13px;font-weight:900;display:none;max-width:min(92vw,640px);white-space:normal;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.3);}
#warning{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:19;display:none;font-size:clamp(46px,11vw,96px);font-weight:1000;color:#ff445f;letter-spacing:.08em;text-shadow:0 0 18px rgba(255,68,95,.9),0 5px 0 rgba(0,0,0,.35);pointer-events:none;}
#error{position:absolute;left:8px;right:8px;bottom:8px;z-index:99;background:rgba(255,0,0,.86);padding:10px;border-radius:10px;display:none;font-size:12px;white-space:pre-wrap;}
#bottomSlots{position:absolute;left:50%;bottom:calc(6px + var(--safe-bottom));transform:translateX(-50%);z-index:6;display:none;gap:10px;pointer-events:none;max-width:96vw;}
#weaponSlots,#passiveSlots{display:flex;gap:7px;}
.slotGroup{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:7px 9px;backdrop-filter:blur(8px);}
.slotLabel{font-size:11px;color:#dce5ff;font-weight:900;writing-mode:vertical-rl;letter-spacing:.05em;opacity:.9;}
.slot{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.24);display:grid;place-items:center;position:relative;font-size:21px;box-shadow:inset 0 0 14px rgba(255,255,255,.04);}
.slot.empty{color:rgba(255,255,255,.35);font-size:18px}.slot .lv{position:absolute;right:2px;bottom:0;font-size:10px;background:rgba(0,0,0,.72);border-radius:999px;padding:0 4px;font-weight:900;color:#fff;}.slot.fusion{border-color:rgba(255,223,107,.85);box-shadow:0 0 18px rgba(255,223,107,.28),inset 0 0 16px rgba(255,223,107,.08);}
.modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.64);z-index:30;padding:18px;}
.panelGlass{width:min(820px,96vw);max-height:calc(var(--game-height,100dvh) - 18px);overflow:auto;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:20px;text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.42);backdrop-filter:blur(12px);}
#levelPanel h2{font-size:clamp(30px,7vw,42px);margin:6px 0 8px;}#choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.choice{text-align:left;min-height:148px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.22);color:#fff;}
.choice.weaponChoice{border-color:rgba(185,140,255,.7);box-shadow:0 0 20px rgba(185,140,255,.18);}.choice.passiveChoice{border-color:rgba(102,217,255,.65);}.choice.fusionChoice{border-color:rgba(255,223,107,.98);box-shadow:0 0 30px rgba(255,223,107,.42);background:linear-gradient(180deg,rgba(255,223,107,.25),rgba(255,255,255,.09));}.choice.breakChoice{border-color:rgba(255,102,170,.85);box-shadow:0 0 24px rgba(255,102,170,.25);}
.choice .tag{display:inline-block;font-size:11px;font-weight:900;border-radius:999px;padding:3px 7px;background:rgba(0,0,0,.45);margin-bottom:6px;color:#fff3a6;}.choice .emoji{font-size:32px;line-height:1;}.choice b{display:block;color:#fff5b5;font-size:17px;margin:6px 0 4px;}.choice small{display:block;color:#e3e9ff;line-height:1.45;font-weight:700;}
#rerollBtn{display:none;margin-top:14px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.25);box-shadow:none;}
.resultPanel{width:min(780px,96vw);max-height:calc(var(--game-height,100dvh) - 18px);overflow:auto;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:22px;text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.42);backdrop-filter:blur(12px);}
.resultPanel h2{font-size:clamp(32px,8vw,56px);margin:8px 0 10px;}.clearGlow{color:var(--gold);text-shadow:0 0 22px rgba(255,223,107,.8);}.endlessMark{color:#ffdf6b;text-shadow:0 0 12px rgba(255,223,107,.5);}
.statsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0;}.statBox{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px;}.statBox.wide{grid-column:1/-1}.statBox span{display:block;color:#dce5ff;font-size:13px;}.statBox b{display:block;color:#fff3a6;font-size:clamp(22px,5vw,30px);margin-top:2px;}.buildLine{margin:12px 0;padding:12px;border-radius:16px;background:rgba(0,0,0,.28);color:#e3e9ff;line-height:1.55;text-align:left;}
#debugPanel{position:absolute;right:8px;top:118px;z-index:7;display:none;flex-direction:column;gap:4px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:8px;backdrop-filter:blur(8px);}.debugTitle{font-size:11px;font-weight:900;color:#fff3a6;text-align:center;margin-bottom:2px;}#debugPanel button{font-size:11px;padding:6px 8px;margin:0;border-radius:9px;box-shadow:none;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);text-align:left;min-height:28px;}
@media(max-width:680px){#choices{grid-template-columns:1fr}.pill{font-size:10px;padding:5px 7px}#hud{left:6px;right:6px;top:calc(5px + var(--safe-top));gap:3px 4px}#hpOuter{left:6px;top:calc(48px + var(--safe-top));width:min(210px,calc(100vw - 12px));height:14px}#expOuter{left:6px;top:calc(66px + var(--safe-top));width:min(280px,calc(100vw - 12px));height:14px}#msg{top:calc(88px + var(--safe-top));font-size:12px;border-radius:16px;padding:8px 10px}.panelGlass,.resultPanel{padding:13px;border-radius:20px}.choice{min-height:auto;padding:12px}.choice .emoji{font-size:28px}.choice b{font-size:16px}.choice small{font-size:12px}.slot{width:29px;height:29px;font-size:15px;border-radius:9px}.slot .lv{font-size:8px}.slotGroup{padding:4px 5px;gap:4px;border-radius:13px}.slotLabel{font-size:8px}#weaponSlots,#passiveSlots{gap:4px}#bottomSlots{gap:5px;bottom:calc(5px + var(--safe-bottom))}#debugPanel{right:4px;top:96px;transform:scale(.78);transform-origin:right top;opacity:.55}.statsGrid{grid-template-columns:1fr 1fr}.statBox{padding:9px}button{width:100%;margin:6px 0;min-height:46px}.titleSprite{width:92px;height:92px}.menuQrWrap img{width:116px;height:116px}.menuCatch{font-size:17px}}@media(max-height:620px){.pill{font-size:9px;padding:4px 6px}#hpOuter{top:calc(42px + var(--safe-top));height:12px}#expOuter{top:calc(58px + var(--safe-top));height:12px}#expText{font-size:9px}#msg{top:calc(76px + var(--safe-top))}.slot{width:25px;height:25px;font-size:13px}.slotGroup{padding:3px 4px}.slotLabel{display:none}.panelGlass,.resultPanel{padding:10px}.choice{padding:10px}.choice .emoji{font-size:24px}}

</style>
</head>
<body>
<div id="game">
<canvas id="canvas"></canvas>
<div id="hud"><span class="pill" id="timeText">Time 0:00</span><span class="pill" id="levelText">Lv 1</span><span class="pill" id="scoreText">Score 0</span><span class="pill" id="sunnyText">☀️ 固定</span><span class="pill" id="modeText">NORMAL</span></div>
<div id="hpOuter"><div id="hpBar"></div></div>
<div id="expOuter"><div id="expBar"></div><span id="expText">EXP 0/15</span></div>
<div id="bottomSlots"><div class="slotGroup"><span class="slotLabel">武器</span><div id="weaponSlots"></div></div><div class="slotGroup"><span class="slotLabel">補助</span><div id="passiveSlots"></div></div></div>
<div id="msg"></div><div id="warning">WARNING</div><div id="error"></div>
<div id="debugPanel"><div class="debugTitle">DEBUG</div><button type="button" data-debug="level">L LvUP</button><button type="button" data-spawn="normal">1 基本</button><button type="button" data-spawn="fast">2 速い</button><button type="button" data-spawn="tank">3 硬い</button><button type="button" data-spawn="split">5 分裂</button><button type="button" data-boss="basicBoss">6 中ボス</button><button type="button" data-boss="specialBoss">7 特殊</button><button type="button" data-boss="rushBoss">8 突進</button></div>
<div id="levelScreen" class="modal"><div id="levelPanel" class="panelGlass"><h2>LEVEL UP!</h2><p>ビルドを選んでね。完成後は自動でスコア化、エンドレスでは限界突破。</p><div id="choices"></div><button id="rerollBtn" type="button">デバッグ：3択ひきなおし</button></div></div>
<div id="clearScreen" class="modal"><div class="resultPanel"><h2 class="clearGlow">GAME CLEAR!</h2><p>5分間生存成功！結果を見るか、エンドレスへ挑戦できます。</p><div id="clearStats" class="statsGrid"></div><div id="clearBuild" class="buildLine"></div><button id="endlessBtn" type="button">エンドレスへ挑戦</button><button id="finishBtn" type="button">結果を見る</button></div></div>
<div id="resultScreen" class="modal"><div class="resultPanel"><h2 id="resultTitle">RESULT</h2><p id="resultComment"></p><div id="resultStats" class="statsGrid"></div><div id="resultBuild" class="buildLine"></div><button id="againBtn" type="button">もう一度</button><button id="titleBtn" type="button">タイトルへ</button></div></div>
<div id="menu"><div id="panel"><div class="menuHero"><div class="titleSprite" aria-hidden="true"><img id="menuRingImg" class="ring" alt=""><img id="menuFaceImg" class="face" alt=""></div><h1>サニーさんサバイバー</h1></div><div class="menuCatch">もやもやを倒して５分間生き残れ！</div><button id="startBtn" type="button">ゲームスタート</button><div class="menuQrWrap" id="menuQrWrap"><img id="menuQrImg" alt="このゲームのQRコード"><div class="menuQrHint">このゲームのURLを開くQRコード</div></div></div></div>
</div>

function makeSprite(local,fallback){var img=new Image();img.onerror=function(){if(img.src!==fallback)img.src=fallback;};img.src=local;return img;}
var playerFaceImg=makeSprite('image1.png',PLAYER_FACE_FALLBACK);
var playerRingImg=makeSprite('image2.png',PLAYER_RING_FALLBACK);
var playerHitImg=makeSprite('image3.png',PLAYER_HIT_FALLBACK);
function setupMenuVisuals(){
  var face=document.getElementById('menuFaceImg');
  var ring=document.getElementById('menuRingImg');
  if(face)face.src=(playerFaceImg&&playerFaceImg.src)||PLAYER_FACE_FALLBACK;
  if(ring)ring.src=(playerRingImg&&playerRingImg.src)||PLAYER_RING_FALLBACK;
  var qr=document.getElementById('menuQrImg');
  if(qr){
    var href=location.href||'';
    if(/^https?:/i.test(href)){
      qr.src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(href);
      qr.style.display='block';
    }else{
      qr.style.display='none';
      var wrap=document.getElementById('menuQrWrap');
      if(wrap){
        var hint=wrap.querySelector('.menuQrHint');
        if(hint)hint.textContent='公開URLで開くとQRコードが表示されます';
      }
    }
  }
}
setupMenuVisuals();

function buildAllChoices(){var choices=[];fusionOrder.forEach(function(fid){var fd=fusionDefs[fid];if(getFusionLevel(fid)===0&&getWeaponLevel(fd.a)>=5&&getWeaponLevel(fd.b)>=5){choices.push({id:'fusion_'+fid,tag:'✨合成チャンス',icon:fd.icon,name:fd.name,desc:weaponDefs[fd.a].name+' Lv5 + '+weaponDefs[fd.b].name+' Lv5。'+fd.desc});}else if(getFusionLevel(fid)>0&&getFusionLevel(fid)<3){choices.push({id:'fusionLv_'+fid,tag:'合成武器強化',icon:fd.icon,name:fd.name+' Lv'+(getFusionLevel(fid)+1),desc:fd.desc});}});weaponOrder.forEach(function(wid){var lv=getWeaponLevel(wid),wd=weaponDefs[wid];if(lv===0&&canAddWeapon()){choices.push({id:wid,tag:'武器追加',icon:wd.icon,name:wd.name,desc:wd.desc});}else if(lv>0&&lv<5){choices.push({id:wid,tag:'武器強化',icon:wd.icon,name:wd.name+' Lv'+(lv+1),desc:wd.desc});}});passiveOrder.forEach(function(pid){var lv=getPassiveLevel(pid),pd=passiveDefs[pid];if(lv===0&&canAddPassive()){choices.push({id:'passive_'+pid,tag:'パッシブ追加',icon:pd.icon,name:pd.name,desc:pd.desc});}else if(lv>0&&lv<5){choices.push({id:'passive_'+pid,tag:'パッシブ強化',icon:pd.icon,name:pd.name+' Lv'+(lv+1),desc:pd.desc});}});return choices;}

function renderLevelChoices(){var box=document.getElementById('choices');box.innerHTML='';var choices=buildAllChoices();if(choices.length===0&&endlessMode)choices=buildBreakChoices();var out=[],used={};function take(filter){var pool=choices.filter(function(c){return !used[c.id]&&filter(c);});if(!pool.length)return false;var c=choose(pool);used[c.id]=true;out.push(c);return true;}take(function(c){return c.id.indexOf('fusion_')===0;});if(out.length<3)take(function(c){return c.id.indexOf('fusionLv_')===0;});if(out.length<3)take(function(c){return weaponDefs[c.id]&&getWeaponLevel(c.id)>0;});if(out.length<3)take(function(c){return c.id.indexOf('passive_')===0&&getPassiveLevel(c.id.replace('passive_',''))>0;});var guard=0;while(out.length<3&&choices.length&&guard++<100){var c=choose(choices);if(!used[c.id]){used[c.id]=true;out.push(c);}}out.forEach(function(c){var btn=document.createElement('button');var isWeapon=!!weaponDefs[c.id],isPassive=c.id.indexOf('passive_')===0,isFusion=c.id.indexOf('fusion')===0,isBreak=c.id.indexOf('break_')===0;btn.className='choice '+(isFusion?'fusionChoice':isWeapon?'weaponChoice':isPassive?'passiveChoice':isBreak?'breakChoice':'');btn.innerHTML='<span class="tag">'+c.tag+'</span><div class="emoji">'+c.icon+'</div><b>'+c.name+'</b><small>'+c.desc+'</small>';btn.addEventListener('click',function(){applyChoice(c,false);});box.appendChild(btn);});}
function openLevelChoices(){paused=true;levelPulse=1.0;screenFlash=Math.max(screenFlash,.18);if(player)bigBurst(player.x,player.y,'#66d9ff',34,.72);var lh=document.querySelector('#levelPanel h2');if(lh)lh.textContent='LEVEL UP!  Lv '+level;showMessage('LEVEL UP! Lv '+level,900);renderLevelChoices();document.getElementById('levelScreen').style.display='flex';playSfx('level');}
function applyChoice(c,silent){if(c.id.indexOf('break_')===0){var bid=c.id.replace('break_','');breakLevels[bid]=getBreakLevel(bid)+1;if(bid==='hp'){player.maxHp+=12;player.hp+=12;}if(bid==='speed'){player.baseSpeed+=7;}if(!silent)showMessage(breakDefs[bid].name+' +'+getBreakLevel(bid));}
else if(c.id.indexOf('passive_')===0){var pid=c.id.replace('passive_','');if(getPassiveLevel(pid)===0&&!canAddPassive()){if(!silent)showMessage('パッシブ枠がいっぱい！');return;}if(getPassiveLevel(pid)<5){passiveLevels[pid]=getPassiveLevel(pid)+1;if(pid==='heart'){player.maxHp+=20;player.hp=Math.min(player.maxHp,player.hp+24+getPassiveLevel(pid)*4);}if(pid==='speed'){player.baseSpeed+=18;}if(!silent){if(getPassiveLevel(pid)>=5)celebrateText('MAX! '+passiveDefs[pid].name);else showMessage(passiveDefs[pid].name+' Lv'+getPassiveLevel(pid));}}}
else if(c.id.indexOf('fusion_')===0){var fid=c.id.replace('fusion_',''),fd=fusionDefs[fid];weaponLevels[fd.a]=0;weaponLevels[fd.b]=0;weaponTimers[fd.a]=0;weaponTimers[fd.b]=0;fusionLevels[fid]=1;weaponTimers[fid]=0;if(!silent)celebrateText('✨ '+fd.name+' 合成！');}
else if(c.id.indexOf('fusionLv_')===0){var fid2=c.id.replace('fusionLv_','');fusionLevels[fid2]=Math.min(3,getFusionLevel(fid2)+1);if(!silent){if(getFusionLevel(fid2)>=3)celebrateText('MAX! '+fusionDefs[fid2].name);else showMessage(fusionDefs[fid2].name+' Lv'+getFusionLevel(fid2));}}
else if(weaponDefs[c.id]){if(getWeaponLevel(c.id)===0&&!canAddWeapon()){if(!silent)showMessage('武器枠がいっぱい！');return;}weaponLevels[c.id]=Math.min(5,getWeaponLevel(c.id)+1);weaponTimers[c.id]=0;if(!silent){if(getWeaponLevel(c.id)>=5)celebrateText('MAX! '+weaponDefs[c.id].name);else showMessage(weaponDefs[c.id].name+' Lv'+getWeaponLevel(c.id));}}
updateSlots();document.getElementById('levelScreen').style.display='none';paused=false;setTimeout(checkLevelUps,0);}
function chooseChestUpgrade(){var choices=buildAllChoices();if(!choices.length&&endlessMode)choices=buildBreakChoices();if(!choices.length)return null;function pick(filter){var pool=choices.filter(filter);return pool.length?choose(pool):null;}return pick(function(c){return c.id.indexOf('fusion_')===0;})||pick(function(c){return c.id.indexOf('fusionLv_')===0;})||pick(function(c){return weaponDefs[c.id]&&getWeaponLevel(c.id)>0&&getWeaponLevel(c.id)<5;})||pick(function(c){return c.id.indexOf('passive_')===0&&getPassiveLevel(c.id.replace('passive_',''))>0;})||pick(function(c){return weaponDefs[c.id]&&getWeaponLevel(c.id)===0&&canAddWeapon();})||pick(function(c){return c.id.indexOf('passive_')===0&&getPassiveLevel(c.id.replace('passive_',''))===0&&canAddPassive();})||pick(function(c){return c.id.indexOf('break_')===0;})||choose(choices);}

function gainExp(v){exp+=v;}
function checkLevelUps(){if(paused||!running||gameOver)return;var guard=0;while(exp>=nextExp&&guard++<6){exp-=nextExp;level++;nextExp=nextExpFor(level);var choices=buildAllChoices();if(choices.length>0||(endlessMode&&buildBreakChoices().length>0)){openLevelChoices();break;}else{score+=600+level*32;if(level%3===0)showMessage('熟練ボーナス +' + (600+level*32),700);}}}

function difficulty(){var t=gameTime;var hp=.88+t*.0062,sp=.84+t*.00125,den=.72+t*.0046,dmg=.80+t*.0021;if(t<40){hp*=.88;sp*=.86;den*=.78;dmg*=.78;}if(t<90){hp*=.90;sp*=.93;den*=.90;dmg*=.86;}else if(t<125){hp*=.94;sp*=.96;dmg*=.92;}if(t>=150){hp*=1.12;den*=1.10;}if(t>=220){hp*=1.22;sp*=1.08;den*=1.18;dmg*=1.12;}if(t>=255){hp*=1.18;sp*=1.08;den*=1.18;dmg*=1.12;}if(t>=282){hp*=1.10;den*=1.16;sp*=1.06;dmg*=1.08;}if(t>220&&fusionCount()===0){var f=1+(t-220)/125;hp*=f;den*=1.16;sp*=1.08;dmg*=1.08;}else if(t>245&&fusionCount()<2){hp*=1.12;den*=1.08;}if(endlessMode){var e=t-CLEAR_TIME;hp*=1+e/72;sp*=1+e/490;den*=1+e/105;dmg*=1+e/520;if(t>=480){hp*=1.45;den*=1.30;}if(t>=600){hp*=1.8;sp*=1.2;den*=1.45;dmg*=1.22;}}return{hp:hp,sp:sp,den:den,dmg:dmg};}
function enemySizeScale(){return width<720?.84:.90;}
function enemyPool(){var t=gameTime,p=['normal','normal','normal'];if(t>14)p.push('fast');if(t>72)p.push('tank');if(t>108)p.push('charger');if(t>135)p.push('split','tank');if(t>190)p.push('wall','fast','charger');if(t>235)p.push('tank','wall','split','charger');if(t>270)p.push('wall','wall','tank','charger');return p;}
function spawnEnemy(type,fromRing,x,y){var cap=endlessMode?CONFIG.endlessEnemyCap:CONFIG.enemyCap;if(enemies.length>=cap)return;type=type||choose(enemyPool());var side=Math.floor(Math.random()*4);if(x===undefined||y===undefined){var pad=44;if(side===0){x=Math.random()*width;y=-pad;}if(side===1){x=width+pad;y=Math.random()*height;}if(side===2){x=Math.random()*width;y=height+pad;}if(side===3){x=-pad;y=Math.random()*height;}}var d=difficulty();var data={normal:{r:15,hp:18,speed:58,damage:10,color:'#b98cff',emoji:'☁️'},fast:{r:12,hp:14,speed:108,damage:9,color:'#ff6678',emoji:'💢'},tank:{r:22,hp:94,speed:38,damage:16,color:'#9aa8bd',emoji:'🪨'},split:{r:17,hp:38,speed:54,damage:12,color:'#d6f4ff',emoji:'🫧'},mini:{r:9,hp:10,speed:82,damage:5,color:'#d6f4ff',emoji:'☁️'},charger:{r:13,hp:28,speed:122,damage:15,color:'#ff8aa8',emoji:'💢'},wall:{r:25,hp:165,speed:30,damage:22,color:'#657386',emoji:'🪨'}}[type]||null;if(!data)return;var e={type:type,x:x,y:y,r:data.r*enemySizeScale(),hp:data.hp*d.hp,maxHp:data.hp*d.hp,baseSpeed:data.speed*d.sp,speed:data.speed*d.sp,damage:data.damage*d.dmg,boss:false,color:data.color,emoji:data.emoji,slowTimer:0,iceHitTimer:0,hitPulse:0,aiTimer:Math.random()*2,cd:{}};if(!fromRing&&!endlessMode&&gameTime<130){var em=1;if(type==='tank')em=gameTime<95?.52:.62;else if(type==='wall')em=.56;else if(type==='fast'||type==='charger')em=.82;else em=.88;e.hp*=em;e.maxHp=e.hp;e.damage*=.86;}if(fromRing){e.hp*=1.25;e.maxHp=e.hp;e.r*=1.02;e.baseSpeed*=.92;}enemies.push(e);}
function spawnBoss(kind){var side=Math.floor(Math.random()*4),pad=90,x=width/2,y=height/2;if(side===0){x=Math.random()*width;y=-pad;}if(side===1){x=width+pad;y=Math.random()*height;}if(side===2){x=Math.random()*width;y=height+pad;}if(side===3){x=-pad;y=Math.random()*height;}var d=difficulty();var data={basicBoss:{r:38,hp:1600,speed:42,damage:28,color:'#ff445f',emoji:'👹'},specialBoss:{r:40,hp:4200,speed:45,damage:28,color:'#8a9bff',emoji:'🌀'},rushBoss:{r:47,hp:10800,speed:37,damage:42,color:'#bca27a',emoji:'💥'}}[kind]||{r:38,hp:1800,speed:42,damage:28,color:'#ff445f',emoji:'👹'};var scale=1+gameTime/305;if(endlessMode)scale*=1+(gameTime-CLEAR_TIME)/115;var bossHp=data.hp*scale*Math.sqrt(d.hp);var e={type:'boss',boss:true,bossKind:kind,x:x,y:y,r:data.r,hp:bossHp,maxHp:bossHp,baseSpeed:data.speed*d.sp,speed:data.speed*d.sp,damage:data.damage*d.dmg,color:data.color,emoji:data.emoji,slowTimer:0,iceHitTimer:0,hitPulse:0,aiTimer:0,chargeTimer:kind==='rushBoss'?1.1:1.7,chargeX:0,chargeY:0,cd:{},auraTick:0};enemies.push(e);spawnBossRing(kind);showWarning('WARNING');showMessage('中ボス出現！ 倒せば宝箱 '+data.emoji,1500);}
function spawnBossRing(kind){var count=kind==='rushBoss'?34:(kind==='specialBoss'?26:18);var radius=Math.max(width,height)*.64;var cx=player?player.x:width/2,cy=player?player.y:height/2;var cap=endlessMode?CONFIG.endlessEnemyCap:CONFIG.enemyCap;for(var i=0;i<count&&enemies.length<cap;i++){var a=Math.PI*2*i/count;var type='tank';if(kind==='basicBoss'){type=i%4===0?'wall':(i%3===0?'fast':'tank');}else if(kind==='specialBoss'){type=i%3===0?'wall':(i%4===0?'split':'tank');}else{type=i%5===0?'charger':(i%2===0?'wall':'tank');}spawnEnemy(type,true,cx+Math.cos(a)*radius,cy+Math.sin(a)*radius);} }
function spawnRushWave(count,type){var side=Math.floor(Math.random()*4),pad=52;var cap=endlessMode?CONFIG.endlessEnemyCap:CONFIG.enemyCap;for(var i=0;i<count&&enemies.length<cap;i++){var x=0,y=0,offset=(i-(count-1)/2)*38;if(side===0){x=width/2+offset+rand(-20,20);y=-pad-rand(0,80);}if(side===1){x=width+pad+rand(0,80);y=height/2+offset+rand(-20,20);}if(side===2){x=width/2+offset+rand(-20,20);y=height+pad+rand(0,80);}if(side===3){x=-pad-rand(0,80);y=height/2+offset+rand(-20,20);}spawnEnemy(type||'charger',false,x,y);}showMessage('モヤモヤの波！',800);}
function updateSpawns(dt){var d=difficulty();spawnTimer-=dt;var interval=clamp(.95-gameTime*.0018,.26,.95)/clamp(d.den,.75,4.2);if(spawnTimer<=0){spawnTimer+=interval;var count=1;if(gameTime<60)count+=(gameTime>18?2:1);if(gameTime>70)count++;if(gameTime>145)count++;if(gameTime>220)count++;if(gameTime>265)count++;if(endlessMode)count+=Math.floor((gameTime-CLEAR_TIME)/95)+1;var cap=endlessMode?CONFIG.endlessEnemyCap:CONFIG.enemyCap;for(var i=0;i<count&&enemies.length<cap;i++){if(gameTime<60&&i>0)spawnEnemy('normal');else spawnEnemy();}}
waveTimer-=dt;if(waveTimer<=0){waveTimer=gameTime>240?13:(gameTime>150?17:24);if(gameTime>60)spawnRushWave(gameTime>235?8:6,gameTime>220?'charger':'fast');}
pressureTimer-=dt;if(pressureTimer<=0){pressureTimer=gameTime>230?11:18;if(gameTime>120){var c=gameTime>250?6:4;for(var p=0;p<c;p++)spawnEnemy(gameTime>230?'wall':'tank');}}
if(gameTime>=90&&!bossFlags.b90){bossFlags.b90=true;spawnBoss('basicBoss');}
if(gameTime>=180&&!bossFlags.b180){bossFlags.b180=true;spawnBoss('specialBoss');}
if(gameTime>=270&&!bossFlags.b270){bossFlags.b270=true;spawnBoss('rushBoss');}
if(gameTime>=236&&!bossFlags.moya){bossFlags.moya=true;showMessage('モヤモヤが濃くなってきた……',1600);screenFlash=.18;}
if(gameTime>=292&&!bossFlags.last){bossFlags.last=true;spawnRushWave(16,'charger');}
if(endlessMode){var minute=Math.floor(gameTime/60);if(minute>lastEndlessBossMinute){lastEndlessBossMinute=minute;var n=gameTime>=600?3:(gameTime>=480?2:1);for(var b=0;b<n;b++)spawnBoss(choose(['basicBoss','specialBoss','rushBoss']));}}}

function nearestEnemyFrom(x,y,maxDist){var best=null,bd=maxDist||999999;for(var i=0;i<enemies.length;i++){var e=enemies[i];if(!e)continue;var d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}return best;}function nearestEnemy(){return player?nearestEnemyFrom(player.x,player.y):null;}
function expValueFor(e){if(e.boss)return 0;var v=3;if(e.type==='wall')v=10+Math.floor(gameTime/150);else if(e.type==='tank')v=8+Math.floor(gameTime/160);else if(e.type==='split')v=5+Math.floor(gameTime/160);else if(e.type==='charger')v=5+Math.floor(gameTime/160);else if(e.type==='fast')v=4;else if(e.type==='mini')v=1;if(gameTime<60)v=Math.ceil(v*1.70);else if(gameTime<105)v=Math.ceil(v*1.35);else if(gameTime<145)v=Math.ceil(v*1.15);return v;}
function dropPickup(type,x,y,force,value){if(!force&&Math.random()>.5)return;var data={gem:{r:5,life:gameTime>210?CONFIG.lateGemLife:CONFIG.gemLife,value:value||1},heart:{r:11,life:14,value:22+getPassiveLevel('heart')*9},magnet:{r:12,life:13,value:0},bomb:{r:13,life:12,value:0},chest:{r:16,life:22,value:value||1}}[type]||{r:5,life:12,value:value||1};if(type==='gem'&&items.length>=CONFIG.itemCap){var target=null;for(var i=0;i<items.length;i++){if((items[i].type||'gem')==='gem'){target=items[i];break;}}if(target){target.value=(target.value||0)+data.value;target.r=clamp(target.r+0.08,5,12);target.life=Math.max(target.life,5);return;}}pushCap(items,{type:type||'gem',x:x,y:y,r:data.r,value:data.value,vx:rand(-26,26),vy:rand(-26,26),life:data.life},CONFIG.itemCap);}
function maybeDropSpecial(e){var lowHp=player&&player.hp<player.maxHp*.42;if(e.boss){if(Math.random()<(lowHp?.52:.22))dropPickup('heart',e.x+rand(-14,14),e.y+rand(-14,14),true);if(Math.random()<.18)dropPickup('magnet',e.x+rand(-16,16),e.y+rand(-16,16),true);if(Math.random()<.012)dropPickup('bomb',e.x+rand(-16,16),e.y+rand(-16,16),true);return;}if(lowHp&&Math.random()<.012)dropPickup('heart',e.x,e.y,true);if(gameTime>80&&Math.random()<.0016)dropPickup('magnet',e.x,e.y,true);if(gameTime>240&&(e.type==='wall'||e.type==='tank'||e.type==='split')&&Math.random()<.00055)dropPickup('bomb',e.x,e.y,true);}
function killEnemyAt(i){var e=enemies[i];if(!e)return;totalKills++;score+=e.boss?900:32;if(e.type==='split'){for(var m=0;m<2&&enemies.length<(endlessMode?CONFIG.endlessEnemyCap:CONFIG.enemyCap);m++)spawnEnemy('mini',false,e.x+rand(-18,18),e.y+rand(-18,18));}if(e.boss){dropPickup('chest',e.x+rand(-6,6),e.y+rand(-6,6),true,rollChestLevels(e.bossKind));bigBurst(e.x,e.y,e.color,80,1.25);}else{dropPickup('gem',e.x,e.y,true,expValueFor(e));burst(e.x,e.y,e.color,8);}maybeDropSpecial(e);enemies.splice(i,1);}
function damageEnemy(e,amount,src){if(!e||amount<=0)return false;src=src||{};if(src.weapon&&src.weapon!=='sunny'&&!src.fusion)amount*=1.08;if(e.boss){var key=src.fusion||src.weapon||'hit';var cd=fireBossCooldown[key]||0;if(cd>0){e.cd=e.cd||{};if(e.cd[key]>0)return false;e.cd[key]=cd;}var coef=src.fusion?(bossCoefFusion[src.fusion]||.65):(bossCoefNormal[src.weapon]||.25);amount*=coef;}e.hp-=amount;e.hitPulse=.10;if(src.slow)e.slowTimer=Math.max(e.slowTimer,src.slow);if(src.flash)pushCap(lightnings,{x:e.x,y:e.y,life:.14,max:.14},CONFIG.lightningCap);return e.hp<=0;}
function addBullet(o){if(!o)return;if(o.fusion){o.damage*=damageMult(true);o.r=(o.r||3)*(1+getBreakLevel('area')*.015);if(o.explode)o.explode*=areaMult();}if(bullets.length>=CONFIG.bulletCap)bullets.splice(0,Math.max(1,bullets.length-CONFIG.bulletCap+1));bullets.push(o);}
function rocketLaunchBurst(x,y,angle,lv){var back=angle+Math.PI;if(particles.length<CONFIG.particleCap-10){for(var i=0;i<3+lv;i++){var a=back+rand(-.28,.28),sp=rand(60,160);pushCap(particles,{x:x+Math.cos(back)*8,y:y+Math.sin(back)*8,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(.18,.35),max:.4,color:Math.random()<.45?'#ffb06a':'#d8d8d8',r:rand(1.6,3.3)},CONFIG.particleCap);}}addTrail(x+Math.cos(back)*12,y+Math.sin(back)*12,'#d8d8d8',7+lv, .34,'smoke');}
function explodeAt(x,y,r,damage,color,src){burst(x,y,color||'#ffdf6b',18);for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];var d=Math.hypot(e.x-x,e.y-y);if(d<r+e.r){var fall=.55+.45*(1-d/(r+e.r));if(d>0){var a=Math.atan2(e.y-y,e.x-x);e.x+=Math.cos(a)*7;e.y+=Math.sin(a)*7;}if(damageEnemy(e,damage*fall,src||{weapon:'explosion'}))killEnemyAt(i);}}}
function spawnFirework(x,y,damage,lv){var count=6+lv*2;for(var i=0;i<count;i++){var a=Math.PI*2*i/count+rand(-.08,.08);addBullet({x:x,y:y,vx:Math.cos(a)*(300+lv*35),vy:Math.sin(a)*(300+lv*35),r:3.2+lv*.25,life:.55+lv*.05,damage:damage*.45,color:'#ff77aa',pierce:0,type:'normal',weapon:'fireworksShard',fusion:'fireworks'});}bigBurst(x,y,'#ff77aa',18+lv*5,.7);}
function addWeaponTrail(b,dt){if(!b)return;b.trail=(b.trail||0)-dt;if(b.trail>0)return;if(b.type==='missile'){b.trail=CONFIG.smokeEvery;addTrail(b.x-b.vx*.018,b.y-b.vy*.018,'#d2d2d2',6.2,.32,'smoke');if(Math.random()<.55)addTrail(b.x-b.vx*.010,b.y-b.vy*.010,'#ffb06a',4.2,.22,'flame');}else if(b.type==='fire'){b.trail=.06;addTrail(b.x,b.y,'#ff7a35',7,.18,'flame');}else if(b.type==='ice'){b.trail=.08;addTrail(b.x,b.y,'#9ee8ff',6,.20,'ice');}else if(b.type==='laser'){b.trail=.08;addTrail(b.x,b.y,b.color,7,.12,'line');}}

function shootSunny(){var target=nearestEnemy();if(!target)return;var a=Math.atan2(target.y-player.y,target.x-player.x);var opening=(!endlessMode&&gameTime<90)?1.18:1;addBullet({x:player.x,y:player.y,vx:Math.cos(a)*520,vy:Math.sin(a)*520,r:4.0,life:1.0,damage:9.5*opening*damageMult(false),color:'#ffd95a',pierce:0,type:'sunny',weapon:'sunny'});}
function shootLaser(lv){var base=Math.atan2(player.facingY,player.facingX),count=1+(lv>=4?1:0),spread=lv>=4?.11:0;for(var i=0;i<count;i++){var a=base+(count>1?(-spread/2+spread*i/(count-1)):0);addBullet({x:player.x,y:player.y,vx:Math.cos(a)*760,vy:Math.sin(a)*760,r:2.2,life:1.15,damage:(17+lv*4.4)*damageMult(false),color:'#d7a6ff',pierce:2+Math.floor(lv/2),type:'laser',weapon:'laser',length:44+lv*7,thickness:1.3+lv*.18});}}
function shootMachinegun(lv){var base=Math.atan2(player.facingY,player.facingX),count=1+(lv>=4?1:0);for(var i=0;i<count;i++){var aa=base+(i-(count-1)/2)*.045+rand(-.055,.055);addBullet({x:player.x+Math.cos(aa)*12,y:player.y+Math.sin(aa)*12,vx:Math.cos(aa)*(640+lv*12),vy:Math.sin(aa)*(640+lv*12),r:3.1+lv*.12,life:.78,damage:(6.0+lv*1.9)*damageMult(false),color:'#ffb357',pierce:0,type:'normal',weapon:'machinegun'});}}
function shootMissile(lv){var target=nearestEnemy();if(!target)return;var a=Math.atan2(target.y-player.y,target.x-player.x),count=1+(lv>=5?1:0);for(var i=0;i<count;i++){var aa=a+(i-(count-1)/2)*.22,sp=440+lv*24,sx=player.x+Math.cos(aa)*18,sy=player.y+Math.sin(aa)*18;addBullet({x:sx,y:sy,vx:Math.cos(aa)*sp,vy:Math.sin(aa)*sp,r:6.4,life:2.2,damage:(15+lv*4.0)*damageMult(false),color:'#ff775f',pierce:0,type:'missile',weapon:'missile',homing:true,homingPower:.018,baseSpeed:sp,explode:28+lv*5});rocketLaunchBurst(sx,sy,aa,lv);}}
function shootThunder(lv){if(enemies.length===0)return;var strikes=1+(lv>=4?1:0);for(var s=0;s<strikes;s++){if(enemies.length===0)return;var e=choose(enemies);if(!e)continue;var dmg=(18+lv*5.0)*damageMult(false);pushCap(lightnings,{x:e.x,y:e.y,life:.16,max:.16},CONFIG.lightningCap);burst(e.x,e.y,'#fff06b',8);if(damageEnemy(e,dmg,{weapon:'thunder',flash:true}))killEnemyAt(enemies.indexOf(e));}}
function shootFire(lv){
  // 初期版に近いムチ型ファイア。前方左右へ横に伸びる炎で、雑魚の進路を焼く。
  var dirs=lv>=3?[-1,1]:[player.facingX<0?-1:1];
  var reach=66+lv*15;
  var segments=5+lv;
  var waves=lv>=5?2:1;
  var curve=[0,1.00,1.13,1.28,1.44,1.60][lv]||1;
  for(var d=0;d<dirs.length;d++){
    var side=dirs[d];
    for(var w=0;w<waves;w++){
      for(var i=0;i<segments;i++){
        var t=i/(segments-1||1);
        var arc=Math.sin(t*Math.PI)*(14+lv*2)+Math.sin(t*Math.PI*2)*4;
        var x=player.x+side*(22+reach*t);
        var y=player.y-6+arc+(w*8-4);
        addBullet({x:x,y:y+rand(-3,3),vx:side*(120+lv*16),vy:rand(-18,18),r:7.4+lv*.65,life:.30+lv*.026,damage:(7.4+lv*1.75)*curve*damageMult(false),color:'#ff7a35',pierce:1+Math.floor(lv/3),type:'fire',weapon:'fire'});
        if(i%2===0)addTrail(x,y,'#ff7a35',7+lv*.8,.18,'flame');
      }
    }
  }
  if(lv>=4)burst(player.x+dirs[0]*(48+lv*8),player.y,'#ff7a35',8);
}
function updateIceOrbs(dt){var lv=getWeaponLevel('ice');if(lv<=0||!player)return;iceAngle+=dt*(2.0+lv*.25);var count=1+(lv>=4?1:0),radius=42+lv*7,orbR=(8.5+lv*.9)*areaMult();var dmg=(8.0+lv*2.7)*damageMult(false);for(var o=0;o<count;o++){var a=iceAngle+Math.PI*2*o/count,ox=player.x+Math.cos(a)*radius,oy=player.y+Math.sin(a)*radius;if(Math.random()<.25)addTrail(ox,oy,'#9ee8ff',orbR,.14,'ice');for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];if(!e)continue;if(e.iceHitTimer>0)continue;if(Math.hypot(e.x-ox,e.y-oy)<e.r+orbR){e.iceHitTimer=.32;if(damageEnemy(e,dmg,{weapon:'ice',slow:1.0+lv*.16}))killEnemyAt(i);}}}}
function shootIron(lv){var a=Math.atan2(player.facingY,player.facingX);addBullet({x:player.x+Math.cos(a)*20,y:player.y+Math.sin(a)*20,vx:Math.cos(a)*(230+lv*8),vy:Math.sin(a)*(230+lv*8),r:10.0+lv*1.2,life:2.0,damage:(28+lv*8.0)*damageMult(false),color:'#9aa8bd',pierce:0,type:'iron',weapon:'iron',knock:16+lv*6});}
function shootNeedle(lv){var target=nearestEnemyFrom(player.x,player.y,430);if(!target)return;var a0=Math.atan2(target.y-player.y,target.x-player.x);var ways=1+(lv>=3?2:0)+(lv>=5?2:0),spread=ways>1?.42:0;for(var i=0;i<ways;i++){var a=a0-spread/2+spread*(ways===1?0:i/(ways-1));addBullet({x:player.x+Math.cos(a)*18,y:player.y+Math.sin(a)*18,vx:Math.cos(a)*610,vy:Math.sin(a)*610,r:2.7,life:.42+lv*.02,damage:(7.5+lv*2.0)*damageMult(false),color:'#e9f1ff',pierce:1+Math.floor(lv/3),type:'needle',weapon:'needle',length:12+lv*1.2,thickness:1.15});}}
function shootBeam(lv){var base=Math.atan2(player.facingY,player.facingX),ways=5+lv,spread=Math.PI*(.38+lv*.035);for(var i=0;i<ways;i++){var a=base-spread/2+spread*(ways===1?0:i/(ways-1))+rand(-.04,.04);var sp=420+lv*14;addBullet({x:player.x+Math.cos(a)*18,y:player.y+Math.sin(a)*18,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:3.3+lv*.23,life:.48+lv*.03,damage:(5.6+lv*1.55)*damageMult(false),color:'#70d7ff',pierce:0,type:'beam',weapon:'beam'});}}

trails.forEach(function(tr){if(!tr)return;var ta=Math.max(0,tr.life/tr.max);ctx.save();ctx.globalAlpha=ta*.55;ctx.fillStyle=tr.color;ctx.strokeStyle=tr.color;if(tr.type==='line'){ctx.lineWidth=Math.max(1,tr.size*.22);ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.stroke();}else if(tr.type==='smoke'){ctx.globalAlpha=ta*.32;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*(1.25-ta*.15),0,Math.PI*2);ctx.fill();}else{ctx.beginPath();ctx.arc(tr.x,tr.y,tr.size*ta,0,Math.PI*2);ctx.fill();}ctx.restore();});
particles.forEach(function(p){if(!p)return;var pa=Math.max(0,p.life/(p.max||.65));ctx.save();ctx.globalAlpha=pa;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,(p.r||3)*pa,0,Math.PI*2);ctx.fill();ctx.restore();});
lightnings.forEach(function(ln){if(!ln)return;var la=Math.max(0,ln.life/ln.max);ctx.save();ctx.globalAlpha=la;ctx.strokeStyle='#fff06b';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ln.x+rand(-10,10),0);ctx.lineTo(ln.x+4,ln.y-20);ctx.lineTo(ln.x-5,ln.y+8);ctx.lineTo(ln.x+8,ln.y+22);ctx.stroke();ctx.restore();});
enemies.forEach(function(en){if(!en)return;ctx.save();var pulse=en.hitPulse>0?1.18:1;if(en.boss){var br=Math.max(0,en.hp/en.maxHp);pulse*=br<.18?1.16+.12*Math.sin(performance.now()/55):(br<.42?1.08:1);ctx.globalAlpha=br<.28?.82+.18*Math.sin(performance.now()/70):1;}ctx.fillStyle=en.color;ctx.beginPath();ctx.arc(en.x,en.y,en.r*pulse,0,Math.PI*2);ctx.fill();if(en.boss){ctx.strokeStyle='rgba(255,255,255,.38)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(en.x,en.y,en.r*(1.16+0.05*Math.sin(performance.now()/90)),0,Math.PI*2);ctx.stroke();ctx.globalAlpha=.16;ctx.fillStyle='#ff445f';ctx.beginPath();ctx.arc(en.x,en.y,en.r+72,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}ctx.font=Math.max(14,en.r*1.08)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(en.emoji||'☁️',en.x,en.y+1);ctx.restore();drawEnemyHp(en);});
bullets.forEach(function(b){if(!b)return;ctx.save();if(b.type==='missile'){var ma=Math.atan2(b.vy,b.vx);ctx.translate(b.x,b.y);ctx.rotate(ma);ctx.fillStyle=b.color;ctx.beginPath();ctx.ellipse(0,0,b.r*1.25,b.r*.78,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcf75';ctx.globalAlpha=.65;ctx.beginPath();ctx.ellipse(-b.r*1.15,0,b.r*.65,b.r*.32,0,0,Math.PI*2);ctx.fill();}else if(b.type==='laser'||b.type==='needle'){var ang=Math.atan2(b.vy,b.vx),lx=Math.cos(ang)*(b.length||18),ly=Math.sin(ang)*(b.length||18);ctx.strokeStyle=b.color;ctx.lineWidth=b.thickness||1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(b.x-lx*.15,b.y-ly*.15);ctx.lineTo(b.x+lx,b.y+ly);ctx.stroke();}else{ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();if(b.type==='fire'||b.type==='ice'||b.type==='iron'){ctx.font=Math.max(12,b.r*1.0)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.type==='fire'?'🔥':(b.type==='ice'?'❄️':'⚫'),b.x,b.y+1);}}ctx.restore();});
drawIceOrbs();if(levelPulse>0){var lp=levelPulse;ctx.save();ctx.globalAlpha=lp*.85;ctx.strokeStyle='#66d9ff';ctx.lineWidth=3;ctx.shadowColor='#66d9ff';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(player.x,player.y,player.r+14+(1-lp)*46,0,Math.PI*2);ctx.stroke();ctx.font='bold '+Math.round(20+8*lp)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff3a6';ctx.shadowColor='#ffdf6b';ctx.shadowBlur=14;ctx.fillText('LV UP!',player.x,player.y-player.r-34-(1-lp)*16);ctx.restore();}var playerAlpha=player.inv>0?.68+.32*Math.sin(performance.now()/35):1;var spriteSize=player.r*2.35;ctx.save();ctx.translate(player.x,player.y);ctx.globalAlpha=playerAlpha;ctx.rotate(player.ringAngle||0);if(playerRingImg&&playerRingImg.complete&&playerRingImg.naturalWidth!==0){ctx.drawImage(playerRingImg,-spriteSize/2,-spriteSize/2,spriteSize,spriteSize);}else{ctx.fillStyle='#ffd95a';ctx.beginPath();ctx.arc(0,0,player.r+8,0,Math.PI*2);ctx.fill();}ctx.restore();ctx.save();ctx.globalAlpha=playerAlpha;ctx.translate(player.x,player.y);var face=(player.hitFace>0&&playerHitImg&&playerHitImg.complete&&playerHitImg.naturalWidth!==0)?playerHitImg:playerFaceImg;if(face&&face.complete&&face.naturalWidth!==0){ctx.drawImage(face,-spriteSize/2,-spriteSize/2,spriteSize,spriteSize);}else{ctx.fillStyle='#362100';ctx.font='25px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☀️',0,1);}ctx.restore();
if(touch.active){ctx.save();ctx.globalAlpha=.30;ctx.strokeStyle='#66d9ff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(touch.startX,touch.startY,42,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(touch.x,touch.y,20,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(touch.startX,touch.startY);ctx.lineTo(touch.x,touch.y);ctx.stroke();ctx.restore();}if(screenFlash>0){ctx.save();ctx.globalAlpha=screenFlash*.65;ctx.fillStyle='#fff6b8';ctx.fillRect(0,0,width,height);ctx.restore();}}
function loop(){var now=performance.now();var dt=Math.min((now-lastTime)/1000,.033);lastTime=now;update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
if(DEBUG_MODE){window.__SUNNY_TEST__={start:startGame,setTime:function(t){gameTime=t;},giveExp:function(v){gainExp(v);checkLevelUps();updateHud();},setWeapon:function(id,lv){weaponLevels[id]=lv;updateSlots();},setFusion:function(id,lv){fusionLevels[id]=lv;updateSlots();},spawnBoss:spawnBoss,openChest:openTreasureChest,state:function(){return{running:running,paused:paused,gameTime:gameTime,level:level,exp:exp,nextExp:nextExp,enemies:enemies.length,bullets:bullets.length,items:items.length,trails:trails.length,particles:particles.length,clearOffered:clearOffered,endlessMode:endlessMode,hp:player&&player.hp};}};}
})();
